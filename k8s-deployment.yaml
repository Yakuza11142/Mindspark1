apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindspark-web-deployment
spec:
  replicas: 3 # Start with 3 servers
  selector:
    matchLabels:
      app: mindspark
  template:
    metadata:
      labels:
        app: mindspark
    spec:
      containers:
      - name: mindspark-web
        image: yakuza11142/mindspark:v1.0
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
---
# AUTO-SCALER LOGIC
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mindspark-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mindspark-web-deployment
  minReplicas: 3
  maxReplicas: 100 # Automatically scale up to 100 servers during JAMB week!
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # If CPU hits 70%, buy another server