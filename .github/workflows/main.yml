name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # FIXED: Downgraded to 3.16.9 to support your project's Android v1 embedding layout
      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'
          channel: 'stable' 

      - name: Resolve Internal Dependencies
        run: |
          flutter clean
          flutter pub get
        working-directory: "."

      - name: Build Android App Bundle (Code & Logo Only)
        run: flutter build apk --debug
        working-directory: "."

      - name: Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
