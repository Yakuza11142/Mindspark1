name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: false # Enforces a pure compile by avoiding old cache fragments

      - name: 🎨 Setup App Logo and Asset Infrastructure
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts

          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
          fi

          if [ -f "image_e1762c49 (1).png" ]; then
            cp "image_e1762c49 (1).png" assets/images/logo.png
          elif [ -f "assets/images/logo.png" ]; then
            echo "✅ Logo already present."
          else
            touch assets/images/logo.png
          fi

      - name: 🧼 Evict Legacy Cache Layers
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool/

      - name: 📦 Get Flutter Packages
        run: flutter pub get

      - name: 🩺 Flutter Diagnostics Configuration
        run: flutter doctor -v

      - name: 🎨 Generate Branded Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "⚠️ Skipping launcher icon mapping."
          fi

      - name: 🏗️ Build Release APK
        run: |
          flutter build apk --release

      - name: 📤 Upload Compiled Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
