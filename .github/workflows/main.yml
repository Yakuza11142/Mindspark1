name: Mind Spark Android Build

on:
push:
branches:
- main
- master
workflow_dispatch:

permissions:
contents: read

jobs:
build_apk:
name: Build Android APK
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.24.0'
      channel: stable
      cache: true

  - name: Create Assets Directory
    run: |
      mkdir -p assets

  - name: Fix Logo Asset Automatically
    run: |
      if [ -f "image_e1762c49 (1).png" ]; then
        cp "image_e1762c49 (1).png" assets/app_logo.png
      fi

  - name: Create Environment File
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
      RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
      HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
      MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
    run: |
      cat > .env << EOF
      OPENAI_API_KEY=${OPENAI_API_KEY}
      GEMINI_API_KEY=${GEMINI_API_KEY}
      PEXELS_API_KEY=${PEXELS_API_KEY}
      TRIPO_API_KEY=${TRIPO_API_KEY}
      RUNWAY_API_KEY=${RUNWAY_API_KEY}
      HEYGEN_API_KEY=${HEYGEN_API_KEY}
      MTN_API_KEY=${MTN_API_KEY}
      EOF

  - name: Flutter Clean
    run: flutter clean

  - name: Get Dependencies
    run: flutter pub get

  - name: Generate Launcher Icons
    run: flutter pub run flutter_launcher_icons:main || true

  - name: Build Release APK
    env:
      GRADLE_OPTS: "-Xmx4g"
    run: flutter build apk --release

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: mind-spark-release-apk
      path: build/app/outputs/flutter-apk/app-release.apk
```
