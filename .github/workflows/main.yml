name: Mind Spark Deep Clean & Build

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set Up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 3. Set Up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: 4. Preserve Custom Source Code
        run: |
          mkdir -p /tmp/user_code
          cp -r lib /tmp/user_code/ || true
          cp pubspec.yaml /tmp/user_code/ || true

      - name: 5. Regenerate Native Scaffolding
        run: |
          flutter create . --overwrite --project-name mind_spark
          rm -rf lib test
          cp -r /tmp/user_code/lib . || mkdir -p lib
          cp /tmp/user_code/pubspec.yaml .

      - name: 6. Initialize Assets & Fetch Packages
        run: |
          mkdir -p assets/images assets/fonts
          flutter pub get

      - name: 7. Run Code Generation (Build Runner)
        run: |
          dart run build_runner build --delete-conflicting-outputs || echo "No builders needed"

      - name: 8. Generate Launcher Icons
        run: |
          dart run flutter_launcher_icons || echo "Skipping icons"

      - name: 9. Compile Android APK
        env:
          ORG_GRADLE_PROJECT_flutterCompileSdkVersion: "34"
          ORG_GRADLE_PROJECT_flutterTargetSdkVersion: "34"
        run: |
          yes | flutter doctor --android-licenses || echo "Licenses verified"
          flutter build apk --debug -t lib/main.dart

      - name: 10. Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
