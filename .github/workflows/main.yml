name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code Structure
        uses: actions/checkout@v4

      - name: ☕ Initialize Java Runtime Environment (v17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Initialize Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '' # Fixed: Leaving blank fetches the latest stable release without container crashes

      - name: 🔐 Configure Local Environment Token Wrapper
        run: |
          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
            echo "✅ Created missing .env container template."
          else
            echo "✅ Custom repository .env file detected."
          fi

      - name: 🧼 Evict Cache Metadata Layers
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool/

      - name: 📦 Sync Package Tree Graph (Android Target Only)
        run: flutter pub get

      - name: 🩺 Run Flutter Doctor Analysis
        run: flutter doctor -v

      - name: 🔒 Grant Native Gradle Script Access
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ gradlew permissions granted."
          else
            echo "⚠️ gradlew file not found. Proceeding with standard build routines."
          fi

      - name: 🎨 Build Dynamic Launcher Icon Mapping
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "⚠️ Skipping launcher mapping task profile."
          fi

      - name: 🏗️ Compile Pure Release Android APK Binary
        run: |
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Export Built Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-Only-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
