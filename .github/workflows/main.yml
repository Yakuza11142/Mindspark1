name: Mind Spark Android Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK Only
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code Structure
        uses: actions/checkout@v4

      - name: 📋 Log Active Build Commit SHA
        run: echo "🚀 Compiling codebase assets linked to commit SHA -> ${{ github.sha }}"

      - name: ☕ Initialize Java Runtime Environment (v17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🤖 Auto-Accept Android SDK Licensing
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2d05b41312163e1a37cd28b38e0429e7012e" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license
          echo "✅ Android SDK licenses signed off."

      - name: 🦋 Initialize Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'
          cache: true

      - name: 💾 Configure Advanced Native Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .dart_tool/
            android/.gradle
          key: ${{ runner.os }}-gradle-flutter-${{ hashFiles('**/pubspec.lock', 'android/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-flutter-

      - name: 🛠️ Upgrade to Android v2 Embedding (Kotlin Variant)
        run: |
          if [ -d "android" ]; then
            echo "⚙️ Automatically migrating native Kotlin structures..."
            find android/app/src/main -name "MainActivity.kt" -exec sed -i '/import io.flutter.plugins.GeneratedPluginRegistrant/d' {} +
            find android/app/src/main -name "MainActivity.kt" -exec sed -i '/GeneratedPluginRegistrant.registerWith/d' {} +
            echo "✅ Kotlin structures updated to V2 Embedding framework."
          fi

      - name: 🔑 Inject API Keys and Secrets into Environment File
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
        run: |
          # Create file if missing, otherwise append secrets without clearing Supabase keys
          touch .env
          echo "" >> .env
          echo "OPENAI_API_KEY=${OPENAI_API_KEY}" >> .env
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" >> .env
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" >> .env
          echo "TRIPO_API_KEY=${TRIPO_API_KEY}" >> .env
          echo "RUNWAY_API_KEY=${RUNWAY_API_KEY}" >> .env
          echo "HEYGEN_API_KEY=${HEYGEN_API_KEY}" >> .env
          echo "MTN_API_KEY=${MTN_API_KEY}" >> .env
          echo "✅ .env configuration file updated with environment secrets."

      - name: 🔧 Fix and Re-generate Corrupted Gradle Wrapper
        run: |
          if [ -d "android" ]; then
            cd android
            mkdir -p gradle/wrapper
            rm -f gradle/wrapper/gradle-wrapper.jar
            curl -LO https://githubusercontent.com -o gradle/wrapper/gradle-wrapper.jar
            chmod +x gradlew
            
            # Auto-patch missing package namespaces to prevent AGP 8.0+ layout compile crashes
            if [ -f "build.gradle" ]; then
              echo "subprojects { afterEvaluate { project -> if (project.hasProperty('android')) { project.android { if (namespace == null) { namespace project.group } } } } }" >> build.gradle
            fi
            
            ./gradlew clean
            cd ..
            echo "✅ Fresh Gradle wrapper binaries injected and validated."
          fi

      - name: 📦 Clean Local Workspace Cache
        run: |
          flutter clean
          flutter pub get

      - name: 🚀 Build Release APK with Obfuscation
        env:
          # Allocates 4GB RAM to the compiler engine to prevent JVM memory exhaustion crashes
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --split-per-abi

      - name: 🔐 Generate Multi-Algorithm Integrity Checksums
        run: |
          echo "=========================================================="
          echo "🛡️ ADVANCED MULTI-HASH INTEGRITY REPORT 🛡️"
          echo "=========================================================="
          find build/app/outputs/flutter-apk/ -name "*.apk" | while read -r apk_file; do
            echo ""
            echo "📦 FILE: $(basename "$apk_file")"
            echo "----------------------------------------------------------"
            echo "🔹 SHA-256:"
            sha256sum "$apk_file" | awk '{print $1}'
            echo "🔹 SHA-512:"
            sha512sum "$apk_file" | awk '{print $1}'
            echo "🔹 SHA3-256:"
            openssl dgst -sha3-256 "$apk_file" | awk '{print $2}'
            echo "🔹 SHA3-512:"
            openssl dgst -sha3-512 "$apk_file" | awk '{print $2}'
            echo "----------------------------------------------------------"
          done
          echo "=========================================================="

      - name: 📦 Upload Symbols & Obfuscated APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-apks
          path: |
            build/app/outputs/flutter-apk/*-release.apk
            build/app/outputs/symbols/
