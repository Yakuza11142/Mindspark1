name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # 🤖 JOB 1: ANDROID COMPILATION (APK + APP BUNDLE AAB) - 19 STEPS EXPLICIT
  # =========================================================================
  build_android:
    runs-on: ubuntu-latest
    name: 🤖 Android Pipeline
    steps:
      - name: 📥 [Step 1/19] Checkout repository source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ [Step 2/19] Initialize Java 17 Runtime Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 [Step 3/19] Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ [Step 4/19] Run Android Environment Diagnostics Probes
        run: |
          flutter --version
          dart --version
          java -version
          ls -la

      - name: 🔧 [Step 5/19] Force Strict Gradle File Write Permissions
        run: |
          mkdir -p android
          chmod +x gradlew || echo "Bypassed"
          chmod +x android/gradlew || echo "Bypassed"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 [Step 6/19] Deep Purge Workspace Compilation Cache
        run: |
          flutter clean
          rm -rf build/ .dart_tool/ android/.gradle/

      - name: 📦 [Step 7/19] Fetch All Project Package Dependency Tree Maps
        run: flutter pub get

      - name: 🎨 [Step 8/19] Custom Branded Logo Interception Matrix
        run: |
          mkdir -p assets/images
          if [ -f "image_e1762c49 (1).png" ]; then
            cp "image_e1762c49 (1).png" assets/images/app_icon.png
            cp "image_e1762c49 (1).png" app_logo.png
          elif [ -f "app_logo.png" ]; then
            cp "app_logo.png" assets/images/app_icon.png
          else
            echo "❌ CRITICAL FAULT: Branding icon image graphic asset is missing from root!" && exit 1
          fi

      - name: 🔧 [Step 9/19] Run Background Code Generation Tools
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: 📋 [Step 10/19] Analyze Application Syntaxes Structure Safely
        run: flutter analyze --no-pub --no-fatal-infos

      - name: 🔐 [Step 11/19] Bake Branded Logo into Native Android Mipmaps
        run: flutter pub run flutter_launcher_icons

      - name: 🏗️ [Step 12/19] BUILD OBFUSCATED ANDROID DIRECT INSTALLER APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm

      - name: 🏗️ [Step 13/19] BUILD OBFUSCATED ANDROID PLAY STORE APP BUNDLE AAB
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 📂 [Step 14/19] Stage and Sync Verified Target Deliverables
        run: |
          mkdir -p build/release/android
          cp build/app/outputs/apk/release/app-release.apk build/release/android/Mind_Spark.apk
          cp build/app/outputs/bundle/release/app-release.aab build/release/android/Mind_Spark.aab

      - name: 🔐 [Step 15/19] Compute Cryptographic Verification Checksum Fingerprints
        run: |
          cd build/release/android
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt
          sha256sum Mind_Spark.aab > CHECKSUM_AAB_SHA256.txt

      - name: 📋 [Step 16/19] Compile Android Production Manifest Logs Tree
        run: |
          cat > build/release/android/BUILD_MANIFEST.txt << 'EOF'
          ╔══════════════════════════════════════════════════════════════╗
          ║   MIND SPARK - NATIVE COMPILATION Android COMPLETE LOGS      ║
          ╚══════════════════════════════════════════════════════════════╝
          ✅ APK Target: Mind_Spark.apk (Direct Installer)
          ✅ AAB Target: Mind_Spark.aab (Play Store Store Upload)
          EOF

      - name: 📤 [Step 17/19] Upload Direct Device Phone Installer Package (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-APK
          path: build/release/android/Mind_Spark.apk
          retention-days: 30

      - name: 📤 [Step 18/19] Upload Play Store Store Distribution Artifact (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-PlayStore-AAB
          path: build/release/android/Mind_Spark.aab
          retention-days: 30

      - name: 📤 [Step 19/19] Upload Android Integrity Logs Tree Verification
        uses: actions/upload-artifact@v4
        with:
          name: Android-Deployment-Logs
          path: |
            build/release/android/BUILD_MANIFEST.txt
            build/release/android/CHECKSUM*.txt
          retention-days: 30

  # =========================================================================
  # 🍏 JOB 2: APPLE iOS MOBILE EMULATION AND CORE COMPILATION
  # =========================================================================
  build_ios:
    runs-on: macos-latest
    name: 🍏 iOS Pipeline
    steps:
      - name: 📥 Checkout complete repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Fetch All Project Package Dependency Tree Maps
        run: flutter pub get

      - name: 🍏 Initialize CocoaPods Workspace Project Links
        run: |
          if [ -d "ios" ]; then
            cd ios && pod repo update && pod install && cd ..
          else
            echo "❌ CRITICAL INTERRUPT: 'ios/' folder is missing!" && exit 1
          fi

      - name: 🎨 Bake Custom Branded Logo Assets to Apple Catalogs
        run: |
          mkdir -p assets/images
          if [ -f "image_e1762c49 (1).png" ]; then cp "image_e1762c49 (1).png" assets/images/app_icon.png; fi
          flutter pub run flutter_launcher_icons

      - name: 🏗️ COMPILE APPLE iOS ENCRYPTED CODE BUNDLE PAYLOAD
        run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-debug-info/

      - name: 📂 Stage iOS Sandboxed App Workspace Directory
        run: |
          mkdir -p build/release/ios
          cp -R build/ios/iphoneos/Runner.app build/release/ios/Mind_Spark.app

      - name: 📤 Upload Native iOS App Bundle Artifact Archive Folder
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-iOS-Container
          path: build/release/ios/Mind_Spark.app
          retention-days: 14

  # =========================================================================
  # 💻 JOB 3: APPLE macOS DESKTOP NATIVE APPLICATION COMPILATION STACK
  # =========================================================================
  build_macos:
    runs-on: macos-latest
    name: 💻 macOS Pipeline
    steps:
      - name: 📥 Checkout complete repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ⚙️ Force Unlock macOS App Target Channels
        run: flutter config --enable-macos-desktop

      - name: 📦 Fetch All Project Package Dependency Tree Maps
        run: flutter pub get

      - name: 🎨 Bake Custom Branded Logo Assets
        run: |
          mkdir -p assets/images
          if [ -f "image_e1762c49 (1).png" ]; then cp "image_e1762c49 (1).png" assets/images/app_icon.png; fi
          flutter pub run flutter_launcher_icons

      - name: 🏗️ COMPILE NATIVE MAC DESKTOP PRODUCTION BUNDLE
        run: |
          if [ -d "macos" ]; then
            flutter build macos --release --obfuscate --split-debug-info=build/macos-debug-info/
          else
            echo "❌ CRITICAL INTERRUPT: 'macos/' target map missing!" && exit 1
          fi

      - name: 📤 Upload Standalone Native macOS Desktop Executable Package Bundle
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-macOS-Desktop
          path: build/macos/Build/Products/Release/mind_spark.app
          retention-days: 14

  # =========================================================================
  # 🌐 JOB 4: WEB APPLICATION PORTAL RUNTIME TARGET COMPILE
  # =========================================================================
  build_web:
    runs-on: ubuntu-latest
    name: 🌐 Web Pipeline
    steps:
      - name: 📥 Checkout complete repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Fetch All Project Package Dependency Tree Maps
        run: flutter pub get

      - name: 🏗️ BUILD COMPACT COMPILED PRODUCTION WEB ARCHITECTURE
        run: flutter build web --release --web-renderer auto

      - name: 📤 Upload Production Web Engine Static Site Folder
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Web-Release
          path: build/web/
          retention-days: 30
