name: MIND SPARK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Java (Crucial for ARCore and Gradle 8+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2. Setup NDK (Required for tflite_flutter and pqcrypto)
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
          add-to-path: true

      # 3. Setup Flutter 3.22.0
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. Deep Clean & Dependency Install
      - name: Install All Dependencies
        run: |
          flutter clean
          # Fixes broken downloads from previous failed runs
          flutter pub cache repair 
          flutter pub get --verbose

      # 5. Code Generation (For Hive and ML models)
      - name: Run Build Runner
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      # 6. Build Obfuscated APK (Security for your Satellite code)
      - name: Build Release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      # 7. Generate Checksums
      - name: Generate Security Checksums
        working-directory: build/app/outputs/apk/release
        run: |
          sha256sum app-release.apk > app-release.apk.sha256
          {
            echo "=== MIND_SPARK BUILD REPORT ==="
            echo "SHA-256: $(cat app-release.apk.sha256)"
            echo "Date: $(date)"
          } > BUILD_INFO.txt

      # 8. Upload Final Artifacts
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MIND_SPARK_PRODUCTION
          path: build/app/outputs/apk/release/
