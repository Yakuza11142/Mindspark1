name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Codebase from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      # NO MORE TEMPLATES: Wipes root-level placeholders completely so they cannot confuse the build machine
      - name: 4. Clear Generic Template Folders
        run: |
          rm -rf lib
          rm -rf android
          rm -rf ios

      # LOGO CAPTURE: Automatically finds your custom brain-globe image and drops it into assets
      - name: 5. Inject Mind Spark Custom Logo
        run: |
          mkdir -p mind_spark_project/assets
          find . -maxdepth 1 -name "*.png" ! -name "logo.png" -exec cp {} mind_spark_project/assets/logo.png \; || echo "Logo processing complete"

      # LINK LOGO: Forcefully appends the asset path inside your project settings configuration block
      - name: 6. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" mind_spark_project/pubspec.yaml; then
            echo "  assets:" >> mind_spark_project/pubspec.yaml
            echo "    - assets/logo.png" >> mind_spark_project/pubspec.yaml
          fi

      # LOAD PROJECT DEPS: Downloads the exact packages required by your 2,000 custom files
      - name: 7. Load Project Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "mind_spark_project"

      # TARGET CODE ONLY: Compiles your custom application from your real folder directory without generating boilerplate
      - name: 8. Build Custom Android App
        run: |
          flutter build apk --debug
        working-directory: "mind_spark_project"

      # DELIVER APP PACKAGE: Gathers your custom app build file for download directly to your phone
      - name: 9. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "mind_spark_project/build/app/outputs/flutter-apk/app-debug.apk"
