name: Mind Spark Deep Clean & Build
on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Your GitHub Repository Files
        uses: actions/checkout@v4

      - name: 2. Set Up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Matching Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: 4. Rebuild Native Scaffolding Around Your Code
        run: |
          # 1. Back up whatever custom files are currently in your online repository
          mkdir -p /tmp/user_code
          cp -r lib /tmp/user_code/ || echo "No lib directory found in GitHub repository"
          cp pubspec.yaml /tmp/user_code/ || echo "No pubspec.yaml found in GitHub repository"
          
          # 2. Re-generate the missing native Android and iOS folders
          flutter create . --overwrite --project-name mind_spark
          
          # 3. Permanently destroy the newly generated template counter code files
          rm -rf lib test
          
          # 4. Put your authentic repository code files back into the project root
          if [ -d "/tmp/user_code/lib" ]; then
            cp -r /tmp/user_code/lib .
          else
            mkdir -p lib
          fi
          cp /tmp/user_code/pubspec.yaml .

      - name: 5. Align Asset Folders & Intercept Logo
        run: |
          # Create missing asset directories expected by your configuration file
          mkdir -p assets/images assets/fonts
          
          # Force empty safety layout targets so the compiler won't crash on empty paths
          touch assets/images/app_icon.png assets/fonts/Inter-Regular.ttf assets/fonts/Inter-Bold.ttf
          
          # Look for any custom PNG image you pushed to your main repository and use it
          find . -maxdepth 1 -name "*.png" ! -name "app_icon.png" -exec cp {} assets/images/app_icon.png \; || echo "No logo found"

      - name: 6. Bake Custom App Launcher Icons
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons || echo "Custom icon bake skipped"

      - name: 7. Compile Your Authentic Mind Spark Code
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug -t lib/main.dart

      - name: 8. Save APK Artifact Directly to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "build/app/outputs/flutter-apk/app-debug.apk"
