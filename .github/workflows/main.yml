name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Force Migrate MainActivity to Kotlin V2
        run: |
          KT_FILE=$(find android/app/src/main -name "MainActivity.kt" -type f | head -n 1)
          if [ -n "$KT_FILE" ]; then
              PACKAGE_LINE=$(grep "package " "$KT_FILE" | head -n 1)
              cat > "$KT_FILE" << EOF
              $PACKAGE_LINE
              import io.flutter.embedding.android.FlutterActivity
              class MainActivity: FlutterActivity() {
              }
              EOF
          fi

      - name: Create Production .env File
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
        run: |
          /usr/bin/mkdir -p assets
          cat > assets/.env << 'EOF'
          OPENAI_API_KEY=${OPENAI_API_KEY}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          PEXELS_API_KEY=${PEXELS_API_KEY}
          TRIPO_API_KEY=${TRIPO_API_KEY}
          RUNWAY_API_KEY=${RUNWAY_API_KEY}
          HEYGEN_API_KEY=${HEYGEN_API_KEY}
          MTN_API_KEY=${MTN_API_KEY}
          EOF

      - name: Inject Clean Manifest Code Block
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://android.com" package="com.example.mindspark">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application android:label="Mind Spark" android:icon="@mipmap/launcher_icon">
                  <activity android:name=".MainActivity" android:exported="true" android:theme="@android:style/Theme.DeviceDefault.Light.NoTitleBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Secured Obfuscated APK (Forced Skip)
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          /usr/bin/mkdir -p build/symbols
          # Added the ignore-deprecation flag to force clear the v1 embedding block
          flutter build apk --release --no-tree-shake-icons \
            --ignore-deprecation \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }}

      - name: Calculate Cryptographic Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          sha256sum "$APK_PATH" | awk '{print $1}' > sha256.txt
          sha512sum "$APK_PATH" | awk '{print $1}' > sha512.txt
          openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
          openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt

      - name: Upload Secured App Package
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha256.txt
            sha512.txt
            sha3_256.txt
            sha3_512.txt
