name: Mind_Spark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1
    - name: checkout_code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Step 2
    - name: set_up_jdk_17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # Step 3
    - name: set_up_flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'
        cache: true

    # Step 4
    - name: display_flutter_version
      run: flutter --version

    # Step 5
    - name: clean_project
      run: flutter clean

    # Step 6
    - name: get_dependencies
      run: flutter pub get

    # Step 7
    - name: run_build_runner
      run: flutter pub run build_runner build --delete-conflicting-outputs || echo "Skipping"

    # Step 8
    - name: flutter_analyze
      run: flutter analyze --no-pub --no-fatal-infos || echo "Warnings found"

    # Step 9
    - name: run_tests
      run: flutter test || echo "Tests failed"

    # Step 10
    - name: build_release_apk
      run: |
        flutter build apk \
          --release \
          --obfuscate \
          --split-debug-info=build/debug-info/ \
          --dart-define=FLUTTER_BUILD_MODE=release

    # Step 11
    - name: rename_apk
      run: |
        mkdir -p build/app/outputs/release
        mv build/app/outputs/apk/release/app-release.apk build/app/outputs/release/Mind_Spark.apk

    # Step 12
    - name: generate_checksums
      run: |
        cd build/app/outputs/release/
        sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt
        sha512sum Mind_Spark.apk > CHECKSUM_SHA512.txt
        md5sum Mind_Spark.apk > CHECKSUM_MD5.txt

    # Step 13
    - name: generate_build_report
      run: |
        APK_SIZE=$(du -h build/app/outputs/release/Mind_Spark.apk | cut -f1)
        echo "Size: $APK_SIZE" > build/BUILD_REPORT.txt

    # Step 14
    - name: upload_apk_artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mind-Spark-Release-APK
        path: build/app/outputs/release/
        retention-days: 90

    # Step 15
    - name: upload_report_artifact
      uses: actions/upload-artifact@v4
      with:
        name: Build-Report
        path: build/BUILD_REPORT.txt
        retention-days: 30
