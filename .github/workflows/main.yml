name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # 🤖 SINGLE COMPILATION UNIFIED JOB FOR ALL PLATFORMS (19 EXPLICIT STEPS)
  # =========================================================================
  build_all_platforms:
    runs-on: macos-latest
    name: 🚀 19-Step Multi-Platform Generation Matrix
    
    steps:
      - name: 📥 [Step 1/19] Checkout complete repository source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ [Step 2/19] Initialize Java 17 Temurin Core Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 [Step 3/19] Mount Flutter 3.22.0 Production Compiler Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ [Step 4/19] Run Quantum Structural Environmental Probes
        run: |
          echo "======================================================================================"
          echo "🔬 QUANTUM DIAGNOSTICS: TESTING HOST PLATFORM VIRTUALIZATION ENGINE CORES..."
          echo "======================================================================================"
          flutter --version
          dart --version
          java -version
          ls -la

      - name: 🔧 [Step 5/19] Force Strict Gradle File System Directory Permissions
        run: |
          echo "======================================================================================"
          echo "⚙️ QUANTUM DIAGNOSTICS: OVERRIDING NATIVE SHELL WRITE AND EXECUTE RIGHTS..."
          echo "======================================================================================"
          mkdir -p android
          chmod +x gradlew || echo "⚠️ Deferred"
          chmod +x android/gradlew || echo "⚠️ Deferred"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 [Step 6/19] Deep Purge Local Project Target Cache Configurations
        run: |
          echo "======================================================================================"
          echo "🧹 QUANTUM DIAGNOSTICS: ERASING OBSOLETE GRADLE AND FLUTTER DERIVED STORAGE CORES..."
          echo "======================================================================================"
          flutter clean
          rm -rf build/ .dart_tool/

      - name: 📦 [Step 7/19] Fetch All Project Package Dependency Tree Maps
        run: |
          echo "======================================================================================"
          echo "📦 QUANTUM DIAGNOSTICS: ASSEMBLING COMPILATION DEPLOYMENT PACKAGES CORE GRAPH..."
          echo "======================================================================================"
          flutter pub get

      - name: 🎨 [Step 8/19] High-Density Custom Branded Logo Interception Matrix
        run: |
          echo "======================================================================================"
          echo "🎨 QUANTUM DIAGNOSTICS: INTERCEPTING LOGO ASSET..."
          echo "======================================================================================"
          mkdir -p assets/images
          if [ -f "image_e1762c49 (1).png" ]; then
            cp "image_e1762c49 (1).png" assets/images/app_icon.png
            cp "image_e1762c49 (1).png" app_logo.png
            echo "✅ Loaded path -> assets/images/app_icon.png"
          elif [ -f "app_logo.png" ]; then
            cp "app_logo.png" assets/images/app_icon.png
            echo "✅ Loaded path -> assets/images/app_icon.png"
          else
            echo "❌ CRITICAL FAULT: Branding icon image graphic asset is missing from root!"
            exit 1
          fi

      - name: 🔧 [Step 9/19] Run Background Code Generation Serialization Tools
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: 📋 [Step 10/19] Analyze Application Syntaxes Structure Safely
        run: flutter analyze --no-pub --no-fatal-infos

      - name: 🔐 [Step 11/19] Bake Branded Logo into Native Assets Structures
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            flutter pub run flutter_launcher_icons
          else
            echo "❌ CRITICAL STRUCTURAL FAULT: Missing flutter_launcher_icons in pubspec.yaml!"
            exit 1
          fi

      - name: 🏗️ [Step 12/19] BUILD OBFUSCATED ANDROID Direct Installer Package (APK)
        run: |
          if [ -d "android" ]; then
            flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm
          else
            echo "❌ CRITICAL ARCHITECTURAL HALT: The native android folder is missing!"
            exit 1
          fi

      - name: 🏗️ [Step 13/19] BUILD OBFUSCATED ANDROID Store App Bundle Package (AAB)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 🏗️ [Step 14/19] BUILD APPLE iOS ENCRYPTED CODE BUNDLE PAYLOAD
        run: |
          if [ -d "ios" ]; then
            cd ios && pod repo update && pod install && cd ..
            flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-debug-info/
          fi

      - name: 🏗️ [Step 15/19] BUILD NATIVE MAC DESKTOP PRODUCTION BUNDLE
        run: |
          if [ -d "macos" ]; then
            flutter config --enable-macos-desktop
            flutter build macos --release --obfuscate --split-debug-info=build/macos-debug-info/
          fi

      - name: 🏗️ [Step 16/19] BUILD COMPACT COMPILED PRODUCTION WEB ARCHITECTURE
        run: flutter build web --release --web-renderer auto

      - name: 📂 [Step 17/19] Stage and Organize Verified Binary Target Deliverables Folder Matrix
        run: |
          echo "======================================================================================"
          echo "🔍 QUANTUM DIAGNOSTICS: ARCHIVING COMPILATION OUTPUT DELIVERABLES..."
          echo "======================================================================================"
          mkdir -p build/release/android build/release/ios build/release/macos
          cp build/app/outputs/apk/release/app-release.apk build/release/android/Mind_Spark.apk
          cp build/app/outputs/bundle/release/app-release.aab build/release/android/Mind_Spark.aab
          if [ -d "build/ios/iphoneos/Runner.app" ]; then cp -R build/ios/iphoneos/Runner.app build/release/ios/Mind_Spark.app; fi
          if [ -d "build/macos/Build/Products/Release/mind_spark.app" ]; then cp -R build/macos/Build/Products/Release/mind_spark.app build/release/macos/Mind_Spark_Desktop.app; fi
          cd build/release/android
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt
          sha256sum Mind_Spark.aab > CHECKSUM_AAB_SHA256.txt

      - name: 📋 [Step 18/19] Compile Comprehensive Multi-Platform Production Manifest Documentation Logs
        run: |
          cat > build/BUILD_MANIFEST.txt << 'EOF'
          ╔══════════════════════════════════════════════════════════════╗
          ║   MIND SPARK - NATIVE COMPILATION PIPELINE SUCCESS LOGS      ║
          ╚══════════════════════════════════════════════════════════════╝
          📊 PIPELINE JOB RUN COMPLETELY EXECUTED ACROSS ALL ENVIRONMENTS
          ├─ Android Target APK: Mind_Spark.apk (Direct Installer)
          ├─ Android Target AAB: Mind_Spark.aab (Play Store Upload)
          ├─ Apple iOS Target: Mind_Spark.app (Xcode Core Payload Container)
          ├─ Apple macOS Target: Mind_Spark_Desktop.app (Desktop App Binary)
          └─ Web Application Target: build/web/ (Progressive PWA Directory Site)
          EOF
          cat build/BUILD_MANIFEST.txt

      - name: 📤 [Step 19/19] Dispatch All Finished Multi-Platform Artifacts Packages to Cloud Slots
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Complete-Distribution-${{ github.run_number }}
          path: |
            build/release/android/Mind_Spark.apk
            build/release/android/Mind_Spark.aab
            build/release/android/*CHECKSUM*.txt
            build/release/ios/Mind_Spark.app
            build/release/macos/Mind_Spark_Desktop.app
            build/web/
            build/BUILD_MANIFEST.txt
          retention-days: 14
          if-no-files-found: error
