name: Mind Spark Deep Clean & Build

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Generate Unique Build Timestamp
        id: timestamp
        run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: 3. Setup Project Paths & Verify Assets
        run: |
          # Moves into your nested development directory so all steps run in the right place
          cd mind_spark_project
          mkdir -p assets/images
          if [ ! -f "assets/images/app_icon.png" ]; then
            echo "Generating fallback build graphic..."
            curl -s -o assets/images/app_icon.png "https://pub.dev"
          fi

      - name: 4. Set Up Clean Java Environment (No Cache)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 5. Set Up Flutter SDK (No Cache)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: false

      - name: 6. Non-Destructive Cache Cleansing
        run: |
          cd mind_spark_project
          flutter clean
          rm -rf .dart-tool/
          rm -rf .pub-cache/
          rm -rf ~/.gradle/caches/

      - name: 7. Fetch Packages & Add Splash Engine
        run: |
          cd mind_spark_project
          flutter pub get
          flutter pub add flutter_native_splash --dev

      - name: 8. Inject Flash Prevention Configurations
        run: |
          cd mind_spark_project
          cat << 'EOF' > flutter_native_splash.yaml
          flutter_native_splash:
            color: "#000000"
            image: "assets/images/app_icon.png"
            android_12:
              color: "#000000"
              image: "assets/images/app_icon.png"
          EOF

      - name: 9. Run Your Custom Code Generation (Build Runner)
        run: |
          cd mind_spark_project
          dart run build_runner build --delete-conflicting-outputs || echo "No builders needed"

      - name: 10. Hard-Bake Your Custom Logo Splash Screen & Icons
        run: |
          cd mind_spark_project
          dart run flutter_native_splash:create --path=flutter_native_splash.yaml
          dart run flutter_launcher_icons --file=pubspec.yaml || echo "Icons complete"

      - name: 11. Surgical Manifest Cleaning & Cloud Backup Block
        run: |
          cd mind_spark_project
          # Safely searches and removes default splash tags without rebuilding the file
          find android/app/src/main/ -name "AndroidManifest.xml" -exec sed -i '/android:name="io.flutter.embedding.android.SplashScreenDrawable"/d' {} \;
          find android/app/src/main/ -name "AndroidManifest.xml" -exec sed -i '/android:name="io.flutter.app.android.SplashScreenUntilFirstFrame"/d' {} \;
          find android/app/src/main/ -name "AndroidManifest.xml" -exec sed -i 's/android:allowBackup="true"/android:allowBackup="false"/g' {} \;
          find android/app/src/main/ -name "AndroidManifest.xml" -exec sed -i 's/android:fullBackupContent=".*"/android:fullBackupContent="@null"/g' {} \;

      - name: 12. Force Engine First-Frame Blackout
        run: |
          cd mind_spark_project
          find android/app/src/main/ -name "MainActivity.kt" -exec sed -i '/class MainActivity/a\    override fun onCreate(savedInstanceState: android.os.Bundle?) {\n        super.onCreate(savedInstanceState)\n        window.setBackgroundDrawable(android.graphics.drawable.ColorDrawable(android.graphics.Color.BLACK))\n    }' {} \;
          find android/app/src/main/ -name "MainActivity.java" -exec sed -i '/public class MainActivity/a\    @Override\n    protected void onCreate(android.os.Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        getWindow().setBackgroundDrawable(new android.graphics.drawable.ColorDrawable(android.graphics.Color.BLACK));\n    }' {} \;

      - name: 13. Brute-Force Native Asset Replacement
        run: |
          cd mind_spark_project
          find android/app/src/main/res/ -name "launch_background.png" -exec cp -f assets/images/app_icon.png {} \;
          find android/app/src/main/res/ -name "ic_launcher.png" -exec cp -f assets/images/app_icon.png {} \;
          find android/app/src/main/res/ -name "ic_launcher_foreground.png" -exec cp -f assets/images/app_icon.png {} \;

      - name: 14. Hardcode the Official App Label "Mind Spark"
        run: |
          cd mind_spark_project
          find android/app/src/main/ -name "AndroidManifest.xml" -exec sed -i 's/android:label=".*"/android:label="Mind Spark"/g' {} \;

      - name: 15. Force System Cache Eviction (Package ID Rotation)
        run: |
          cd mind_spark_project
          find android/app/ -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "com.example.mind_spark.clean"/g' {} \;

      - name: 16. Compile Authentic Android Application
        env:
          ORG_GRADLE_PROJECT_flutterCompileSdkVersion: "34"
          ORG_GRADLE_PROJECT_flutterTargetSdkVersion: "34"
        run: |
          cd mind_spark_project
          yes | flutter doctor --android-licenses || echo "Licenses verified"
          flutter build apk --debug --no-build-cache -t lib/main.dart

      - name: 17. Upload Your Pure Branded App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-clean-apk-${{ steps.timestamp.outputs.NOW }}
          path: mind_spark_project/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
