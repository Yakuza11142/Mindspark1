name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: 📦 Get Flutter Packages
        run: flutter pub get

      - name: 🩺 Flutter Doctor
        run: flutter doctor -v

      - name: 🎨 Setup App Logo
        run: |
          IMAGE_FILE="image_e1762c49 (1).png"
          
          mkdir -p assets/images
          mkdir -p assets/fonts

          if [ -f "$IMAGE_FILE" ]; then
            echo "✅ Successfully found $IMAGE_FILE in root directory."
          else
            echo "❌ Error: Could not find '$IMAGE_FILE' in the root directory!"
            exit 1
          fi

      - name: 🎨 Generate Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            # This completely bypasses the iOS config and forces it to only build for Android
            dart run flutter_launcher_icons --id launcher_icon
          else
            echo "⚠️ flutter_launcher_icons package not configured in pubspec.yaml"
          fi

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
