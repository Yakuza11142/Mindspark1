name: Mind Spark Deep Clean & Build
on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Codebase Files from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up JDK 17 (Matching Version)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 4. Build Missing Scaffolding & Vaporize Templates
        run: |
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/ || echo "No lib"
          cp pubspec.yaml /tmp/my_code/ || echo "No pubspec"
          
          flutter create . --overwrite --project-name mind_spark
          rm -rf lib test
          
          if [ -d "/tmp/my_code/lib" ]; then
            cp -r /tmp/my_code/lib .
          else
            mkdir -p lib
          fi
          cp /tmp/my_code/pubspec.yaml .

      - name: 5. Handle Assets & Icons Safety
        run: |
          mkdir -p assets/images assets/fonts
          touch assets/images/app_icon.png assets/fonts/Inter-Regular.ttf assets/fonts/Inter-Bold.ttf
          find . -maxdepth 1 -name "*.png" ! -name "app_icon.png" -exec cp {} assets/images/app_icon.png \; || echo "No custom logo"

      - name: 6. Inject Bulletproof Main File
        run: |
          if [ ! -f "lib/main.dart" ] || [ ! -s "lib/main.dart" ]; then
            cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(const MaterialApp(home: Scaffold(body: Center(child: Text('Mind Spark Active')))));
          EOF
          fi

      - name: 7. Direct Gradle Force Build
        run: |
          flutter clean
          flutter pub get
          cd android && ./gradlew assembleDebug --no-daemon

      - name: 8. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "android/app/build/outputs/apk/debug/app-debug.apk"
