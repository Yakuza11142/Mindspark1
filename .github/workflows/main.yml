name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production .env File
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
        run: |
          /usr/bin/mkdir -p assets
          echo "OPENAI_API_KEY=\${OPENAI_API_KEY}" > assets/.env
          echo "GEMINI_API_KEY=\${GEMINI_API_KEY}" >> assets/.env
          echo "PEXELS_API_KEY=\${PEXELS_API_KEY}" >> assets/.env
          echo "TRIPO_API_KEY=\${TRIPO_API_KEY}" >> assets/.env
          echo "RUNWAY_API_KEY=\${RUNWAY_API_KEY}" >> assets/.env
          echo "HEYGEN_API_KEY=\${HEYGEN_API_KEY}" >> assets/.env
          echo "MTN_API_KEY=\${MTN_API_KEY}" >> assets/.env

      - name: Get Dependencies
        run: flutter pub get

      - name: Force Gradle Hook to Patch Manifest
        run: |
          GRADLE_PATH="android/app/build.gradle"
          if [ -f "$GRADLE_PATH" ]; then
              cat << 'EOF' >> "$GRADLE_PATH"
          
          android.applicationVariants.all { variant ->
              variant.outputs.all { output ->
                  output.processManifestProvider.get().doLast { task ->
                      def manifestFile = task.manifestOutputFile.get().asFile
                      if (manifestFile.exists()) {
                          def text = manifestFile.text
                          text = text.replace('name=', 'android:name=')
                          text = text.replace('label=', 'android:label=')
                          text = text.replace('icon=', 'android:icon=')
                          text = text.replace('value=', 'android:value=')
                          text = text.replace('exported=', 'android:exported=')
                          text = text.replace('theme=', 'android:theme=')
                          text = text.replace('hardwareAccelerated=', 'android:hardwareAccelerated=')
                          text = text.replace('windowSoftInputMode=', 'android:windowSoftInputMode=')
                          text = text.replace('configChanges=', 'android:configChanges=')
                          text = text.replace('required=', 'android:required=')
                          text = text.replace('launchMode=', 'android:launchMode=')
                          text = text.replace('xmlns:android="http://android.com"', 'xmlns:android="http://android.com"')
                          manifestFile.text = text
                      }
                  }
              }
          }
          EOF
              echo "=== Gradle File Successfully Hooked ==="
          fi

      - name: Build Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          /usr/bin/mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }}

      - name: Calculate Cryptographic Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          sha256sum "$APK_PATH" | awk '{print $1}' > sha256.txt
          sha512sum "$APK_PATH" | awk '{print $1}' > sha512.txt
          openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
          openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt

      - name: Upload Secured App Package
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha256.txt
            sha512.txt
            sha3_256.txt
            sha512.txt
