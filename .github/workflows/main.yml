name: Flutter Mobile Cloud Build

on:
  workflow_dispatch: # Allows you to trigger the build manually from your phone

jobs:
  build:
    runs-on: macos-latest # Required to build both iOS and Android

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (For Android Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Fix iOS Pods (Paddle)
        run: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build Android APK (Fradle)
        run: flutter build apk --release

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Cloud-Built-App
          path: build/app/outputs/flutter-apk/app-release.apk
