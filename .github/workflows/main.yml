name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Codebase from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      # WIPE ROOT BLOCKS: Destroys root template folders so the machine cannot build them
      - name: 4. Clear Generic Template Folders
        run: |
          rm -rf lib
          rm -rf android
          rm -rf ios

      # EMBED IMAGE: Automatically finds your brain globe graphic and saves it as the active logo asset
      - name: 5. Inject Mind Spark Custom Logo
        run: |
          mkdir -p mind_spark_project/assets
          find . -maxdepth 1 -name "*.png" ! -name "logo.png" -exec cp {} mind_spark_project/assets/logo.png \; || echo "Logo fallback handled"

      # MAP CONFIG: Enforces asset configuration file paths without human input
      - name: 6. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" mind_spark_project/pubspec.yaml; then
            echo "  assets:" >> mind_spark_project/pubspec.yaml
            echo "    - assets/logo.png" >> mind_spark_project/pubspec.yaml
          fi

      # RESOLVE CUSTOM CODE DEPS: Loads packages specifically inside your custom directory
      - name: 7. Load Project Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "mind_spark_project"

      # TARGET ONLY CUSTOM CODE: Instructs the compiler to strictly compile your custom directory (-t lib/main.dart)
      - name: 8. Build Custom Android App
        run: |
          flutter build apk --debug -t lib/main.dart
        working-directory: "mind_spark_project"

      # DELIVER APP PACKAGE: Gathers your custom app build file for download
      - name: 9. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
