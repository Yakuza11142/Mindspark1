name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch: # Allows manual trigger from your phone

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Latest Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      # FORCE BYPASS FOR DEPENDENCY ERRORS: Repairs package cache and upgrades broken legacy versions
      - name: Resolve Internal Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "."

      # AUTOMATED PLAN B SCRIPT: Automatically overwrites your old v1 Android structure right inside the cloud runner
      - name: Upgrade Broken Mobile Layout Structure
        run: |
          flutter create . --overwrite
        working-directory: "."

      - name: Build Android App Bundle (Code & Logo Only)
        run: flutter build apk --debug
        working-directory: "."

      - name: Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
