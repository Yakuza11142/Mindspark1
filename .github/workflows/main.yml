name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Codebase
        uses: actions/checkout@v4

      - name: 2. Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Latest Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      - name: 4. Recreate Platform Layout Files
        run: |
          flutter create . --overwrite
        working-directory: "mind_spark_project"

      - name: 5. Set App Name to Mind Spark
        run: |
          sed -i 's/android:label=".*"/android:label="Mind Spark"/' mind_spark_project/android/app/src/main/AndroidManifest.xml

      - name: 6. Add Custom Logo Image
        run: |
          mkdir -p mind_spark_project/assets
          cp ChatGPT* mind_spark_project/assets/logo.png || echo "Logo already in place"

      - name: 7. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" mind_spark_project/pubspec.yaml; then
            echo "  assets:" >> mind_spark_project/pubspec.yaml
            echo "    - assets/logo.png" >> mind_spark_project/pubspec.yaml
          fi

      - name: 8. Load Project Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "mind_spark_project"

      - name: 9. Build Custom Android App
        run: |
          flutter build apk --debug
        working-directory: "mind_spark_project"

      - name: 10. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
