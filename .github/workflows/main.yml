name: mind_spark_1

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository Code Structure
        uses: actions/checkout@v4

      - name: 📋 Log Active Build Commit SHA
        run: echo "🚀 Compiling codebase assets linked to commit SHA -> ${{ github.sha }}"

      - name: ☕ Initialize Java Runtime Environment (v17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🤖 Auto-Accept Android SDK Licensing
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2d05b41312163e1a37cd28b38e0429e7012e" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license
          echo "✅ Android SDK licenses signed off."

      - name: 🦋 Initialize Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: 🔐 Configure Local Environment Token Wrapper
        run: |
          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > .env
            echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
            echo "✅ Generated temporary compilation .env wrapper containing only Supabase keys."
          fi

      - name: 🛠️ Upgrade to Android v2 Embedding
        run: |
          if [ -d "android" ]; then
            echo "⚙️ Automatically migrating legacy v1 configurations..."
            # Remove the old plugin registry import and call if they exist in MainActivity
            find android/app/src/main -name "MainActivity.java" -exec sed -i '/import io.flutter.plugins.GeneratedPluginRegistrant;/d' {} +
            find android/app/src/main -name "MainActivity.java" -exec sed -i '/GeneratedPluginRegistrant.registerWith(this);/d' {} +
            find android/app/src/main -name "MainActivity.kt" -exec sed -i '/import io.flutter.plugins.GeneratedPluginRegistrant/d' {} +
            find android/app/src/main -name "MainActivity.kt" -exec sed -i '/GeneratedPluginRegistrant.registerWith/d' {} +
            
            # Clean obsolete v1 embedding metadata tags from AndroidManifest
            if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
              sed -i '/android:name="io.flutter.app.FlutterApplication"/d' android/app/src/main/AndroidManifest.xml
              sed -i '/<meta-data android:name="flutterEmbedding" android:value="1"/d' android/app/src/main/AndroidManifest.xml
            fi
            echo "✅ Legacy v1 tags sanitized."
          fi

      - name: 🧼 Evict Cache Metadata Layers
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool/
          rm -rf android/.gradle/
          rm -rf android/app/build/
          echo "✅ Cleared all local and native build caching artifacts."

      - name: 📦 Sync Package Tree Graph
        run: flutter pub get

      - name: 🔒 Grant Native Gradle Script Access
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ gradlew execution permissions granted."
          fi

      - name: 🏗️ Compile Pure Obfuscated Android-Only APK Binary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ELEVEN_LABS_API_KEY: ${{ secrets.ELEVEN_LABS_API_KEY }}
          PEXELS_KEY: ${{ secrets.PEXELS_KEY }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
        run: |
          mkdir -p build/app/outputs/symbols
          flutter build apk --release \
            --target-platform=android-arm64 \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols \
            --dart-define=GEMINI_API_KEY=$GEMINI_API_KEY \
            --dart-define=RUNWAYML_API_SECRET=$RUNWAYML_API_SECRET \
            --dart-define=MTN_API_KEY=$MTN_API_KEY \
            --dart-define=OPENAI_API_KEY=$OPENAI_API_KEY \
            --dart-define=GROQ_API_KEY=$GROQ_API_KEY \
            --dart-define=ELEVEN_LABS_API_KEY=$ELEVEN_LABS_API_KEY \
            --dart-define=PEXELS_KEY=$PEXELS_KEY \
            --dart-define=TRIPO_API_KEY=$TRIPO_API_KEY

      - name: 📤 Export Built Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Obfuscated-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
