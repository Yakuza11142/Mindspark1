name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

defaults:
  run:
    working-directory: mind_spark_project

jobs:
  # =========================================================================
  # 🤖 JOB 1: THE UNIFIED MOBILE STACK (ANDROID APK + AAB & APPLE iOS)
  # =========================================================================
  build_mobile_apps:
    runs-on: macos-latest
    name: 📱 Build Mobile Core (Android + iOS)
    
    steps:
      - name: 📥 [Step 1/19] Checkout complete repository source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ [Step 2/19] Initialize Java 17 Temurin Core Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 [Step 3/19] Mount Flutter 3.22.0 Production Compiler Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ [Step 4/19] Run Mobile Workspace Environmental Probes
        run: |
          echo "🔬 QUANTUM DIAGNOSTICS: TESTING MOBILE DEPENDENCY ROOTS..."
          flutter --version
          dart --version
          java -version
          ls -la

      - name: 🔧 [Step 5/19] Force Strict Gradle File System Directory Permissions
        run: |
          find . -name "gradlew" -exec chmod +x {} \; || echo "No gradlew found"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 [Step 6/19] Deep Purge Local Project Target Cache Configurations
        run: |
          flutter clean
          rm -rf build/ .dart_tool/

      - name: 📦 [Step 7/19] Fetch All Project Package Dependency Tree Maps
        run: flutter pub get

      - name: 🎨 [Step 8/19] Global Repository Scanning Logo Interception Matrix
        run: |
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
            echo "✅ True application logo file copied to assets."
          else
            echo "❌ CRITICAL ABORT: Logo file missing from repository!" && exit 1
          fi

      - name: 🔧 [Step 9/19] Run Background Code Generation Serialization Tools
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: 📋 [Step 10/19] Analyze Application Syntaxes Structure Safely
        run: flutter analyze --no-pub --no-fatal-infos

      - name: 🔐 [Step 11/19] Bake Branded Logo into Native Assets Structures
        run: flutter pub run flutter_launcher_icons

      - name: 🏗️ [Step 12/19] BUILD OBFUSCATED ANDROID Direct Installer Package (APK)
        run: |
          if [ -d "android" ]; then
            flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm
          else
            echo "❌ ERROR: android/ folder missing inside subfolder!" && exit 1
          fi

      - name: 🏗️ [Step 13/19] BUILD OBFUSCATED ANDROID Store App Bundle Package (AAB)
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 🏗️ [Step 14/19] BUILD APPLE iOS ENCRYPTED CODE BUNDLE PAYLOAD
        run: |
          if [ -d "ios" ]; then
            cd ios && pod repo update && pod install && cd ..
            flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-debug-info/
          else
            echo "❌ ERROR: ios/ folder missing inside subfolder!" && exit 1
          fi

      - name: 📂 [Step 15/19] Stage and Organize Verified Mobile Target Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/mobile_distribution
          cp build/app/outputs/apk/release/app-release.apk $GITHUB_WORKSPACE/mobile_distribution/Mind_Spark.apk
          cp build/app/outputs/bundle/release/app-release.aab $GITHUB_WORKSPACE/mobile_distribution/Mind_Spark.aab
          if [ -d "build/ios/iphoneos/Runner.app" ]; then cp -R build/ios/iphoneos/Runner.app $GITHUB_WORKSPACE/mobile_distribution/Mind_Spark_iOS.app; fi

      - name: 🔐 [Step 16/19] Compute Cryptographic Verification Checksum Fingerprints
        run: |
          cd $GITHUB_WORKSPACE/mobile_distribution
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt

      - name: 📋 [Step 17/19] Compile Comprehensive Mobile Manifest Documentation Logs
        run: |
          cat > $GITHUB_WORKSPACE/mobile_distribution/BUILD_MANIFEST.txt << 'EOF'
          ╔══════════════════════════════════════════════════════════════╗
          ║   MIND SPARK - MOBILE PIPELINE SUCCESS LOGS                  ║
          ╚══════════════════════════════════════════════════════════════╝
          ✅ Android Installer: Mind_Spark.apk
          ✅ Android Store Bundle: Mind_Spark.aab
          ✅ iOS Sandbox Container: Mind_Spark_iOS.app
          EOF

      - name: 📤 [Step 18/19] Dispatch Finished Android Artifact Installation Packages (APK + AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-Apps
          path: |
            mobile_distribution/Mind_Spark.apk
            mobile_distribution/Mind_Spark.aab
            mobile_distribution/BUILD_MANIFEST.txt
            mobile_distribution/CHECKSUM*.txt
          retention-days: 30

      - name: 📤 [Step 19/19] Dispatch Finished Apple iOS App Core Bundle Package
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-iOS-App-Container
          path: mobile_distribution/Mind_Spark_iOS.app
          retention-days: 14

  # =========================================================================
  # 🌐 JOB 2: ISOLATED WEB APPLICATION PORTAL BUILD - RUNS SEPARATELY ON LINUX
  # =========================================================================
  build_web_platform:
    runs-on: ubuntu-latest
    name: 🌐 Web Pipeline
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Fetch All Project Package Dependencies
        run: flutter pub get

      - name: 🏗️ BUILD COMPACT COMPILED PRODUCTION WEB ARCHITECTURE
        run: flutter build web --release --web-renderer auto

      - name: 📤 Upload Production Web Engine Static Site Folder
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Web-Site
          path: mind_spark_project/build/web/
          retention-days: 30
