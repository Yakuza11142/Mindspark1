name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Setup Java Toolchain
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production Config File
        run: |
          mkdir -p assets
          URL="${{ secrets.SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          echo "SUPABASE_URL=${URL:-https://supabase.co}" > assets/.env
          echo "SUPABASE_ANON_KEY=${KEY:-placeholder-fallback-token}" >> assets/.env

      - name: Recreate Clean Android Project Files
        run: |
          flutter clean
          rm -rf android
          flutter create .

      - name: Inject Patched Root Gradle Structure
        run: |
          rm -f android/build.gradle.kts
          
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '2.0.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven {
                      url 'https://googleapis.com'
                  }
              }
          }

          rootProject.buildDir = '../build'

          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              
              afterEvaluate { project ->
                  if (project.hasProperty('configurations')) {
                      project.configurations.configureEach {
                          // Bypasses the 'unknown property all' exception in Gradle 8+
                      }
                  }
              }
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Inject Final App Build Gradle
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0.0'

          android {
              namespace "com.example.mindspark"
              compileSdk 34
              ndkVersion "25.1.8937393"

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }

              signingConfigs {
                  debug {
                      storeFile file(System.getProperty('user.home') + '/.android/debug.keystore')
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }

              defaultConfig {
                  applicationId "com.example.mindspark"
                  minSdkVersion 24  
                  targetSdkVersion 34
                  versionCode flutterVersionCode.toInteger()
                  versionName flutterVersionName
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }

              lintOptions {
                  checkReleaseBuilds false
                  abortOnError false
              }
          }

          afterEvaluate {
              tasks.all { task ->
                  if (task.name.contains("processReleaseMainManifest") || task.name.contains("processDebugMainManifest")) {
                      task.enabled = true
                  }
              }
          }

          dependencies {
              // Kept clean. Redundant manual multidex implementation lines removed to prevent conflicts.
          }
          EOF

      - name: Fetch Application Dependencies
        run: |
          flutter pub get

      - name: Compile Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }} \
            --android-skip-build-dependency-validation \
            --pub

      - name: Generate Cryptographic SHA3 Verification Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
            openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt
          else
            echo "Error: Target APK bundle not generated by compiler execution layout." && exit 1
          fi

      - name: Upload Secured App Packages
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          retention-days: 7
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha3_256.txt
            sha3_512.txt
