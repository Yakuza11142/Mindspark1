name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout full repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup JDK 17 for Android compilation
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 3. Setup Flutter 3.22.0 with caching
      - name: Setup Flutter 3.22.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 4. Verify installations
      - name: Verify SDK versions
        run: |
          flutter --version
          dart --version
          java -version

      # 5. Clean and fetch dependencies
      - name: Get dependencies
        run: |
          flutter clean
          flutter pub get
          flutter pub get --offline || true

      # 6. Run code generation if needed
      - name: Generate code
        run: |
          flutter pub run build_runner build --delete-conflicting-outputs || true

      # 7. Run flutter analyze
      - name: Analyze code
        run: |
          flutter analyze --no-pub --no-fatal-infos || true

      # 8. Run tests (optional)
      - name: Run tests
        run: |
          flutter test || true

      # 9. Build release APK with obfuscation
      - name: Build release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/ \
            -v

      # 10. Rename APK to Mind_Spark.apk
      - name: Rename APK
        run: |
          mkdir -p build/release
          mv build/app/outputs/apk/release/app-release.apk build/release/Mind_Spark.apk
          ls -lh build/release/Mind_Spark.apk

      # 11. Generate security checksums
      - name: Generate checksums
        run: |
          cd build/release
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt
          sha512sum Mind_Spark.apk > CHECKSUM_SHA512.txt
          md5sum Mind_Spark.apk > CHECKSUM_MD5.txt
          cat CHECKSUM_SHA256.txt

      # 12. Upload APK artifacts
      - name: Upload Mind Spark APK
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Release-APK
          path: build/release/
          retention-days: 30
          if-no-files-found: error

      # 13. Build success notification
      - name: Build Success
        if: success()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════╗"
          echo "║    ✅ MIND SPARK APK BUILD SUCCESSFUL! ✅       ║"
          echo "╚════════════════════════════════════════════════════╝"
          echo ""
          echo "📱 APK Name: Mind_Spark.apk"
          echo "📊 Size: $(du -h build/release/Mind_Spark.apk | cut -f1)"
          echo "📍 Location: build/release/"
          echo "🔐 Checksums: SHA256, SHA512, MD5"
          echo "🎯 Download from: Actions → Artifacts → Mind-Spark-Release-APK"
          echo ""

      # 14. Build failure notification
      - name: Build Failed
        if: failure()
        run: |
          echo "❌ Build failed! Check logs above for details."
          exit 1
