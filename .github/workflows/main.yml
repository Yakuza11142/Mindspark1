name: Mind Spark Deep Clean & Build

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull All Codebase Files from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Node.js 24 Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 4. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # DEEP CLEAN: Permanently vaporizes the generic root template files so they can never trick the compiler again
      - name: 5. Deep Clean Root Template Files
        run: |
          rm -rf ./lib
          rm -rf ./android
          rm -rf ./ios
          rm -f ./pubspec.yaml
          rm -f ./pubspec.lock

      # LOGO INJECTION: Finds your brain-globe image, copies it, and names it logo.png inside your real asset folder
      - name: 6. Inject Mind Spark Custom Logo
        run: |
          mkdir -p mind_spark_project/assets
          find . -maxdepth 1 -name "*.png" ! -name "logo.png" -exec cp {} mind_spark_project/assets/logo.png \; || echo "Logo handled"

      # LINK LOGO: Forcefully appends the asset path inside your project settings configuration block
      - name: 7. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" mind_spark_project/pubspec.yaml; then
            sed -i '/flutter:/a \  assets:\n    - assets/logo.png' mind_spark_project/pubspec.yaml
          fi

      # PLATFORM FIX: Generates missing platform files directly inside your real app folder
      - name: 8. Recreate Platform Layout Files
        run: |
          flutter create . --overwrite
        working-directory: "mind_spark_project"

      # NAME INJECTION: Hardcodes your chosen app name directly into the Android layout configuration
      - name: 9. Apply App Name to Manifest
        run: |
          if [ -f mind_spark_project/android/app/src/main/AndroidManifest.xml ]; then
            sed -i 's/android:label=".*"/android:label="Mind Spark"/' mind_spark_project/android/app/src/main/AndroidManifest.xml
          fi

      # OVERRIDE DEPENDENCY HELL: Force upgrades outdated Dart dependencies to stop the "deps failed" crash
      - name: 10. Clear Cache and Force Update Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "mind_spark_project"

      # COMPILER PASS: Compiles your real custom screens into a working application binary
      - name: 11. Build Custom Android App
        run: |
          flutter build apk --debug -t lib/main.dart
        working-directory: "mind_spark_project"

      # DELIVER APP PACKAGE: Delivers your completed, template-free app straight to your device
      - name: 12. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
