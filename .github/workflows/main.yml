name: Mind Spark Deep Clean & Build
on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull All Codebase Files from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up Java Compiler Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Node.js 24 Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 4. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 5. Backup Your Custom Files
        run: |
          mkdir -p /tmp/backup_spark
          cp -r lib /tmp/backup_spark/
          cp pubspec.yaml /tmp/backup_spark/

      - name: 6. Total Root Wipe (Vaporize Old Project Structure)
        run: |
          rm -rf lib android ios pubspec.yaml pubspec.lock

      - name: 7. Recreate Clean Platform Layout Files in Root
        run: |
          flutter create . --overwrite --project-name mind_spark

      - name: 8. Exterminate Template & Restore Your Code
        run: |
          rm -rf lib
          cp -r /tmp/backup_spark/lib .
          cp /tmp/backup_spark/pubspec.yaml .

      - name: 9. Inject Mind Spark Custom Logo
        run: |
          mkdir -p assets
          find . -maxdepth 1 -name "*.png" ! -name "logo.png" -exec cp {} assets/logo.png \; || echo "Logo handled"

      - name: 10. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" pubspec.yaml; then
            sed -i '/flutter:/a \  assets:\n    - assets/logo.png' pubspec.yaml
          fi

      - name: 11. Apply App Name to Manifest
        run: |
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i 's/android:label=".*"/android:label="Mind Spark"/' android/app/src/main/AndroidManifest.xml
          fi

      - name: 12. Clear Cache and Force Update Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions

      - name: 13. Build Custom Android App
        run: |
          flutter build apk --debug -t lib/main.dart

      - name: 14. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "build/app/outputs/flutter-apk/app-debug.apk"
