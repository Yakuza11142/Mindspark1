name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Codebase
        uses: actions/checkout@v4

      - name: 2. Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Setup Latest Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      # 4. Cleans out any generic template files sitting in the main directory
      - name: 4. Wipe Out Generic Main Folder Templates
        run: |
          rm -rf lib
          rm -rf android
          rm -rf ios

      # 5. Copies your ChatGPT logo directly into your real project folder assets
      - name: 5. Add Custom Logo Image
        run: |
          mkdir -p mind_spark_project/assets
          cp ChatGPT* mind_spark_project/assets/logo.png || echo "Logo already in place"

      # 6. Forcefully links the logo asset inside your custom settings file
      - name: 6. Link Logo in Configuration File
        run: |
          if ! grep -q "assets/logo.png" mind_spark_project/pubspec.yaml; then
            echo "  assets:" >> mind_spark_project/pubspec.yaml
            echo "    - assets/logo.png" >> mind_spark_project/pubspec.yaml
          fi

      # 7. Loads the exact packages needed for your 2,000 files
      - name: 7. Load Project Dependencies
        run: |
          flutter pub cache clean --force
          flutter pub get || flutter pub upgrade --major-versions
        working-directory: "mind_spark_project"

      # 8. FIXED: Forcefully targets your custom application entry file (-t) so it cannot build the template
      - name: 8. Build Custom Android App
        run: |
          flutter build apk --debug -t lib/main.dart
        working-directory: "mind_spark_project"

      # 9. Saves your finished custom app for download
      - name: 9. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
