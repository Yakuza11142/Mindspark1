name: Mind Spark Compatibility CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # Lowered Java to match legacy embedding expectations

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # FIXED: Forces an older engine that supports v1 embedding structures perfectly
          channel: 'stable' 

      - name: Resolve Internal Dependencies
        run: |
          flutter clean
          flutter pub get
        working-directory: "."

      - name: Build Android App Bundle (Code & Logo Only)
        run: flutter build apk --debug
        working-directory: "."
