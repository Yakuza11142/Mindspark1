name: mind_spark

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # JOB 1: Handles Android Compilation (Fast & Free Linux Runner)
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # Fixes strict Gradle & safe_device requirements

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Resolve Dependencies & Secure Spaces
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get
        working-directory: "." # Forces Linux to safely interpret paths if folders have spaces

      - name: Generate Hive Database Schemas
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: "."

      - name: Build Android App Bundle
        run: flutter build apk --debug
        working-directory: "."

  # JOB 2: Handles iOS Compilation (Mac Toolchain to fix Exit Code 65)
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Resolve Dependencies & Secure Spaces
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get
        working-directory: "."

      - name: Generate Hive Database Schemas
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: "."

      - name: Purge & Rebuild iOS CocoaPods (Fixes Exit Code 65)
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..
        working-directory: "."

      - name: Build iOS Framework Bypass
        run: flutter build ios --no-codesign --simulator
        working-directory: "." # Prevents path splits and skips Apple Profile code signing locks
