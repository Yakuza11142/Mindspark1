name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Setup Java Toolchain
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production Config File
        run: |
          mkdir -p assets
          URL="${{ secrets.SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          echo "SUPABASE_URL=${URL:-https://supabase.co}" > assets/.env
          echo "SUPABASE_ANON_KEY=${KEY:-placeholder-fallback-token}" >> assets/.env

      - name: Fetch Application Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Force Clean Manifest Namespaces and Prefixes
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # 1. Fix the broken namespace URLs
          sed -i 's|xmlns:android="http://android.com"|xmlns:android="http://android.com"|g' "$MANIFEST_PATH"
          sed -i 's|xmlns:tools="http://android.com"|xmlns:tools="http://android.com"|g' "$MANIFEST_PATH"
          
          # 2. Automatically inject missing android: prefixes to key attributes just in case
          sed -i -E 's/\b(name|value|required|launchMode|exported)="/android:\1="/g' "$MANIFEST_PATH"
          
          # 3. Clean up any accidental double-prefixes caused by the step above
          sed -i 's/android:android:/android:/g' "$MANIFEST_PATH"
          
          echo "=== Repaired AndroidManifest.xml Content ==="
          cat "$MANIFEST_PATH"

      - name: Compile Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }} \
            --android-skip-build-dependency-validation \
            --pub

      - name: Generate Cryptographic SHA3 Verification Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
            openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt
          else
            echo "Error: Target APK bundle not generated by compiler execution layout." && exit 1
          fi

      - name: Upload Secured App Packages
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          retention-days: 7
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha3_256.txt
            sha3_512.txt
