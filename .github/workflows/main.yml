name: Mind Spark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true 

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            **/.dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install All Dependencies
        run: |
          flutter pub get
          # If your watch uses code-gen for sensors or JSON, this is required:
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: Build obfuscated Release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Generate Checksums
        working-directory: build/app/outputs/apk/release
        run: |
          sha256sum app-release.apk > app-release.apk.sha256
          sha512sum app-release.apk > app-release.apk.sha512
          {
            echo "=== Security Checksums ==="
            echo "SHA-256: $(cat app-release.apk.sha256)"
            echo "SHA-512: $(cat app-release.apk.sha512)"
            echo "Date: $(date)"
          } > CHECKSUMS.txt

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release
          path: build/app/outputs/apk/release/
