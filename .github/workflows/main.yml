name: Mind Spark Multi-Platform Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile_cross_platform:
    name: 🍏📱 Build Android APK & iOS IPA
    runs-on: macos-14

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: false

      - name: 🎨 Setup App Logo and Asset Infrastructure
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts

          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
          fi

          if [ -f "image_e1762c49 (1).png" ]; then
            cp "image_e1762c49 (1).png" assets/images/logo.png
          elif [ -f "assets/images/logo.png" ]; then
            echo "✅ Logo already present."
          else
            touch assets/images/logo.png
          fi

      - name: 🧼 Evict Legacy Cache Layers
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool/

      - name: 📦 Get Flutter Packages
        run: flutter pub get

      - name: 🩺 Flutter Diagnostics Configuration
        run: flutter doctor -v

      - name: 🩹 Force Patch Hidden Android Legacy Embeddings
        run: |
          echo "🔍 Scanning and patching all internal Android Manifest templates..."
          # Replaces any hidden v1 application class strings across all files
          find android/ -name "AndroidManifest.xml" -exec sed -i '' 's/io.flutter.app.FlutterApplication/\${applicationName}/g' {} +
          
          # Force injects the v2 embedding flag if missing anywhere
          find android/ -name "AndroidManifest.xml" -exec sed -i '' '/<\/application>/i\
          <meta-data android:name="flutterEmbedding" android:value="2" />\
          ' {} +
          echo "✅ All hidden manifest configurations patched."

      - name: 🎨 Generate Branded Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "⚠️ Skipping launcher icon mapping."
          fi

      - name: 🏗️ Compile Android Release APK
        run: |
          flutter build apk --release

      - name: 🏗️ Compile iOS Test IPA Bundle
        run: |
          flutter build ipa --release --no-codesign

      - name: 📤 Upload Compiled Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: 📤 Upload Compiled iOS App Payload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-iOS-Bundle
          path: build/ios/ipa/*.ipa
          retention-days: 14
