name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production .env File
        run: |
          /usr/bin/mkdir -p assets
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/.env

      - name: Get Dependencies
        run: flutter pub get

      - name: Automatic Manifest Repair
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Repairing manifest namespaces automatically..."
            # Replace the broken android.com namespace URI with the correct schema URL
            sed -i 's|xmlns:android="http://android.com"|xmlns:android="http://android.com"|g' "$MANIFEST_PATH"
            # Repair the app icon path from launcher_icon to the standard ic_launcher
            sed -i 's|android:icon="@mipmap/launcher_icon"|android:icon="@mipmap/ic_launcher"|g' "$MANIFEST_PATH"
            # Replace the broken system theme with the official Flutter theme layout
            sed -i 's|android:theme="@android:style/Theme.DeviceDefault.Light.NoTitleBar"|android:theme="@style/LaunchTheme"|g' "$MANIFEST_PATH"
          else
            echo "Error: Manifest file not found at $MANIFEST_PATH"
            exit 1
          fi

      - name: Build Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          /usr/bin/mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }}

      - name: Calculate Cryptographic Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          sha256sum "$APK_PATH" | awk '{print $1}' > sha256.txt
          sha512sum "$APK_PATH" | awk '{print $1}' > sha512.txt
          openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
          openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt

      - name: Upload Secured App Package
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha256.txt
            sha512.txt
            sha3_256.txt
            sha3_512.txt
