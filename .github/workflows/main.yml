name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: 📦 Get Flutter Packages
        run: flutter pub get

      - name: 🩺 Flutter Doctor
        run: flutter doctor -v

      - name: 🎨 Setup App Logo and Asset Infrastructure
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts

          # Safely creates a dummy .env file if it doesn't exist to prevent pubspec build crashes
          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
            echo "📝 Created dummy .env file for build compilation safety."
          fi

          # Handles the filename spaces and moves it to your asset path
          if [ -f "image_e1762c49 (1).png" ]; then
            echo "✅ Successfully found logo image file."
            mv "image_e1762c49 (1).png" assets/images/logo.png
            echo "🚚 Moved image file to assets/images/logo.png"
          elif [ -f "assets/images/logo.png" ]; then
            echo "✅ Logo already exists in assets directory."
          else
            echo "❌ Error: Could not find your image asset anywhere!"
            exit 1
          fi

      - name: 🎨 Generate Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "⚠️ flutter_launcher_icons package not configured in pubspec.yaml"
          fi

      - name: 🏗️ Build Release APK
        run: |
          flutter build apk --release

      - name: 📤 Upload APK Artifact to GitHub Action Summary
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
