name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # 🤖 JOB 1: ANDROID COMPILATION (APK + APP BUNDLE AAB) - RUNS ON LINUX
  # =========================================================================
  build_android:
    runs-on: ubuntu-latest
    name: 🤖 Android Pipeline
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Initialize Java 17 Temurin Core Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Mount Flutter 3.22.0 Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Run Global Repository Path Scanner
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 🔧 Force Strict Gradle File Permissions
        run: |
          find . -name "gradlew" -exec chmod +x {} \; || echo "Deferred"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 Deep Purge Project Cache Configurations
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean

      - name: 📦 Fetch All Project Package Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🎨 Global Logo Interception Matrix
        run: |
          cd ${{ env.PROJECT_ROOT }}
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
          else
            exit 1
          fi

      - name: 🔧 Run Code Generation Serialization Tools
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: 📋 Analyze Application Syntaxes Structure
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter analyze --no-pub --no-fatal-infos

      - name: 🔐 Bake Branded Logo into Native Assets
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub run flutter_launcher_icons

      - name: 🏗️ BUILD OBFUSCATED ANDROID Direct Installer Package (APK)
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm

      - name: 🏗️ BUILD OBFUSCATED ANDROID Store App Bundle Package (AAB)
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 📂 Stage and Sync Verified Target Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/android_distribution
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/apk/release/app-release.apk" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.apk
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/bundle/release/app-release.aab" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.aab

      - name: 📤 Upload Direct Device Phone Installer Package (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-APK
          path: android_distribution/Mind_Spark.apk
          retention-days: 14

      - name: 📤 Upload Play Store Distribution Artifact (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-PlayStore-AAB
          path: android_distribution/Mind_Spark.aab
          retention-days: 14

  # =========================================================================
  # 🍏 JOB 2: APPLE iOS & macOS COMPILATION - RUNS ON MACOS
  # =========================================================================
  build_apple:
    runs-on: macos-latest
    name: 🍏 Apple Pipeline
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Run Global Repository Path Scanner
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 📦 Fetch All Project Package Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🍏 Initialize Native CocoaPods Workspace
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -d "ios" ]; then
            cd ios && pod repo update && pod install && cd ..
          fi

      - name: 🎨 Bake Custom Branded Logo Assets
        run: |
          cd ${{ env.PROJECT_ROOT }}
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
          fi
          flutter pub run flutter_launcher_icons

      - name: 🏗️ COMPILE APPLE iOS ENCRYPTED CODE BUNDLE
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -d "ios" ]; then
            flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-debug-info/
          fi

      - name: 🏗️ COMPILE NATIVE MAC DESKTOP PRODUCTION BUNDLE
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -d "macos" ]; then
            flutter config --enable-macos-desktop
            flutter build macos --release --obfuscate --split-debug-info=build/macos-debug-info/
          fi

      - name: 📂 Stage Apple Workspace Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/apple_distribution
          if [ -d "${{ env.PROJECT_ROOT }}/build/ios/iphoneos/Runner.app" ]; then cp -R "${{ env.PROJECT_ROOT }}/build/ios/iphoneos/Runner.app" $GITHUB_WORKSPACE/apple_distribution/Mind_Spark_iOS.app; fi
          if [ -d "${{ env.PROJECT_ROOT }}/build/macos/Build/Products/Release/mind_spark.app" ]; then cp -R "${{ env.PROJECT_ROOT }}/build/macos/Build/Products/Release/mind_spark.app" $GITHUB_WORKSPACE/apple_distribution/Mind_Spark_Mac.app; fi

      - name: 📤 Upload Native iOS App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-iOS-Container
          path: apple_distribution/Mind_Spark_iOS.app
          retention-days: 14

      - name: 📤 Upload Standalone Native macOS Desktop Executable
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-macOS-Desktop
          path: apple_distribution/Mind_Spark_Mac.app
          retention-days: 14

  # =========================================================================
  # 🌐 JOB 3: WEB PORTAL RUNTIME TARGET COMPILE - RUNS ON LINUX
  # =========================================================================
  build_web:
    runs-on: ubuntu-latest
    name: 🌐 Web Pipeline
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Run Global Repository Path Scanner
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 📦 Fetch All Project Package Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🏗️ BUILD COMPACT COMPILED PRODUCTION WEB ARCHITECTURE
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build web --release --web-renderer auto

      - name: 📤 Upload Production Web Engine Static Site Folder
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Web-Release
          path: ${{ env.PROJECT_ROOT }}/build/web/
          retention-days: 14
