name: mind_spark_build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reset Lock Files
        run: rm -f pubspec.lock

      - name: Download Libraries
        run: flutter pub get --no-analytics

      - name: Build Secure APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: Prepare Final Output Directory
        run: |
          mkdir -p build/secure_release
          cp build/app/outputs/flutter-apk/app-release.apk build/secure_release/Mind_Spark.apk

      - name: Generate Security Checksums
        run: |
          cd build/secure_release/
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt
          sha512sum Mind_Spark.apk > CHECKSUM_SHA512.txt
          md5sum Mind_Spark.apk > CHECKSUM_MD5.txt

      - name: Save Secure APK & Hashes
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Secure-Package
          path: build/secure_release/
          retention-days: 90
