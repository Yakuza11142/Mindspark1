name: mind_spark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reset Lock Files
        run: rm -f pubspec.lock

      - name: Download Libraries
        run: flutter pub get

      - name: Build Secure APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
