name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Setup Java Toolchain
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production Config File
        run: |
          mkdir -p assets
          URL="${{ secrets.SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          echo "SUPABASE_URL=${URL:-https://supabase.co}" > assets/.env
          echo "SUPABASE_ANON_KEY=${KEY:-placeholder-fallback-token}" >> assets/.env

      - name: Recreate Clean Android Project Files
        run: |
          flutter clean
          rm -rf android
          flutter create .

      - name: Fetch Application Dependencies
        run: |
          flutter pub get

      - name: Directly Patch ArCore Dependency Code
        run: |
          TARGET_FILE="/home/runner/.pub-cache/hosted/pub.dev/arcore_flutter_plus-1.0.2/android/build.gradle"
          if [ -f "$TARGET_FILE" ]; then
            echo "Patching arcore_flutter_plus Gradle syntax..."
            # FIXED: Targets the exact broken string in the cache and forces the correct project scope
            sed -i 's/configurations.configureEach/project.configurations.configureEach/g' "$TARGET_FILE"
            echo "Patch applied successfully!"
          else
            echo "Error: Target plugin layout file not found in build runner cache." && exit 1
          fi

      - name: Compile Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }} \
            --android-skip-build-dependency-validation \
            --pub

      - name: Generate Cryptographic SHA3 Verification Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
            openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt
          else
            echo "Error: Target APK bundle not generated by compiler execution layout." && exit 1
          fi

      - name: Upload Secured App Packages
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          retention-days: 7
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha3_256.txt
            sha3_512.txt
