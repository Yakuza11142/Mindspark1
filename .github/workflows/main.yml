name: Mind Spark Deep Clean & Build
on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  deep_clean_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Pull Codebase Files from GitHub
        uses: actions/checkout@v4

      - name: 2. Set Up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 3. Set Up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 4. Set Up Clean Flutter Tools
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 5. Generate Platforms and Destroy Templates
        run: |
          # 1. Back up your authentic code first
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/ || echo "No local lib folder"
          cp pubspec.yaml /tmp/my_code/ || echo "No local pubspec"
          
          # 2. Recreate the missing native platform folders
          flutter create . --overwrite --project-name mind_spark
          
          # 3. Permanently wipe out the newly generated template code
          rm -rf lib
          
          # 4. Restore your true custom screens and configuration
          if [ -d "/tmp/my_code/lib" ]; then
            cp -r /tmp/my_code/lib .
          else
            mkdir -p lib
          fi
          cp /tmp/my_code/pubspec.yaml .

      - name: 6. Handle Assets & Folders
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts
          touch assets/images/app_icon.png
          touch assets/fonts/Inter-Regular.ttf
          touch assets/fonts/Inter-Bold.ttf
          find . -maxdepth 1 -name "*.png" ! -name "app_icon.png" -exec cp {} assets/images/app_icon.png \; || echo "No custom logo found"

      - name: 7. Compile Your Custom Android App
        run: |
          flutter clean
          flutter pub get
          flutter build apk --debug -t lib/main.dart

      - name: 8. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-debug-apk
          path: "build/app/outputs/flutter-apk/app-debug.apk"
