name: mind_spark

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  # JOB 1: Handles Android Compilation
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Resolve Dependencies & Secure Spaces
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get
        working-directory: "."

      - name: Generate Hive Database Schemas
        run: dart run build_runner build --delete-conflicting-outputs --allow-dirty
        working-directory: "."

      - name: Build Android App Bundle
        run: flutter build apk --debug
        working-directory: "."

  # JOB 2: Handles iOS Compilation (Mac Runner to handle Apple ecosystem plugins)
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Resolve Dependencies & Secure Spaces
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get
        working-directory: "."

      - name: Generate Hive Database Schemas
        run: dart run build_runner build --delete-conflicting-outputs --allow-dirty
        working-directory: "."

      - name: Purge & Rebuild iOS CocoaPods
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..
        working-directory: "."

      - name: Build iOS Framework (Bypasses Exit Code 65)
        run: flutter build ios --no-codesign --simulator
        working-directory: "."
