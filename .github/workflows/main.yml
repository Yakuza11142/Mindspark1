name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: 🎨 Setup App Logo and Asset Infrastructure
        run: |
          # 1. Ensure internal directories exist inside the subproject
          mkdir -p mind_spark_project/assets/images
          mkdir -p mind_spark_project/assets/fonts

          # 2. Build configuration safety fallback (.env files)
          if [ ! -f "mind_spark_project/.env" ]; then
            echo "SUPABASE_URL=mock_url" > mind_spark_project/.env
            echo "SUPABASE_ANON_KEY=mock_key" >> mind_spark_project/.env
            echo "GEMINI_API_KEY=mock_key" >> mind_spark_project/.env
            echo "📝 Created dummy .env file for build compilation safety."
          fi

          # 3. Locate logo asset from root/subfolders and inject it safely
          if [ -f "image_e1762c49 (1).png" ]; then
            echo "✅ Successfully found logo image file at repository root."
            cp "image_e1762c49 (1).png" mind_spark_project/assets/images/logo.png
          elif [ -f "mind_spark_project/image_e1762c49 (1).png" ]; then
            echo "✅ Successfully found logo image file inside project root folder."
            cp "mind_spark_project/image_e1762c49 (1).png" mind_spark_project/assets/images/logo.png
          elif [ -f "mind_spark_project/assets/images/logo.png" ]; then
            echo "✅ Logo already present in target assets folder."
          else
            echo "⚠️ Warning: Could not find image_e1762c49 (1).png, using an automated empty fallback to avoid build crashes."
            touch mind_spark_project/assets/images/logo.png
          fi

      - name: 📦 Get Flutter Packages
        working-directory: ./mind_spark_project
        run: flutter pub get

      - name: 🩺 Flutter Doctor
        working-directory: ./mind_spark_project
        run: flutter doctor -v

      - name: 🎨 Generate Launcher Icons
        working-directory: ./mind_spark_project
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            echo "🚀 Executing flutter_launcher_icons generation engine..."
            dart run flutter_launcher_icons
          else
            echo "⚠️ flutter_launcher_icons config block missing inside pubspec.yaml. Skipping icon build."
          fi

      - name: 🏗️ Build Release APK
        working-directory: ./mind_spark_project
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload APK Artifact to GitHub Action Summary
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: mind_spark_project/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
