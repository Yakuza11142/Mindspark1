name: Mind Spark Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # 🤖 JOB 1: ANDROID BINARIES ENGINE (STRICT APK + STORE AAB COMPILE)
  # =========================================================================
  build_android:
    runs-on: ubuntu-latest
    name: 🤖 Android Pipeline (APK + AAB)
    steps:
      - name: 📥 [Step 1/19] Checkout complete repository source tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ [Step 2/19] Initialize Java 17 Temurin Core Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 [Step 3/19] Mount Flutter 3.22.0 Production Compiler Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ [Step 4/19] Run Quantum Structural Environmental Probes
        run: |
          echo "======================================================================================"
          echo "🔬 QUANTUM DIAGNOSTICS: TESTING ANDROID HOST PLATFORM VIRTUALIZATION ENGINE CORES..."
          echo "======================================================================================"
          flutter --version
          dart --version
          java -version
          echo "=== LOCATING PROJECT PUBSPEC ==="
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 🔧 [Step 5/19] Force Strict Gradle File System Directory Permissions
        run: |
          find . -name "gradlew" -exec chmod +x {} \; || echo "Bypassed"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 [Step 6/19] Deep Purge Local Project Target Cache Configurations
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean

      - name: 📦 [Step 7/19] Fetch All Project Package Dependency Tree Maps
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🎨 [Step 8/19] High-Density Custom Branded Logo & Env Setup Matrix
        run: |
          cd ${{ env.PROJECT_ROOT }}
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
          else
            echo "❌ CRITICAL CONFIGURATION FAULT: Logo image missing from root folder!" && exit 1
          fi
          ENV_PATH=$(find $GITHUB_WORKSPACE -name ".env" | head -n 1)
          if [ -n "$ENV_PATH" ] && [ -f "$ENV_PATH" ]; then
            cp "$ENV_PATH" .env
          fi

      - name: 🔧 [Step 9/19] Run Background Code Generation Serialization Tools
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi

      - name: 📋 [Step 10/19] Analyze Application Syntaxes Structure Safely
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter analyze --no-pub --no-fatal-infos

      - name: 🔐 [Step 11/19] Bake Branded Logo into Native Android Mipmap Directories
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub run flutter_launcher_icons

      - name: 🏗️ [Step 12/19] BUILD OBFUSCATED ANDROID Direct Installer Package (APK)
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm

      - name: 🏗️ [Step 13/19] BUILD OBFUSCATED ANDROID Store App Bundle Package (AAB)
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 📂 [Step 14/19] Stage and Sync Verified Target Android Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/android_distribution
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/apk/release/app-release.apk" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.apk
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/bundle/release/app-release.aab" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.aab

      - name: 🔐 [Step 15/19] Compute Cryptographic Verification Checksum Fingerprints
        run: |
          cd $GITHUB_WORKSPACE/android_distribution
          sha256sum Mind_Spark.apk > CHECKSUM_SHA256.txt

      - name: 📋 [Step 16/19] Compile Android Comprehensive Production Manifest Logs
        run: |
          cat > $GITHUB_WORKSPACE/android_distribution/BUILD_MANIFEST.txt << 'EOF'
          ╔══════════════════════════════════════════════════════════════╗
          ║   MIND SPARK - NATIVE COMPILATION Android COMPLETE LOGS      ║
          ╚══════════════════════════════════════════════════════════════╝
          ✅ APK Target: Mind_Spark.apk (Direct Phone Installer File)
          ✅ AAB Target: Mind_Spark.aab (Google Play Store Console Upload Bundle)
          EOF

      - name: 📤 [Step 17/19] Upload Direct Device Phone Installer Package (APK)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-APK
          path: android_distribution/Mind_Spark.apk
          retention-days: 30

      - name: 📤 [Step 18/19] Upload Play Store Store Distribution Artifact (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-PlayStore-AAB
          path: android_distribution/Mind_Spark.aab
          retention-days: 30

      - name: 📤 [Step 19/19] Upload Android Integrity Logs Tree Verification
        uses: actions/upload-artifact@v4
        with:
          name: Android-Deployment-Logs
          path: |
            android_distribution/BUILD_MANIFEST.txt
            android_distribution/CHECKSUM*.txt
          retention-days: 30

  # =========================================================================
  # 🍏 JOB 2: APPLE ECOSYSTEM INTERFACES (iOS MOBILE BUNDLE)
  # =========================================================================
  build_apple_ios:
    runs-on: macos-latest
    name: 🍏 Build iOS Mobile App
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Execute Global Repository Path Scanner
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 📦 Fetch All Project Package Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🍏 Initialize Native CocoaPods Workspace
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -d "ios" ]; then
            cd ios && pod repo update && pod install && cd ..
          fi

      - name: 🎨 Bake Custom Branded Logo Assets to Apple Catalogs
        run: |
          cd ${{ env.PROJECT_ROOT }}
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
          fi
          ENV_PATH=$(find $GITHUB_WORKSPACE -name ".env" | head -n 1)
          if [ -n "$ENV_PATH" ] && [ -f "$ENV_PATH" ]; then cp "$ENV_PATH" .env; fi
          flutter pub run flutter_launcher_icons

      - name: 🏗️ COMPILE APPLE iOS ENCRYPTED CODE BUNDLE
        run: |
          cd ${{ env.PROJECT_ROOT }}
          if [ -d "ios" ]; then
            flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-debug-info/
          fi

      - name: 📂 Stage Apple Workspace Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/apple_distribution
          if [ -d "${{ env.PROJECT_ROOT }}/build/ios/iphoneos/Runner.app" ]; then cp -R "${{ env.PROJECT_ROOT }}/build/ios/iphoneos/Runner.app" $GITHUB_WORKSPACE/apple_distribution/Mind_Spark_iOS.app; fi

      - name: 📤 Upload Native iOS App Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-iOS-Container
          path: apple_distribution/Mind_Spark_iOS.app
          retention-days: 14

  # =========================================================================
  # 💻 JOB 3: COMPUTER/LAPTOP PC APPLICATIONS INTERFACE (WINDOWS NATIVE APP)
  # =========================================================================
  build_pc_laptops:
    runs-on: windows-latest
    name: 💻 Build Laptop PC (.EXE)
    steps:
      - name: 📥 Checkout repository source tree
        uses: actions/checkout@v4

      - name: 🦋 Mount Flutter 3.22.0 Production Compiler
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Execute Global Repository Path Scanner
        run: |
          $pubspec = Get-ChildItem -Recurse -Filter "pubspec.yaml" | Select-Object -First 1
          if ($pubspec -eq $null) { exit 1 }
          $projectRoot = $pubspec.DirectoryName
          echo "PROJECT_ROOT=$projectRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: ⚙️ Unlock Windows Operating Configurations
