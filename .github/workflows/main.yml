name: Mind_Spark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Display Flutter Version
        run: flutter --version

      - name: Clean Project & Native Cache
        run: |
          flutter clean
          cd android && ./gradlew clean || echo "Gradle clean skipped"
          cd ..

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs || echo "No build runner code needed"

      - name: Build Release APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/ \
            --dart-define=FLUTTER_BUILD_MODE=release

      - name: Prepare Release Artifacts
        run: |
          mkdir -p build/app/outputs/release
          # This safely checks both old and new paths to find where the 0.2% native compiler saved your APK
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/release/Mind_Spark.apk
          elif [ -f "build/app/outputs/apk/release/app-release.apk" ]; then
            mv build/app/outputs/apk/release/app-release.apk build/app/outputs/release/Mind_Spark.apk
          else
            echo "Error: APK not found in any standard output directories."
            exit 1
          fi

      - name: Generate Build Report
        run: |
          APK_SIZE=$(du -h build/app/outputs/release/Mind_Spark.apk | cut -f1)
          echo "Size: $APK_SIZE" > build/BUILD_REPORT.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Release-APK
          path: build/app/outputs/release/
          retention-days: 90
