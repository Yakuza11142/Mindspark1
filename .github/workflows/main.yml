name: Mind Spark Mobile Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build_android:
    runs-on: ubuntu-latest
    name: 🤖 Android Pipeline
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: ✅ Scan Paths
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)
          if [ -z "$PUBSPEC_PATH" ]; then exit 1; fi
          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 🔧 Permissions
        run: |
          find . -name "gradlew" -exec chmod +x {} \; || echo "Deferred"
          find . -type d -exec chmod 755 {} \;

      - name: 🧹 Clean
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter clean

      - name: 📦 Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🎨 Logo & Env Sync
        run: |
          cd ${{ env.PROJECT_ROOT }}
          mkdir -p assets/images
          LOGO_PATH=$(find $GITHUB_WORKSPACE -name "image_e1762c49 (1).png" -o -name "app_logo.png" | head -n 1)
          if [ -n "$LOGO_PATH" ] && [ -f "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" assets/images/app_icon.png
          else
            exit 1
          fi
          ENV_PATH=$(find $GITHUB_WORKSPACE -name ".env" | head -n 1)
          if [ -n "$ENV_PATH" ] && [ -f "$ENV_PATH" ]; then cp "$ENV_PATH" .env; fi

      - name: 🔐 Generate Icons
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub run flutter_launcher_icons

      - name: 🏗️ Compile APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release --obfuscate --split-debug-info=build/android-debug-info/ --target-platform android-arm64,android-arm

      - name: 🏗️ Compile AAB
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build appbundle --release --obfuscate --split-debug-info=build/android-debug-info/

      - name: 📂 Stage Deliverables
        run: |
          mkdir -p $GITHUB_WORKSPACE/android_distribution
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/apk/release/app-release.apk" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.apk
          cp "${{ env.PROJECT_ROOT }}/build/app/outputs/bundle/release/app-release.aab" $GITHUB_WORKSPACE/android_distribution/Mind_Spark.aab

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Android-APK
          path: android_distribution/Mind_Spark.apk
          retention-days: 30

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-PlayStore-AAB
          path: android_distribution/Mind_Spark.aab
          retention-days: 30
