name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: 🎨 Setup App Logo and Asset Infrastructure
        run: |
          # 1. Force establish correct asset tracking paths at root
          mkdir -p assets/images
          mkdir -p assets/fonts

          # 2. Inject compilation fallback environment credentials
          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
            echo "📝 Base build environment variable file injected."
          fi

          # 3. Handle branding image placement safely
          if [ -f "image_e1762c49 (1).png" ]; then
            echo "✅ Located source logo image file at repository root."
            cp "image_e1762c49 (1).png" assets/images/logo.png
          elif [ -f "assets/images/logo.png" ]; then
            echo "✅ Target branding icon already exists in assets."
          else
            echo "⚠️ Warning: Source logo missing. Generating dummy placeholder to preserve asset mapping."
            touch assets/images/logo.png
          fi

      - name: 📦 Get Flutter Packages
        run: flutter pub get

      - name: 🩺 Flutter Doctor
        run: flutter doctor -v

      - name: 🎨 Generate Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            echo "🚀 Executing flutter_launcher_icons generation engine..."
            dart run flutter_launcher_icons
          else
            echo "⚠️ flutter_launcher_icons configuration block not found in pubspec.yaml. Skipping generation."
          fi

      - name: 🏗️ Build Release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload APK Artifact to GitHub Action Summary
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
