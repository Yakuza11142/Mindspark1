name: mind_spark_1

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository Code Structure
        uses: actions/checkout@v4

      - name: 📋 Log Active Build Commit SHA
        run: echo "🚀 Compiling codebase assets linked to commit SHA -> ${{ github.sha }}"

      - name: ☕ Initialize Java Runtime Environment (v17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🤖 Auto-Accept Android SDK Licensing
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2d05b41312163e1a37cd28b38e0429e7012e" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license
          echo "✅ Android SDK licenses signed off."

      - name: 🦋 Initialize Flutter SDK Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: 🔐 Configure Local Environment Token Wrapper
        run: |
          if [ ! -f ".env" ]; then
            echo "SUPABASE_URL=mock_url" > .env
            echo "SUPABASE_ANON_KEY=mock_key" >> .env
            echo "GEMINI_API_KEY=mock_key" >> .env
            echo "✅ Generated temporary compilation .env wrapper."
          fi

      - name: 🛠️ Sanitize Pubspec Package Name
        run: |
          # Enforces the valid lowercase name standard directly inside the virtual environment wrapper
          if [ -f "pubspec.yaml" ]; then
            sed -i 's/^name: .*/name: mindspark1/' pubspec.yaml
            echo "✅ pubspec.yaml name parameter synchronized to mindspark1."
          fi

      - name: 🧼 Evict Cache Metadata Layers
        run: |
          flutter clean
          rm -rf pubspec.lock
          rm -rf .dart_tool/

      - name: 📦 Sync Package Tree Graph
        run: flutter pub get

      - name: 🔒 Grant Native Gradle Script Access
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            echo "✅ gradlew execution permissions granted."
          fi

      - name: 🎨 Build Dynamic Branded Launcher Icons
        run: |
          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            dart run flutter_launcher_icons
          else
            echo "⚠️ Skipping launcher icon mapping."
          fi

      - name: 🏗️ Compile Pure Obfuscated Android-Only APK Binary
        run: |
          mkdir -p build/app/outputs/symbols
          flutter build apk --release \
            --target-platform=android-arm64 \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: 📤 Export Built Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Obfuscated-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
