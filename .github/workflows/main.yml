name: Mind Spark CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the codebase into the virtual runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 17 (Required by newer Android Gradle Tools and safe_device/arcore)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Setup Flutter Environment
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # Adjust this to match your local machine version
          channel: 'stable'

      # 4. Clear and force resolve Flutter dependencies
      - name: Install Dependencies
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get

      # 5. Run Code Generation (Required for hive_ce and your AI/AR models if applicable)
      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      # 6. Run Static Code Analysis (Optional but recommended for grade checks)
      - name: Analyze Project Code
        run: flutter analyze

      # 7. Run Unit Tests (Optional)
      - name: Run Tests
        run: flutter test

      # 8. Build Android APK to ensure compilation success
      - name: Build Android APK
        run: flutter build apk --debug
