name: Mind_Spark

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean Assets
        run: |
          flutter clean
          rm -rf .dart_tool/

      - name: Fetch Dependencies Safely
        run: flutter pub get --no-example

      - name: Build Secure Obfuscated APK
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info/

      - name: Prepare Final Output
        run: |
          mkdir -p build/output_release
          find build/app/outputs/ -name "*.apk" -exec cp {} build/output_release/Mind_Spark.apk \;

      - name: Upload Secure APK
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Secure-APK
          path: build/output_release/Mind_Spark.apk
          retention-days: 90
