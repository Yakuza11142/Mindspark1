name: Mind Spark Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: false

      - name: Create Production .env File
        run: |
          /usr/bin/mkdir -p assets
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> assets/.env

      - name: Get Dependencies
        run: flutter pub get

      - name: Force Overwrite Manifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          /usr/bin/mkdir -p android/app/src/main
          rm -f "$MANIFEST_PATH"
          cat << 'EOF' > "$MANIFEST_PATH"
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              package="com.example.mindspark">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>

              <uses-feature android:name="android.hardware.camera.ar" android:required="false"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>

              <queries>
                  <package android:name="com.google.ar.core" />
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
              </queries>

              <application
                  android:label="Mind Spark"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">

                  <meta-data android:name="com.google.ar.core" android:value="optional" />

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">

                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme" />

                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          echo "Fresh manifest with proper schemas injected!"

      - name: Build Secured Obfuscated APK
        env:
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.workers.max=2 -Dorg.gradle.cache=none"
        run: |
          /usr/bin/mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=${{ github.run_number }}

      - name: Calculate Cryptographic Hashes
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          sha256sum "$APK_PATH" | awk '{print $1}' > sha256.txt
          sha512sum "$APK_PATH" | awk '{print $1}' > sha512.txt
          openssl dgst -sha3-256 "$APK_PATH" | awk '{print $2}' > sha3_256.txt
          openssl dgst -sha3-512 "$APK_PATH" | awk '{print $2}' > sha3_512.txt

      - name: Upload Secured App Package
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-release-package
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/symbols/
            sha256.txt
            sha512.txt
            sha3_256.txt
            sha3_512.txt
