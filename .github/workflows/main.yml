name: Mind Spark 

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' 

      - name: Resolve Internal Dependencies
        run: |
          flutter clean
          flutter pub get
        working-directory: "."

      # FIXED: Forces the build tool to completely skip native embedding checks and bundle everything directly
      - name: Build Android App Bundle (Code & Logo Only)
        run: flutter build apk --debug --no-pub --no-validate-project
        working-directory: "."
