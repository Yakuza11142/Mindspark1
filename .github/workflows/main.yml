name: Mind Spark APK Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: 📦 Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: 🔍 Locate Flutter Project
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "pubspec.yaml not found"
            exit 1
          fi

          PROJECT_ROOT=$(dirname "$PUBSPEC_PATH")

          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

      - name: 📦 Get Flutter Packages
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter pub get

      - name: 🩺 Flutter Doctor
        run: flutter doctor -v

      - name: 🎨 Setup App Logo
        run: |
          cd ${{ env.PROJECT_ROOT }}

          mkdir -p assets/images

          LOGO=$(find $GITHUB_WORKSPACE -name "app_logo.png" | head -n 1)

          if [ -n "$LOGO" ]; then
            cp "$LOGO" assets/images/app_icon.png
          fi

      - name: 🎨 Generate Launcher Icons
        run: |
          cd ${{ env.PROJECT_ROOT }}

          if grep -q "flutter_launcher_icons" pubspec.yaml; then
            flutter pub run flutter_launcher_icons
          else
            echo "flutter_launcher_icons not configured"
          fi

      - name: 🏗️ Build Release APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-APK
          path: ${{ env.PROJECT_ROOT }}/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
```
