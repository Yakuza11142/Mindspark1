name: Stacked Manifest Override Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  override_and_build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Rebuild Project Environment
        run: |
          # 1. Back up your custom code files
          mkdir -p /tmp/backup_lib
          cp -r lib/* /tmp/backup_lib/ || true
          cp pubspec.yaml /tmp/backup_pub.yaml || true

          # 2. Delete everything else inside the repository folder
          rm -rf * .[^.]*

          # 3. Force Flutter to create a brand new clean template project
          flutter create --platforms=android .

          # 4. Restore your original code and dependencies
          rm -rf lib pubspec.yaml
          cp -r /tmp/backup_lib lib
          cp /tmp/backup_pub.yaml pubspec.yaml

          # 5. Overwrite the new manifest file with your clean version
          rm -f android/app/src/main/AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/AndroidManifest.xml
          echo '<manifest xmlns:android="http://android.com" xmlns:tools="http://android.com" package="com.example.mindspark">' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.WAKE_LOCK"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.VIBRATE"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.CAMERA"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.camera" android:required="false"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.camera.ar" android:required="true"/>' >> android/app/src/main/AndroidManifest.xml
          echo '    <queries>' >> android/app/src/main/AndroidManifest.xml
          echo '        <intent>' >> android/app/src/main/AndroidManifest.xml
          echo '            <action android:name="android.intent.action.VIEW"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            <data android:scheme="https"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        </intent>' >> android/app/src/main/AndroidManifest.xml
          echo '        <intent>' >> android/app/src/main/AndroidManifest.xml
          echo '            <action android:name="android.intent.action.VIEW"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            <data android:scheme="http"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        </intent>' >> android/app/src/main/AndroidManifest.xml
          echo '    </queries>' >> android/app/src/main/AndroidManifest.xml
          echo '    <application android:name="androidx.multidex.MultiDexApplication" android:label="Mind Spark" android:icon="@android:drawable/sym_def_app_icon" android:allowBackup="true" android:fullBackupContent="true" android:hardwareAccelerated="true" tools:targetApi="34">' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data android:name="com.google.ar.core" android:value="required"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data android:name="flutter_deeplinking_enabled" android:value="true"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        <meta-data android:name="flutterEmbedding" android:value="2"/>' >> android/app/src/main/AndroidManifest.xml
          echo '        <activity android:name="io.flutter.embedding.android.FlutterActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">' >> android/app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN"/>' >> android/app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER"/>' >> android/app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '    </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml

      - name: Compile Release APK
        run: |
          flutter pub get
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
