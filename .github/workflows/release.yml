name: Production Flutter Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"
    steps:
      - name: 1. Checkout Repository Source
        uses: actions/checkout@v4

      - name: 2. Install Java Runtime Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Install Flutter SDK Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 4. Clear Workspace Stale Storage
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: 5. Download Flutter Package Dependencies
        run: flutter pub get

      # YAML AUTOMATION: Generates the app icons in the background automatically
      - name: 6. Generate Flutter App Launcher Icons
        run: flutter pub run flutter_launcher_icons

      # YAML CONFIG INJECTION: Passes your AdMob configuration safely without opening Gradle
      - name: 7. Run Production Binary Compiler
        run: |
          mkdir -p build/symbols
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=400 \
            --android-skip-build-dependency-validation \
            --target-platform=android-arm64 \
            --dart-define=admob_id="ca-app-pub-6212928709769131~8727268603"

      - name: 8. Export Compiled Application Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
