name: "Mind Spark: Immune Engine"

on:
  push:
    branches: [ "main", "master" ]

jobs:
  immune_triage:
    name: "Slay & Repair Engine"
    runs-on: ubuntu-latest

    steps:
      - name: "1. Clone Code Streams"
        uses: actions/checkout@v4

      - name: "2. Initialize Java Core"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. Initialize Flutter Framework"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: "4. White Blood Cell Mode: Slay Corrupted Caches"
        run: |
          echo "Purging malicious and dead build caches..."
          flutter clean
          rm -rf android/.gradle android/app/build android/build pubspec.lock .dart_tool/

      - name: "5. Red Blood Cell Mode: Repair Broken Android Architecture"
        run: |
          echo "Repairing native structural properties..."
          mkdir -p android/app
          touch android/gradle.properties
          sed -i '/android.lintOptions/d' android/gradle.properties
          echo "android.lintOptions.abortOnError=false" >> android/gradle.properties
          echo "android.lintOptions.checkReleaseBuilds=false" >> android/gradle.properties
          
          GRADLE_PATH="android/build.gradle"
          if [ -f "$GRADLE_PATH" ]; then
            sed -i '/var manifestFile/,/manifestFile.text.replaceAll/d' "$GRADLE_PATH"
          fi

      - name: "6. Cellular Repair: Restructure XML Document Streams"
        run: |
          echo "Restoring missing android namespaces and cleaning trailing debris..."
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Restores key attributes that were stripped by the old build.gradle regex loop
            sed -i 's/ name=/ android:name=/g' "$MANIFEST_PATH"
            sed -i 's/ value=/ android:value=/g' "$MANIFEST_PATH"
            sed -i 's/ label=/ android:label=/g' "$MANIFEST_PATH"
            sed -i 's/ theme=/ android:theme=/g' "$MANIFEST_PATH"
            sed -i 's/ hardwareAccelerated=/ android:hardwareAccelerated=/g' "$MANIFEST_PATH"
            sed -i 's/ windowSoftInputMode=/ android:windowSoftInputMode=/g' "$MANIFEST_PATH"
            sed -i 's/ configChanges=/ android:configChanges=/g' "$MANIFEST_PATH"
            
            # Ensures core manifest properties are correctly terminated
            sed -i 's_xmlns:tools="http://android.com">.*_xmlns:tools="http://android.com">_' "$MANIFEST_PATH"
            sed -i '/<\/manifest>/q' "$MANIFEST_PATH"
          fi

      - name: "7. Slay Broken kotlinOptions Blocks"
        run: |
          echo "Fixing line 28 inside app/build.gradle..."
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i '/kotlinOptions {/,/}/d' "$APP_GRADLE"
          fi

      - name: "8. Asset Layer Repair: Route Root Shader to Targeted Directory"
        run: |
          echo "Locating and routing root hologram_glow.frag asset..."
          mkdir -p shaders
          if [ -f "hologram_glow.frag" ]; then
            echo "Found shader asset at project root. Moving to target shaders/ path..."
            cp hologram_glow.frag shaders/hologram_glow.frag
          else
            echo "Shader not found at root. Creating structural fallback asset pathway..."
            echo '#version 460 core' > shaders/hologram_glow.frag
            echo 'out vec4 fragColor;' >> shaders/hologram_glow.frag
            echo 'void main() { fragColor = vec4(0.0, 0.5, 1.0, 1.0); }' >> shaders/hologram_glow.frag
          fi

      - name: "9. Synthesize Verified Dependencies"
        run: |
          echo "Binding dependencies natively..."
          flutter pub get

      - name: "10. Compile Production APK Binary"
        run: |
          echo "Assembling functional machine binary layer..."
          flutter build apk --release --split-per-abi --no-pub --no-tree-shake-icons

      - name: "11. Distribute Clean Installer Artifact Stream"
        uses: actions/upload-artifact@v4
        with:
          name: "mindspark-immune-apk"
          path: build/app/outputs/flutter-apk/
