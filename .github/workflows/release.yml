name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean Cache Resolution
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          flutter pub get

      - name: Deep Global Cache Sanitization Sweep
        run: |
          echo "Repairing raw plugin sources in global environment layers..."
          find /home/runner/.pub-cache -name "AndroidManifest.xml" -type f 2>/dev/null | while read -r manifest; do
            if grep -qE '(uses-permission|uses-feature|action|category|meta-data|activity|intent|data)' "$manifest"; then
              sed -i -E 's/([^:])name=/\1android:name=/g' "$manifest"
              sed -i -E 's/([^:])required=/\1android:required=/g' "$manifest"
              sed -i -E 's/([^:])scheme=/\1android:scheme=/g' "$manifest"
              sed -i -E 's/([^:])host=/\1android:host=/g' "$manifest"
              sed -i -E 's/([^:])value=/\1android:value=/g' "$manifest"
              sed -i -E 's/([^:])exported=/\1android:exported=/g' "$manifest"
              sed -i -E 's/([^:])launchMode=/\1android:launchMode=/g' "$manifest"
            fi
          done

      - name: Compile Pristine Binary
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/flutter-apk/*.apk
