name: Flutter Automated Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clear Flutter and Pub Cache
        run: |
          flutter clean
          rm -rf ~/.pub-cache/hosted

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=397 --android-skip-build-dependency-validation --target-platform=android-arm64
