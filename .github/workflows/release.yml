name: mindspark1
description: "AI TUTOR & AR LAB"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <3.5.0" # ✅ Strict upper boundary keeps Dart locked to 3.4.x behavior

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: 1.0.8
  provider: 6.1.2
  supabase_flutter: 2.5.4 # ✅ Downgraded to clear legacy cross-dependency constraints
  flutter_dotenv: 6.0.1
  dio: 5.5.0+1 # ✅ Optimized for Dart 3.4.0 core memory handling
  intl: 0.19.0 # ✅ Prevents timezone resolution mismatches in 3.4.0
  permission_handler: 11.3.1 # ✅ Matches stable Android lifecycle APIs
  flutter_animate: 4.5.0
  vector_math: 2.1.4 # ✅ Hard-pinned to match Flutter 3.22.0 framework constraints
  url_launcher: 6.2.6
  shared_preferences: 2.2.3
  google_generative_ai: 0.4.0
  flutter_tts: 4.1.0
  speech_to_text: 7.4.0
  path_provider: 2.1.3
  crypto: 3.0.5
  uuid: 4.4.0

  # Engine compatible versions (Strictly aligned for AR/Camera capabilities)
  arcore_flutter_plus: 1.0.2
  camera: 0.10.5+9 # ✅ Matches stable Flutter 3.22.0 video recording trees

  flutter_plugin_android_lifecycle: 2.0.17 # ✅ FIXED: Solves the lifecycle SDK >=3.5.0 crash completely
  webview_flutter: 4.7.0
  google_mobile_ads: 5.1.0 # ✅ Aligned package limit for stable runtime execution

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  build_runner: 2.4.9
  flutter_launcher_icons: 0.14.2
  source_gen: 1.5.0

flutter:
  uses-material-design: true
  assets:
    - "image_e1762c49 (1).png"
  
  shaders:
    - shaders/hologram_glow.frag

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "image_e1762c49 (1).png"
