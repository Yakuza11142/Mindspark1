name: "Mind Spark: CI/CD Pipeline"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline_validation:
    name: "GPU/SDK Compilation"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "1. Clones Repository Stream"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "2. Set up JDK 17 Environment"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # 🚀 ADVANCED: Automatically caches Gradle downloads

      - name: "3. Set up Flutter SDK Engine"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true # 🚀 ADVANCED: Caches Dart packages across commits

      - name: "4. Restore Flutter/Pub Package Caches"
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: "5. Deep Scrub Workspace Env"
        run: |
          flutter clean
          rm -rf android/.gradle android/app/build android/build

      - name: "6. Resolve Rigid Package Mapping"
        run: flutter pub get

      - name: "7. Inject Safe Global Lint Configurations"
        run: |
          mkdir -p android/app
          touch android/gradle.properties
          sed -i '/android.lintOptions/d' android/gradle.properties
          echo "android.lintOptions.abortOnError=false" >> android/gradle.properties
          echo "android.lintOptions.checkReleaseBuilds=false" >> android/gradle.properties

      - name: "8. Execute Static Code Analysis"
        run: flutter analyze --no-pub

      - name: "9. Build Production APK Binary Matrix"
        run: |
          flutter build apk --no-pub --release --split-per-abi \
          --build-name="1.0.0" \
          --build-number=${{ github.run_number }}

      - name: "10. Archive Production Artifact Streams"
        uses: actions/upload-artifact@v4
        with:
          name: "mindspark-release-apk-build-${{ github.run_number }}"
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
