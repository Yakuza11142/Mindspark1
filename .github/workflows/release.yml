name: m1
on:
  push:
    branches: [main, master]
  workflow_dispatch:
concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: false
permissions:
  contents: write
  actions: write
  packages: write

jobs:
  b:
    runs-on: macos-14
    timeout-minutes: 360
    env:
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      KEYSTORE_BASE64: ${{secrets.KEYSTORE_BASE64}}
      KEYSTORE_PASSWORD: ${{secrets.KEYSTORE_PASSWORD}}
      KEY_ALIAS: ${{secrets.KEY_ALIAS}}
      KEY_PASSWORD: ${{secrets.KEY_PASSWORD}}
      MTN_KEY: ${{secrets.MTN_API_KEY}}
      HEYGEN_KEY: ${{secrets.HEYGEN_KEY}}
      TRIPO_KEY: ${{secrets.TRIPO_API_KEY}}
      PEXEL_KEY: ${{secrets.PEXELS_API_KEY}}
      ELEVENLABS_KEY: ${{secrets.ELEVEN_LAB_API_KEY}}
      GEMINI_KEY: ${{secrets.GEMINI_API_KEY}}
      OPENAI_KEY: ${{secrets.OPENAI_API_KEY}}
      GROQ_KEY: ${{secrets.GROQ_API_KEY}}
      VERTEX_KEY: ${{secrets.VERTEX_API_KEY}}
      SUPABASE_URL: ${{secrets.SUPABASE_URL}}
      SUPABASE_ANON_KEY: ${{secrets.SUPABASE_ANON_KEY}}
      
      # SHA-3 Cryptographic Integrity Injections
      SHA_3: ${{secrets.SHA_3}}
      SHA_3_256: ${{secrets.SHA_3_256}}
      SHA_3_384: ${{secrets.SHA_3_384}}
      SHA_3_512: ${{secrets.SHA_3_512}}
      
      V_NAME: "1.0.${{github.run_number}}"
      V_NUM: "${{github.run_number}}"
      
      # Bound Obfuscated Arguments Definition String
      F: "--dart-define=MTN=${{secrets.MTN_API_KEY}} --dart-define=HEYGEN=${{secrets.HEYGEN_KEY}} --dart-define=TRIPO=${{secrets.TRIPO_API_KEY}} --dart-define=PEXEL=${{secrets.PEXELS_API_KEY}} --dart-define=ELEVENLABS=${{secrets.ELEVEN_LAB_API_KEY}} --dart-define=GEMINI=${{secrets.GEMINI_API_KEY}} --dart-define=OPENAI=${{secrets.OPENAI_API_KEY}} --dart-define=GROQ=${{secrets.GROQ_API_KEY}} --dart-define=VERTEX=${{secrets.VERTEX_API_KEY}} --dart-define=SUPABASE_URL=${{secrets.SUPABASE_URL}} --dart-define=SUPABASE_ANON_KEY=${{secrets.SUPABASE_ANON_KEY}} --dart-define=SIG_SHA3=${{secrets.SHA_3}} --dart-define=SIG_SHA3_256=${{secrets.SHA_3_256}} --dart-define=SIG_SHA3_384=${{secrets.SHA_3_384}} --dart-define=SIG_SHA3_512=${{secrets.SHA_3_512}} --build-name=1.0.${{github.run_number}} --build-number=${{github.run_number}}"

    steps:
      - name: Source Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java SDK Setup
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Flutter Environment Setup
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Initialize Environment & Sanitize Configurations
        run: |
          flutter clean
          rm -rf android/.gradle android/app/build android/build ios/Pods ios/Podfile.lock .dart_tool/ pubspec.lock
          mkdir -p android/app r/apk r/bundle r/ios shaders
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks || true
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
          printf '#version 460 core\nout vec4 c;\nvoid main(){c=vec4(0,0.5,1,1);}' > shaders/hologram_glow.frag
          flutter config --enable-web
          flutter config --jdk-dir "$JAVA_HOME"
          
          if [ -f pubspec.yaml ]; then
            perl -pi -e 's/^  (flutter_webrtc|arcore_flutter_plus|camera|flutter_plugin_android_lifecycle|webview_flutter|google_mobile_ads|dio|supabase_flutter):.*/  \1: any/g' pubspec.yaml
            perl -pi -e 's/sdk: .*/sdk: ">=3.4.0 <4.0.0"/g' pubspec.yaml
          fi
          if [ -f android/build.gradle ]; then
            printf "\nsubprojects { afterEvaluate { p -> if (p.hasProperty('android') && p.android.namespace == null) { p.android.namespace = p.group } } }\n" >> android/build.gradle
          fi
          if [ -f android/app/build.gradle ]; then
            perl -pi -e 's/(compile|target|min)SdkVersion.*/\1SdkVersion 34/g' android/app/build.gradle
          fi
          if [ -f android/local.properties ]; then
            printf "\nflutter.compileSdkVersion=34\nflutter.targetSdkVersion=34\n" >> android/local.properties
          fi
          flutter pub get

      - name: Compile Obfuscated Android APKs
        run: |
          flutter build apk --release --split-per-abi --no-tree-shake-icons --obfuscate --split-debug-info=ds/apk $F
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} r/apk/ \; 2>/dev/null || true

      - name: Compile Obfuscated Android App Bundle (AAB)
        run: |
          flutter build appbundle --release --no-tree-shake-icons --obfuscate --split-debug-info=ds/aab $F
          find build/app/outputs/bundle/release/ -name "*.aab" -exec cp {} r/bundle/ \; 2>/dev/null || true

      - name: Compile Web Application
        run: |
          flutter build web --release $F

      - name: Compile Obfuscated iOS Application (IPA)
        run: |
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=ds/ios $F
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos && mkdir -p P && cp -r Runner.app P/ && zip -r ../../../r/ios/Runner.ipa P/ && cd -
          fi

      - name: Upload Workspace Mobile Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-mobile-builds-${{github.run_number}}
          path: r/

      - name: Upload Workspace Web Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-web-build-${{github.run_number}}
          path: build/web/

      - name: Deploy Secure Production Release Dashboard
        uses: ncipollo/release-action@v1
        with:
          artifacts: "r/apk/*,r/bundle/*,r/ios/*"
          tag: "v1.0.${{github.run_number}}"
          name: "Release v1.0.${{github.run_number}}"
          body: "Production deployment with full binary obfuscation and compiled cryptographic tracking signatures for commit ${{github.sha}}"
          token: ${{secrets.GITHUB_TOKEN}}
          allowUpdates: true
