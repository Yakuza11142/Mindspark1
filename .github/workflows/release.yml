name: Stacked Manifest Override Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  override_and_build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Reset Engine States
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -rf android/.gradle/
          flutter pub get

      - name: Universal XML Force-Overwrite
        run: |
          # 1. Create a pristine master manifest template file
          cat << 'EOF' > /tmp/master_pure_manifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://microsoft.com"
              xmlns:tools="http://microsoft.com"
              package="com.example.mindspark.clean">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>

              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>
              <uses-feature android:name="android.hardware.camera.ar" android:required="true"/>

              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <category android:name="android.intent.category.BROWSABLE"/>
                      <data android:scheme="https"/>
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.VIEW"/>
                      <category android:name="android.intent.category.BROWSABLE"/>
                      <data android:scheme="http"/>
                  </intent>
              </queries>

              <application
                  android:name="androidx.multidex.MultiDexApplication"
                  android:label="Mind Spark"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:allowBackup="true"
                  android:fullBackupContent="true"
                  android:hardwareAccelerated="true"
                  tools:targetApi="34">

                  <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-0000000000000000~0000000000000000"/>
                  <meta-data android:name="com.google.ar.core" android:value="required"/>
                  <meta-data android:name="flutter_deeplinking_enabled" android:value="true"/>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>

                  <activity
                      android:name="io.flutter.embedding.android.FlutterActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. Hard ensure the default path directory exists
          mkdir -p android/app/src/main

          # 3. Find EVERY single .xml file inside the android folder.
          # If it looks like a manifest file (contains <manifest), overwrite it entirely.
          echo "Scanning all XML files for hidden manifests..."
          find android/ -name "*.xml" -type f | while read -r target_xml; do
            if grep -q "<manifest" "$target_xml"; then
              echo "Replacing hidden manifest found at: $target_xml"
              cp /tmp/master_pure_manifest.xml "$target_xml"
            fi
          done

      - name: Compile Pristine Binary
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-sterile-apk
          path: build/app/outputs/flutter-apk/*.apk
