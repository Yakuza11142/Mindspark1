name: Flutter Large-Scale Automated Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Java Development Kit Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Stable Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Complete Build Automation Chain
        run: |
          echo "=== STAGE 1: ENVIRONMENT ISOLATION ==="
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build

          echo "=== STAGE 2: RESOLVING TEXT MODULE DEPENDENCIES ==="
          flutter pub upgrade --major-versions
          flutter pub get

          echo "=== STAGE 3: PURGING AND DROPPING PRISTINE MANIFEST ==="
          find . -name "AndroidManifest.xml" -type f -delete
          mkdir -p android/app/src/main
          
          # 🚀 THE ABSOLUTE FIX: Native line-by-line string execution block.
          # Bypasses base64 entirely to ensure your phone browser cannot corrupt a single line.
          TARGET_MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo '<?xml version="1.0" encoding="utf-8"?>' > $TARGET_MANIFEST
          echo '<manifest xmlns:android="http://android.com" xmlns:tools="http://android.com">' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.INTERNET"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.WAKE_LOCK"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.VIBRATE"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.CAMERA"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' >> $TARGET_MANIFEST
          echo '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>' >> $TARGET_MANIFEST
          echo '    <uses-feature android:name="android.hardware.camera" android:required="false"/>' >> $TARGET_MANIFEST
          echo '    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>' >> $TARGET_MANIFEST
          echo '    <uses-feature android:name="android.hardware.camera.ar" android:required="true"/>' >> $TARGET_MANIFEST
          echo '    <queries>' >> $TARGET_MANIFEST
          echo '        <intent>' >> $TARGET_MANIFEST
          echo '            <action android:name="android.intent.action.VIEW"/>' >> $TARGET_MANIFEST
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> $TARGET_MANIFEST
          echo '            <data android:scheme="https"/>' >> $TARGET_MANIFEST
          echo '        </intent>' >> $TARGET_MANIFEST
          echo '        <intent>' >> $TARGET_MANIFEST
          echo '            <action android:name="android.intent.action.VIEW"/>' >> $TARGET_MANIFEST
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> $TARGET_MANIFEST
          echo '            <data android:scheme="http"/>' >> $TARGET_MANIFEST
          echo '        </intent>' >> $TARGET_MANIFEST
          echo '    </queries>' >> $TARGET_MANIFEST
          echo '    <application android:name="androidx.multidex.MultiDexApplication" android:label="Mind Spark" android:icon="@mipmap/launcher_icon" android:allowBackup="true" android:fullBackupContent="true" android:hardwareAccelerated="true" tools:replace="android:label,android:icon,android:allowBackup">' >> $TARGET_MANIFEST
          echo '        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6212928709769131~8727268603"/>' >> $TARGET_MANIFEST
          echo '        <meta-data android:name="com.google.ar.core" android:value="required"/>' >> $TARGET_MANIFEST
          echo '        <meta-data android:name="flutter_deeplinking_enabled" android:value="true"/>' >> $TARGET_MANIFEST
          echo '        <meta-data android:name="flutterEmbedding" android:value="2"/>' >> $TARGET_MANIFEST
          echo '        <activity android:name="io.flutter.embedding.android.FlutterActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">' >> $TARGET_MANIFEST
          echo '            <intent-filter>' >> $TARGET_MANIFEST
          echo '                <action android:name="android.intent.action.MAIN"/>' >> $TARGET_MANIFEST
          echo '                <category android:name="android.intent.category.LAUNCHER"/>' >> $TARGET_MANIFEST
          echo '            </intent-filter>' >> $TARGET_MANIFEST
          echo '        </activity>' >> $TARGET_MANIFEST
          echo '    </application>' >> $TARGET_MANIFEST
          echo '</manifest>' >> $TARGET_MANIFEST

          echo "=== STAGE 4: COMPILING ASSET DICTIONARY ==="
          dart run flutter_launcher_icons

          echo "=== STAGE 5: RUNNING FORCED BYPASS BINARY BUILD ==="
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation --no-tree-shake-icons
