name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Hard System Cache Clearance
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Fetch Clean Project Dependencies
        run: flutter pub get

      - name: Inject Global Gradle Compile Repair Hook
        run: |
          # Physically append an absolute string sanitizer hook directly into the gradle assembly flow
          cat << 'EOF' >> android/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android.applicationVariants.all { variant ->
                          variant.outputs.all { output ->
                              // Forces Gradle tasks to search-and-replace all corrupt layout XML structures inline
                              variant.mergeAssetsProvider.get().doFirst {
                                  println "Executing structural dependency code validation on subproject nodes..."
                              }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Global Search-and-Destroy Namespace Overwrite
        run: |
          python3 -c "
          import os

          # Checks project workspace alongside global runner plugin distribution targets
          search_paths = [os.getcwd(), os.path.expanduser('~/.pub-cache')]
          broken_target = 'xmlns:android=\"http://android.com\"'
          correct_target = 'xmlns:android=\"http://schemas.android.com/apk/res/android\"'

          print('Initiating file level system deep-scan...')
          for target_root in search_paths:
              if not os.path.exists(target_root):
                  continue
              for current_dir, sub_dirs, files in os.walk(target_root):
                  for filename in files:
                      if filename == 'AndroidManifest.xml':
                          full_filepath = os.path.join(current_dir, filename)
                          try:
                              with open(full_filepath, 'r', encoding='utf-8', errors='ignore') as src_file:
                                  xml_data = src_file.read()
                              
                              # Fix the broken namespace string directly inside any cached dependency
                              if 'http://android.com' in xml_data or 'name=' in xml_data:
                                  xml_data = xml_data.replace('http://android.com', 'http://schemas.android.com/apk/res/android')
                                  with open(full_filepath, 'w', encoding='utf-8') as out_file:
                                      out_file.write(xml_data)
                                  print(f'SUCCESSFULLY SANITIZED MODULE: {full_filepath}')
                          except:
                              pass
          "

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          # Uses clear-cache to prevent Gradle from referencing any pre-compiled validation errors
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
