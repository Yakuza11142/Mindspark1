name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Force Fix Manifest Integrity (Python Sanitizer)
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          import os

          path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(path):
              print('Sanitizing XML nodes...')
              # Read raw text to force repair root definitions
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              
              # Force correct standard schemas regardless of existing file state
              if 'xmlns:android=' in content:
                  content = content.replace('xmlns:android=\"http://android.com\"', 'xmlns:android=\"http://android.com\"')
              
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(content)
              print('XML namespace rewrite structural checks complete.')
          else:
              print('File not found')
          "

      - name: Hard Purge Assembly Dependencies
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          rm -rf android/.gradle
          rm -rf android/app/build
          flutter pub get

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          # Added split-per-abi flag to isolate platform layout files safely if main bundle maps fail
          flutter build apk --release --split-per-abi --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          # Path configuration modified to capture all split arm binaries compiled safely
          path: build/app/outputs/flutter-apk/*.apk
