name: Production Flutter Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Wipe Workspace Storage
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Inject Safe Pre-Build Manifest Sanitizer
        run: |
          cat << 'EOF' >> android/app/build.gradle

          tasks.register("sanitizeManifestFiles") {
              doLast {
                  def manifestDirs = [
                      file("${project.projectDir}/src/main"),
                      file("${project.buildDir}/intermediates/merged_manifests")
                  ]
                  manifestDirs.each { dir ->
                      if (dir.exists()) {
                          dir.eachFileRecurse { file ->
                              if (file.name == "AndroidManifest.xml" && file.isFile()) {
                                  try {
                                      def content = file.text
                                      def cleanContent = content.replaceAll(/<uses-permission(?![^>]*android:name)[^>]*\/>/, "")
                                      cleanContent = cleanContent.replaceAll(/<uses-feature(?![^>]*android:name)[^>]*\/>/, "")
                                      if (content != cleanContent) {
                                          file.text = cleanContent
                                          logger.lifecycle("SANITIZED: Cleaned layout fragments in ${file.absolutePath}")
                                      }
                                  } catch (Exception e) {
                                      logger.warn("Skipping file lock on: ${file.name}")
                                  }
                              }
                          }
                      }
                  }
              }
          }

          project.afterEvaluate {
              tasks.all { task ->
                  if (task.name.startsWith("process") && task.name.endsWith("Manifest")) {
                      task.dependsOn("sanitizeManifestFiles")
                  }
              }
          }
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=400 \
            --android-skip-build-dependency-validation \
            --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
