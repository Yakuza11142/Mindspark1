name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Hard System Cache Clearance
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Fetch Clean Project Dependencies
        run: flutter pub get

      - name: Inject Strict Resolution Strategy Strategy
        run: |
          # Inject an explicit resolution block directly into the root build configuration file
          cat << 'EOF' >> android/build.gradle

          subprojects {
              project.configurations.all {
                  resolutionStrategy.eachDependency { DependencyResolveDetails details ->
                      // If any plugin brings in an outdated Google AR Core artifact, force patch it
                      if (details.requested.group == 'com.google.ar' && details.requested.name == 'core') {
                          details.useVersion '1.48.0'
                          details.because 'Forces structural XML namespace validation attributes'
                      }
                  }
              }
          }
          EOF

      - name: Reset Local App Manifest Parameters
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              xmlns:tools="http://github.com"
              package="com.example.mindspark">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>

              <application
                  tools:node="replace"
                  tools:replace="android:label,android:name,android:allowBackup"
                  android:name="androidx.multidex.MultiDexApplication"
                  android:label="Mind Spark"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:allowBackup="true"
                  android:hardwareAccelerated="true">

                  <meta-data android:name="flutterEmbedding" android:value="2"/>
                  <meta-data android:name="com.google.ar.core" android:value="optional" tools:replace="android:value"/>

                  <activity
                      android:name="io.flutter.embedding.android.FlutterActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
