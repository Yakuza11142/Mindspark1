name: "Mind Spark: Immune Engine"

on:
  push:
    branches: [ "main", "master" ]

jobs:
  immune_triage:
    name: "Slay & Repair Engine"
    runs-on: ubuntu-latest

    steps:
      - name: "1. Clone Code Streams"
        uses: actions/checkout@v4

      - name: "2. Initialize Java Core"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "3. Initialize Flutter Framework"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: "4. White Blood Cell Mode: Slay Corrupted Caches"
        run: |
          echo "Purging malicious and dead build caches..."
          flutter clean
          rm -rf android/.gradle android/app/build android/build pubspec.lock .dart_tool/

      - name: "5. Manifest Protection Shield: Auto-Detect & Healing Layer"
        run: |
          echo "Scanning manifest health protocols..."
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          BACKUP_PATH="android/app/src/main/AndroidManifest_backup.xml"
          
          if [ ! -f "$MANIFEST_PATH" ] || grep -q 'http://android.com' "$MANIFEST_PATH"; then
            echo "⚠️ CORRUPTION DETECTED! Deploying clean backup manifest..."
            mkdir -p android/app/src/main
            cp "$BACKUP_PATH" "$MANIFEST_PATH"
          else
            echo "✅ Manifest schema is healthy. Proceeding with surgical text alignments..."
            sed -i '/<config name="flutter_pubspec_backup">/,/<\/config>/d' "$MANIFEST_PATH"
          fi
          
          echo "Inspecting final verified clean manifest output stream..."
          cat "$MANIFEST_PATH"

      - name: "6. Secure Key Injection: Decode and Link Production Signing Elements"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Decoding secure upload keystore certificate binary..."
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          
          echo "Generating structured release key properties configuration mapping..."
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: "7. Slay Broken kotlinOptions Blocks"
        run: |
          echo "Removing unneeded kotlinOptions syntax inside app/build.gradle..."
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            sed -i '/kotlinOptions {/,/}/d' "$APP_GRADLE"
          fi

      - name: "8. Asset Layer Repair: Route Root Shader to Targeted Directory"
        run: |
          echo "Locating and routing root hologram_glow.frag asset..."
          mkdir -p shaders
          if [ -f "hologram_glow.frag" ]; then
            echo "Found shader asset at project root. Moving to target shaders/ path..."
            cp hologram_glow.frag shaders/hologram_glow.frag
          else
            echo "Shader not found at root. Creating structural fallback asset pathway..."
            echo '#version 460 core' > shaders/hologram_glow.frag
            echo 'out vec4 fragColor;' >> shaders/hologram_glow.frag
            echo 'void main() { fragColor = vec4(0.0, 0.5, 1.0, 1.0); }' >> shaders/hologram_glow.frag
          fi

      - name: "9. Synthesize Verified Dependencies"
        run: |
          echo "Binding dependencies natively..."
          flutter pub get

      - name: "10. Compile Production APK Binary"
        run: |
          echo "Assembling functional machine binary layer..."
          flutter build apk --release --split-per-abi --no-pub --no-tree-shake-icons

      - name: "11. Distribute Clean Installer Artifact Stream"
        uses: actions/upload-artifact@v4
        with:
          name: "mindspark-immune-apk"
          path: build/app/outputs/flutter-apk/
