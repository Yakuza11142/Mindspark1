name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Fix Android Manifest Namespace URL
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            echo "Found AndroidManifest.xml, rewriting invalid namespace..."
            # Replaces the broken android.com placeholder with the true Google schema address
            sed -i 's|xmlns:android="http://android.com"|xmlns:android="http://android.com"|g' "$MANIFEST_PATH"
            echo "Namespace updated successfully."
          else
            echo "ERROR: AndroidManifest.xml not found at $MANIFEST_PATH"
            exit 1
          fi

      - name: Wipe Local Assembly Directories
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          rm -rf android/.gradle
          rm -rf android/app/build
          flutter pub get

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
