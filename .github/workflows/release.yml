name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Clean Cache Resolution
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          flutter pub get

      - name: Deep Global Cache Sanitization Sweep
        run: |
          echo "Safely repairing raw plugin sources using exact word boundaries..."
          find /home/runner/.pub-cache -name "AndroidManifest.xml" -type f 2>/dev/null | while read -r manifest; do
            # Use \b to ensure we only target attributes missing the 'android:' prefix
            sed -i -E 's/\bname=/android:name=/g' "$manifest"
            sed -i -E 's/\brequired=/android:required=/g' "$manifest"
            sed -i -E 's/\bscheme=/android:scheme=/g' "$manifest"
            sed -i -E 's/\bhost=/android:host=/g' "$manifest"
            sed -i -E 's/\bvalue=/android:value=/g' "$manifest"
            sed -i -E 's/\bexported=/android:exported=/g' "$manifest"
            sed -i -E 's/\blaunchMode=/android:launchMode=/g' "$manifest"
            
            # Fail-safe line: Instantly repairs any accidental double-prefixes (android:android:)
            sed -i 's/android:android:/android:/g' "$manifest"
          done

      - name: Compile Pristine Binary
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/flutter-apk/*.apk
