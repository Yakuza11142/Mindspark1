name: Stacked Manifest Override Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  override_and_build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Manifest Source Engine
        run: |
          mkdir -p android/app/src/main
          
          # Write your immaculate layout source out of range of any compiler tools
          echo '<?xml version="1.0" encoding="utf-8"?>' > master_manifest.xml
          echo '<manifest xmlns:android="http://android.com" xmlns:tools="http://android.com" package="com.example.mindspark">' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.WAKE_LOCK"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.VIBRATE"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.CAMERA"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>' >> master_manifest.xml
          echo '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>' >> master_manifest.xml
          echo '    <uses-feature android:name="android.hardware.camera" android:required="false"/>' >> master_manifest.xml
          echo '    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>' >> master_manifest.xml
          echo '    <uses-feature android:name="android.hardware.camera.ar" android:required="true"/>' >> master_manifest.xml
          echo '    <queries>' >> master_manifest.xml
          echo '        <intent>' >> master_manifest.xml
          echo '            <action android:name="android.intent.action.VIEW"/>' >> master_manifest.xml
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> master_manifest.xml
          echo '            <data android:scheme="https"/>' >> master_manifest.xml
          echo '        </intent>' >> master_manifest.xml
          echo '        <intent>' >> master_manifest.xml
          echo '            <action android:name="android.intent.action.VIEW"/>' >> master_manifest.xml
          echo '            <category android:name="android.intent.category.BROWSABLE"/>' >> master_manifest.xml
          echo '            <data android:scheme="http"/>' >> master_manifest.xml
          echo '        </intent>' >> master_manifest.xml
          echo '    </queries>' >> master_manifest.xml
          echo '    <application android:name="androidx.multidex.MultiDexApplication" android:label="Mind Spark" android:icon="@android:drawable/sym_def_app_icon" android:allowBackup="true" android:fullBackupContent="true" android:hardwareAccelerated="true" tools:targetApi="34">' >> master_manifest.xml
          echo '        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>' >> master_manifest.xml
          echo '        <meta-data android:name="com.google.ar.core" android:value="required"/>' >> master_manifest.xml
          echo '        <meta-data android:name="flutter_deeplinking_enabled" android:value="true"/>' >> master_manifest.xml
          echo '        <meta-data android:name="flutterEmbedding" android:value="2"/>' >> master_manifest.xml
          echo '        <activity android:name="io.flutter.embedding.android.FlutterActivity" android:exported="true" android:launchMode="singleTop" android:taskAffinity="" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">' >> master_manifest.xml
          echo '            <intent-filter>' >> master_manifest.xml
          echo '                <action android:name="android.intent.action.MAIN"/>' >> master_manifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER"/>' >> master_manifest.xml
          echo '            </intent-filter>' >> master_manifest.xml
          echo '        </activity>' >> master_manifest.xml
          echo '    </application>' >> master_manifest.xml
          echo '</manifest>' >> master_manifest.xml
          
          # Copy to location for initial build pass
          cp master_manifest.xml android/app/src/main/AndroidManifest.xml

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Application Binary
        run: |
          # Let the compiler build whatever it wants—we will patch the output file anyway
          flutter pub get
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64 || echo "Build stopped, continuing to hot-patch step..."

      - name: Post-Build Binary Interception and Manifest Injection
        run: |
          # Install Android APK modification toolkit
          sudo apt-get update && sudo apt-get install -y apktool
          
          TARGET_APK=$(find build/app/outputs/flutter-apk/ -name "*.apk" | head -n 1)
          if [ -z "$TARGET_APK" ]; then
            echo "Compiler failed completely. Forcing fallback rebuild..."
            exit 1
          fi
          
          echo "Intercepting binary file: $TARGET_APK"
          
          # 1. Unpack the compiled binary down to raw assets
          apktool d "$TARGET_APK" -o unpacked_apk -f
          
          # 2. Obliterate the compiled manifest that survived
          rm -f unpacked_apk/AndroidManifest.xml
          
          # 3. Inject the clean layout file directly into the unpack core
          cp master_manifest.xml unpacked_apk/AndroidManifest.xml
          
          # 4. Rebuild the binary file with zero traces of old configurations
          apktool b unpacked_apk -o "$TARGET_APK"
          
          echo "Binary hot-patched successfully. Old manifest has been wiped from existence."

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/*.apk
