name: Flutter Automated Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Java Development Kit Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Stable Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Execute Complete Build Automation Chain
        run: |
          echo "=== STAGE 1: ENVIRONMENT ISOLATION ==="
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build

          echo "=== STAGE 2: RESOLVING TEXT MODULE DEPENDENCIES ==="
          flutter pub upgrade --major-versions
          flutter pub get

          echo "=== STAGE 3: MANIFEST INTEGRITY VERIFICATION ==="
          TARGET_DIR="android/app/src/main"
          TARGET_FILE="$TARGET_DIR/AndroidManifest.xml"

          if [ ! -f "$TARGET_FILE" ]; then
            echo "❌ Critical Error: Manifest file is missing from repository."
            exit 1
          fi

          # Local Self-Healing Loop: Verifies structure without breaking git tracking
          for i in {1..3}; do
            echo "Self-Healing Verification Loop: Run $i"
            
            if grep -q 'android:name' "$TARGET_FILE"; then
              echo "✅ Manifest structure verified! Zero corruption detected."
              break
            else
              echo "⚠️ Corruption detected! Reverting to clean repository baseline..."
              git checkout HEAD -- "$TARGET_FILE"
              sleep 1
            fi
            
            if [ $i -eq 3 ] && ! grep -q 'android:name' "$TARGET_FILE"; then
              echo "❌ Error: Manifest is permanently corrupted in source control."
              exit 1
            fi
          done

          echo "=== STAGE 4: COMPILING ASSET DICTIONARY ==="
          dart run flutter_launcher_icons

          echo "=== STAGE 5: RUNNING FORCED BYPASS BINARY BUILD ==="
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation --no-tree-shake-icons
