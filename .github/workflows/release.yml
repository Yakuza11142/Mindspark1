name: Flutter Build Check
on: [push, pull_request]

jobs:
  check-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Engine
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      # === STAGE 1: ENVIRONMENT ISOLATION ===
      - name: Stage 1 - Clean Cache Environment
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build

      # === STAGE 2: RESOLVING TEXT MODULE DEPENDENCIES ===
      - name: Stage 2 - Update Packages
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      # === STAGE 4: COMPILING ASSET DICTIONARY ===
      - name: Stage 4 - Generate App Launcher Icons
        run: |
          dart run flutter_launcher_icons

      # === STAGE 5: RUNNING FORCED BYPASS BINARY BUILD ===
      - name: Stage 5 - Compile Production Release APK
        run: |
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation --no-tree-shake-icons
