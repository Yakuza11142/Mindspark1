name: Stacked Manifest Override Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  override_and_build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Deep Nuke Caches & Get Packages
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -rf android/.gradle/
          rm -rf android/app/build/
          flutter pub get

      - name: Global Environment Namespace Correction
        run: |
          echo "Scanning all system and local workspace paths..."
          
          # Force fix every single AndroidManifest file on the entire virtual runner image
          # This sweeps your code, flutter plugins, local engine, and hidden build caches
          find . /home/runner/ -name "AndroidManifest.xml" -type f 2>/dev/null | while read -r manifest; do
            if grep -qE '(uses-permission|uses-feature|action|category|meta-data|activity|intent|data)' "$manifest"; then
              
              # Globally correct the missing 'android:' prefixes instantly
              sed -i -E 's/([^:])name=/\1android:name=/g' "$manifest"
              sed -i -E 's/([^:])required=/\1android:required=/g' "$manifest"
              sed -i -E 's/([^:])scheme=/\1android:scheme=/g' "$manifest"
              sed -i -E 's/([^:])host=/\1android:host=/g' "$manifest"
              sed -i -E 's/([^:])value=/\1android:value=/g' "$manifest"
              sed -i -E 's/([^:])exported=/\1android:exported=/g' "$manifest"
              sed -i -E 's/([^:])launchMode=/\1android:launchMode=/g' "$manifest"
              
            fi
          done
          echo "System-wide attributes forced successfully."

      - name: Compile Pristine Binary
        run: |
          mkdir -p build/symbols
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-sterile-apk
          path: build/app/outputs/flutter-apk/*.apk
