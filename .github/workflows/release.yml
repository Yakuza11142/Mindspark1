name: "Mind Spark: Hardened Cryptographic Multi-Platform Engine"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      mutation_generation:
        description: "Evolution"
        required: false
        default: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  immune_triage:
    name: "Secure Hardened 4-Platform Matrix"
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: "Clone"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Matrix"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          MTN_KEY: ${{ secrets.MTN_API_KEY }}
          HEYGEN_KEY: ${{ secrets.HEYGEN_KEY }}
          TRIPO_KEY: ${{ secrets.TRIPO_API_KEY }}
          PEXEL_KEY: ${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_KEY: ${{ secrets.ELEVEN_LAB_API_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          VERTEX_KEY: ${{ secrets.VERTEX_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          heal_and_execute() {
            local name="$1" cmd="$2" max=4 att=1 log="sweep.log"
            echo "::group::Step: $name"
            while [ $att -le $max ]; do
              echo "[Attempt $att/$max] Running: $cmd"
              if eval "$cmd" > "$log" 2>&1; then
                cat "$log" && echo "SUCCESS: $name passed." && echo "::endgroup::" && return 0
              fi
              cat "$log"
              if grep -qI "Namespace not specified" "$log"; then
                if [ -f android/build.gradle ]; then
                  printf "\nsubprojects {\n    afterEvaluate { project ->\n        if (project.hasProperty('android') && project.android.namespace == null) {\n            project.android.namespace = project.group\n        }\n    }\n}\n" >> android/build.gradle
                fi
              elif grep -qI "AndroidManifest.xml" "$log" || grep -qI "namespace" "$log"; then
                [ -d android/app/src/main ] && touch android/app/src/main/AndroidManifest.xml || true
              elif [ $att -eq 1 ]; then
                command -v flutter >/dev/null 2>&1 && flutter clean && flutter pub get || true
              elif [ $att -eq 2 ]; then
                [ -d ios ] && (cd ios && pod repo update && pod install --repo-update) || true
                command -v flutter >/dev/null 2>&1 && flutter pub cache repair || true
              fi
              rm -f "$log" && att=$((att + 1))
            done
            echo "CRITICAL: $name failed entirely." && echo "::endgroup::" && return 1
          }

          heal_and_execute "Java" "brew install openjdk@17 && echo 'JAVA_HOME=/opt/homebrew/opt/openjdk@17' >> \$GITHUB_ENV" || exit 1
          
          # FIXED: Restored complete routing path logic back to the official core framework project repo
          heal_and_execute "Flutter" "git clone https://github.com -b stable --depth 1 /opt/flutter && echo '/opt/flutter/bin' >> \$GITHUB_PATH && export PATH=\$PATH:/opt/flutter/bin && flutter doctor" || exit 1
          
          export PATH=$PATH:/opt/flutter/bin JAVA_HOME=/opt/homebrew/opt/openjdk@17
          
          APP_GRADLE="android/app/build.gradle"
          if [ -f "$APP_GRADLE" ]; then
            printf "android {\n    lintOptions {\n        abortOnError false\n        checkReleaseBuilds false\n        quiet true\n        ignoreWarnings true\n    }\n    buildTypes {\n        release {\n            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')\n        }\n    }\n}\n" > lint.gradle
            perl -0777 -pi -e 's/android \{/`cat lint.gradle`/e' "$APP_GRADLE" && rm -f lint.gradle
          fi

          heal_and_execute "Cache Purge" "flutter clean && rm -rf android/.gradle android/app/build android/build ios/Pods ios/Podfile.lock pubspec.lock .dart_tool/" || exit 1
          heal_and_execute "Keystore Link" "mkdir -p android/app && echo \"\$KEYSTORE_BASE64\" | base64 --decode > android/app/upload-keystore.jks && printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \"\$KEYSTORE_PASSWORD\" \"\$KEY_PASSWORD\" \"\$KEY_ALIAS\" > android/key.properties" || exit 1
          heal_and_execute "Shaders" "mkdir -p shaders && if [ -f 'hologram_glow.frag' ]; then cp hologram_glow.frag shaders/hologram_glow.frag; else printf '#version 460 core\nout vec4 fragColor;\nvoid main() { fragColor = vec4(0.0, 0.5, 1.0, 1.0); }\n' > shaders/hologram_glow.frag; fi" || exit 1
          heal_and_execute "Config" "flutter config --enable-web" || exit 1
          heal_and_execute "Dependencies" "flutter config --jdk-dir \"\$JAVA_HOME\" && flutter pub get" || exit 1
          heal_and_execute "Tests" "flutter test --no-pub" || exit 1
          
          mkdir -p debug_symbols
          DART_FLAGS="--dart-define=MTN=\$MTN_KEY --dart-define=HEYGEN=\$HEYGEN_KEY --dart-define=TRIPO=\$TRIPO_KEY --dart-define=PEXEL=\$PEXEL_KEY --dart-define=ELEVENLABS=\$ELEVENLABS_KEY --dart-define=GEMINI=\$GEMINI_KEY --dart-define=OPENAI=\$OPENAI_KEY --dart-define=GROQ=\$GROQ_KEY --dart-define=VERTEX=\$VERTEX_KEY --dart-define=S_URL=\$SUPABASE_URL --dart-define=S_KEY=\$SUPABASE_ANON_KEY"

          heal_and_execute "Build APK" "flutter build apk --release --split-per-abi --no-tree-shake-icons --obfuscate --split-debug-info=debug_symbols/apk $DART_FLAGS" || exit 1
          heal_and_execute "Build AAB" "flutter build appbundle --release --no-tree-shake-icons --obfuscate --split-debug-info=debug_symbols/aab $DART_FLAGS" || exit 1
          heal_and_execute "Build Web" "flutter build web --release $DART_FLAGS" || exit 1
          heal_and_execute "Build iOS" "flutter build ios --release --no-codesign --obfuscate --split-debug-info=debug_symbols/ios $DART_FLAGS" || exit 1

      - name: "Upload APK Folder"
        uses: actions/upload-artifact@v4
        with:
          name: "raw_apk_build_directory"
          path: build/app/outputs/flutter-apk/

      - name: "Upload AAB Folder"
        uses: actions/upload-artifact@v4
        with:
          name: "raw_aab_build_directory"
          path: build/app/outputs/bundle/release/

      - name: "Upload Web Engine Folder"
        uses: actions/upload-artifact@v4
        with:
          name: "raw_web_build_directory"
          path: build/web/

      - name: "Upload iOS Construction Folder"
        uses: actions/upload-artifact@v4
        with:
          name: "raw_ios_build_directory"
          path: build/ios/iphoneos/

      - name: "Deployment"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_artifacts
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} release_artifacts/ \;
          find build/app/outputs/bundle/release/ -name "*.aab" -exec cp {} release_artifacts/ \;
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            cd build/ios/iphoneos && mkdir -p Payload && cp -r Runner.app Payload/
            zip -r ../../../release_artifacts/app-release.ipa Payload && cd ../../..
          fi
          if [ -d "build/web" ]; then
            cd build/web && zip -r ../../release_artifacts/production_website.zip . && cd ../..
          fi
          [ -d "debug_symbols" ] && zip -r release_artifacts/obfuscation_decryption_symbols.zip debug_symbols
          
          DEPLOYABLE_ASSETS=$(find release_artifacts -type f)
          if [ -z "$DEPLOYABLE_ASSETS" ]; then exit 1; fi
          
          HASH_NOTES="### 🛡️ Secure Hardened Release Audit Checklist (Triple SHA3)"
          for filepath in $DEPLOYABLE_ASSETS; do
            filename=$(basename "$filepath")
            sha3_256=$(openssl dgst -sha3-256 "$filepath" | awk '{print $NF}')
            sha3_384=$(openssl dgst -sha3-384 "$filepath" | awk '{print $NF}')
            sha3_512=$(openssl dgst -sha3-512 "$filepath" | awk '{print $NF}')
            HASH_NOTES="$HASH_NOTES"$'\n'$'\n'"#### 📦 Hardened Asset: $filename"
            [ "$filename" = "obfuscation_decryption_symbols.zip" ] && HASH_NOTES="$HASH_NOTES"$'\n'"⚠️ *Note: contains decryption mapping keys.*"
            HASH_NOTES="$HASH_NOTES"$'\n'"* **SHA3-256:** \`$sha3_256\`"$'\n'"* **SHA3-384:** \`$sha3_384\`"$'\n'"* **SHA3-512:** \`$sha3_512\`"
          done
          echo "$HASH_NOTES" > distribution_telemetry.md
          
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M')-hardened-signed"
          gh release create "$TAG_NAME" $DEPLOYABLE_ASSETS --title "Cryptographically Locked Hardened Build: $TAG_NAME" --notes-file distribution_telemetry.md --target $(git rev-parse --abbrev-ref HEAD)
