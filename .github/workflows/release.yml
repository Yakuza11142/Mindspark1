name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Aggressive Runner System Purge
        run: |
          # Force delete every hidden cache directory in the runner workspace
          flutter clean
          rm -rf .dart_tool/
          rm -rf .gradle/
          rm -f pubspec.lock
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf android/build
          
          # Deep clean the sub-caches
          find . -name "AndroidManifest.xml" -path "*/build/*" -delete || true
          find . -name "AndroidManifest.xml" -path "*/intermediates/*" -delete || true

      - name: Dynamic Search-and-Destroy Namespace Patch
        run: |
          python3 -c "
          import os
          import glob

          print('Initiating recursive file patch across entire workspace...')
          
          # Walk through every directory in the project to catch hidden duplicates
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file == 'AndroidManifest.xml':
                      full_path = os.path.join(root, file)
                      try:
                          with open(full_path, 'r', encoding='utf-8', errors='ignore') as f:
                              content = f.read()
                          
                          # If it finds the broken string, it heals it on the spot
                          if 'http://android.com' in content:
                              print(f'CRITICAL HEAL: Found corrupted manifest at -> {full_path}')
                              content = content.replace('http://android.com', 'http://schemas.android.com/apk/res/android')
                              with open(full_path, 'w', encoding='utf-8') as f:
                                  f.write(content)
                      except Exception as e:
                          print(f'Skipping unreadable node {full_path}: {e}')
          "

      - name: Fetch Clean Dependencies
        run: flutter pub get

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          # Added --clear-cache to prevent Gradle from reading old merge layers
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
