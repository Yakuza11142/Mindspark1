name: Production Flutter Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Wipe Workspace Storage
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Inject Agnostic Manifest Patch
        run: |
          # Safe fallback pattern: Patch both project file and early build targets 
          cat << 'EOF' >> android/app/build.gradle

          gradle.taskGraph.whenReady { taskGraph ->
              taskGraph.allTasks.each { task ->
                  if (task.name.startsWith("process") && task.name.endsWith("Manifest")) {
                      task.doFirst {
                          def manifestDirs = [
                              file("${project.projectDir}/src/main"),
                              file("${project.buildDir}/intermediates/merged_manifests")
                          ]
                          manifestDirs.each { dir ->
                              if (dir.exists()) {
                                  dir.eachFileRecurse { file ->
                                      if (file.name == "AndroidManifest.xml" && file.isFile()) {
                                          try {
                                              def txt = file.text
                                              def clean = txt.replaceAll(/<uses-permission(?![^>]*android:name)[^>]*\/>/, "")
                                              clean = clean.replaceAll(/<uses-feature(?![^>]*android:name)[^>]*\/>/, "")
                                              if (txt != clean) {
                                                  file.text = clean
                                              }
                                          } catch (Exception e) {}
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release \
            --no-tree-shake-icons \
            --obfuscate \
            --split-debug-info=build/symbols \
            --build-number=400 \
            --android-skip-build-dependency-validation \
            --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
