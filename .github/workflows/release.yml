name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Deep Clean Workspace Caches
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -rf android/build

      - name: Resolve Project Dependencies
        run: flutter pub get

      - name: Global Search-and-Destroy Namespace Overwrite
        run: |
          python3 -c "
          import os

          # This searches EVERY file in the runner workspace, including system caches
          search_paths = [os.getcwd(), os.path.expanduser('~/.pub-cache')]
          broken_string = 'xmlns:android=\"http://android.com\"'
          fixed_string = 'xmlns:android=\"http://schemas.android.com/apk/res/android\"'

          print('Scanning all system paths for corrupt manifest schemas...')
          for base_path in search_paths:
              if not os.path.exists(base_path):
                  continue
              for root, dirs, files in os.walk(base_path):
                  for file in files:
                      if file == 'AndroidManifest.xml':
                          full_path = os.path.join(root, file)
                          try:
                              with open(full_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                              
                              if 'http://android.com' in content:
                                  print(f'CRITICAL PATCH: Corrected manifest at -> {full_path}')
                                  # Fixes the broken namespace tag instantly
                                  content = content.replace('http://android.com', 'http://schemas.android.com/apk/res/android')
                                  with open(full_path, 'w', encoding='utf-8') as f:
                                      f.write(content)
                          except Exception as e:
                              pass
          "

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          # Uses clear-cache to prevent Gradle from loading unzipped error states
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
