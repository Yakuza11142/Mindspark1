name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Nuclear Native Directory Re-Generation
        run: |
          # 1. Back up vital native configuration files if they exist
          mkdir -p build/backup_meta
          [ -f "android/app/google-services.json" ] && cp android/app/google-services.json build/backup_meta/ || true
          [ -f "android/key.properties" ] && cp android/key.properties build/backup_meta/ || true
          [ -f "android/app/release-key.jks" ] && cp android/app/release-key.jks build/backup_meta/ || true

          # 2. Obliterate the corrupt native layer completely
          rm -rf android/
          rm -rf .dart_tool/
          rm -f pubspec.lock

          # 3. Force Flutter to generate a clean, modern Android module
          flutter create . --platforms=android
          flutter pub get

          # 4. Restore original structural keys and signatures into the fresh folder map
          [ -f "build/backup_meta/google-services.json" ] && cp build/backup_meta/google-services.json android/app/ || true
          [ -f "build/backup_meta/key.properties" ] && cp build/backup_meta/key.properties android/ || true
          [ -f "build/backup_meta/release-key.jks" ] && cp build/backup_meta/release-key.jks android/app/ || true

      - name: Inject Production Manifest Node Permissions
        run: |
          # Inject a functional production manifest layout directly into the clean skeleton
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              package="com.example.mindspark">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>

              <application
                  android:label="Mind Spark"
                  android:name="androidx.multidex.MultiDexApplication"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:hardwareAccelerated="true">
                  
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
                  
                  <activity
                      android:name="io.flutter.embedding.android.FlutterActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
