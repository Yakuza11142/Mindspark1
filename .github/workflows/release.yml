name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Hard Workspace Purge
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Resolve Project Dependencies
        run: flutter pub get

      - name: Deep-Sanitize ARCore and Camera Manifest Segments
        run: |
          python3 -c "
          import os
          import glob

          # Scan workspace and pub-cache where arcore_flutter_plus is checked out
          paths_to_sweep = [os.getcwd(), os.path.expanduser('~/.pub-cache')]
          
          print('Scanning global file maps for invalid AR manifest schemas...')
          for base_dir in paths_to_sweep:
              if not os.path.exists(base_dir):
                  continue
              for root, dirs, files in os.walk(base_dir):
                  for file in files:
                      if file == 'AndroidManifest.xml':
                          manifest_path = os.path.join(root, file)
                          try:
                              with open(manifest_path, 'r', encoding='utf-8', errors='ignore') as f:
                                  content = f.read()
                              
                              # Catching invalid/blank uses-permission and uses-feature formatting
                              corrupt_detected = False
                              if 'xmlns:android=\"http://android.com\"' in content:
                                  content = content.replace('http://android.com', 'http://android.com')
                                  corrupt_detected = True
                              
                              # Strip any malformed uses-feature nodes without names that arcore injects
                              if '<uses-feature />' in content or '<uses-permission />' in content:
                                  content = content.replace('<uses-feature />', '')
                                  content = content.replace('<uses-permission />', '')
                                  corrupt_detected = True
                                  
                              if corrupt_detected:
                                  print(f'PARSING REPAIR COMPLETED FOR: {manifest_path}')
                                  with open(manifest_path, 'w', encoding='utf-8') as f:
                                      f.write(content)
                          except:
                              pass
          "

      - name: Force Injection of Master Manifest Override Template
        run: |
          # Overwrites your local manifest using a strict node substitution map to ignore plugin errors
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              xmlns:tools="http://android.com"
              package="com.example.mindspark">

              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>

              <application
                  tools:node="replace"
                  tools:replace="android:label,android:name,android:allowBackup"
                  android:name="androidx.multidex.MultiDexApplication"
                  android:label="Mind Spark"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:allowBackup="true"
                  android:hardwareAccelerated="true">

                  <meta-data android:name="flutterEmbedding" android:value="2"/>
                  <meta-data android:name="com.google.ar.core" android:value="required" tools:replace="android:value"/>

                  <activity
                      android:name="io.flutter.embedding.android.FlutterActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
