name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Force Clean Local Caches
        run: |
          flutter clean
          rm -rf .dart_tool/
          rm -f pubspec.lock
          rm -rf android/.gradle
          rm -rf android/app/build
          flutter pub get

      - name: Self-Healing Manifest Sanitizer
        run: |
          python3 -c "
          import os
          import glob

          # 1. Fix the main project manifest root
          main_manifest = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(main_manifest):
              with open(main_manifest, 'r') as f:
                  text = f.read()
              text = text.replace('http://android.com', 'http://schemas.android.com/apk/res/android')
              with open(main_manifest, 'w') as f:
                  f.write(text)
              print('Main manifest healed.')

          # 2. Aggressively scan and patch every single plugin manifest fetched by pub get
          pub_cache_path = os.path.expanduser('~/.pub-cache/hosted/pub.dev/')
          manifest_files = glob.glob(os.path.join(pub_cache_path, '**/AndroidManifest.xml'), recursive=True)
          
          print(f'Scanning {len(manifest_files)} sub-plugin manifests for corrupt namespaces...')
          for path in manifest_files:
              with open(path, 'r', errors='ignore') as f:
                  data = f.read()
              if 'http://android.com' in data:
                  print(f'ALERT: Found corrupt namespace inside dependency: {path}')
                  data = data.replace('http://android.com', 'http://schemas.android.com/apk/res/android')
                  with open(path, 'w') as f:
                      f.write(data)
          "

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --split-per-abi --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/flutter-apk/*.apk
