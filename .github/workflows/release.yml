name: Production Flutter Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dorg.gradle.workers.max=2 -Dorg.gradle.caching=false"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false

      - name: Wipe Workspace Storage
        run: |
          flutter clean
          rm -rf .dart_tool/ pubspec.lock android/.gradle android/app/build android/build
          rm -rf ~/.gradle/caches/

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Inject Runtime Manifest Stripper Hook
        run: |
          # Inject a Groovy parser directly into the main Gradle build tree
          cat << 'EOF' >> android/build.gradle

          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android.applicationVariants.all { variant ->
                          variant.outputs.all { output ->
                              // Intercept the manifest processor task before execution
                              variant.processManifestProvider.get().doFirst { task ->
                                  println "CRITICAL: Cleaning binary manifest fragments in memory..."
                                  task.getInputs().getFiles().getFiles().each { file ->
                                      if (file.getName() == "AndroidManifest.xml" && file.exists()) {
                                          try {
                                              def parser = new groovy.xml.XmlParser(false, false)
                                              def xml = parser.parse(file)
                                              
                                              // Remove nodes that are completely blank or missing the name key
                                              xml.children().removeIf { node ->
                                                  (node.name() == 'uses-permission' || node.name() == 'uses-feature') &&
                                                  !node.attributes().keySet().any { it.toString().contains('name') }
                                              }
                                              
                                              def writer = new PrintWriter(file)
                                              def printer = new groovy.xml.XmlNodePrinter(writer)
                                              printer.preserveWhitespace = true
                                              printer.print(xml)
                                              writer.close()
                                          } catch (Exception e) {
                                              // Gracefully skip binary file read locks
                                          }
                                      }
                                  }
                              }
                          }
                      }
                  }
              }
          }
          EOF

      - name: Compile Fresh Binary Layout
        run: |
          mkdir -p build/symbols
          flutter build apk --release --clear-cache --no-tree-shake-icons --obfuscate --split-debug-info=build/symbols --build-number=400 --android-skip-build-dependency-validation --target-platform=android-arm64

      - name: Upload Clean Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-apk
          path: build/app/outputs/apk/release/app-arm64-v8a-release.apk
