name: m1
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: m1-build-pipeline
  cancel-in-progress: true

permissions:
  contents: write
  actions: write
  packages: write

jobs:
  # ==========================================
  # TRACK 1: Cross-Platform Client App Builds (macOS Matrix)
  # ==========================================
  b:
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset Workspace Tags
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$GITHUB_TOKEN" ]; then
            if gh release view "v1.0.${{ github.run_number }}" >/dev/null 2>&1; then 
              gh release delete "v1.0.${{ github.run_number }}" --yes || true
            fi
          fi
          git tag -d "v1.0.${{ github.run_number }}" 2>/dev/null || true
          git push --delete origin "v1.0.${{ github.run_number }}" 2>/dev/null || true

      - name: Install Java Environments
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Setup Flutter Bundle Stable Engine
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Configure Secure Execution Environment
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          flutter clean || true
          rm -rf android/.gradle android/app/build android/build ios/Pods ios/Podfile.lock .dart_tool/ pubspec.lock
          mkdir -p android/app shaders ds/apk ds/aab ds/ios build/apk build/bundle build/ios/SourcePackages build/web
          
          touch .env
          
          if [ -n "$KEYSTORE_BASE64" ]; then 
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          fi
          
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' "$KEYSTORE_PASSWORD" "$KEY_PASSWORD" "$KEY_ALIAS" > android/key.properties
          flutter config --enable-web --jdk-dir "$JAVA_HOME"

      - name: Link Workspace Assets & Override Namespace Labels
        run: |
          set -e
          img_src=$(find . -type f -iname "Screenshot_20260708_215841_Chrome*" | head -n 1)
          if [ -n "$img_src" ]; then
            echo "Processing application logo from: $img_src"
            sips -s format png "$img_src" --out logo.png
          else
            echo "⚠️ Logo screenshot asset missing. Generating safety workspace vector fallback."
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 --decode > logo.png
          fi
          
          python3 -c "
          import os, re
          if os.path.exists('pubspec.yaml'):
              with open('pubspec.yaml', 'r') as f: txt = f.read()
              if 'assets:' in txt:
                  txt = re.sub(r'assets:\s*\n', 'assets:\n    - .env\n    - logo.png\n', txt)
              else:
                  txt += '\n\nflutter:\n  assets:\n    - .env\n    - logo.png\n'
              if 'flutter_launcher_icons:' not in txt:
                  txt += '\n\nflutter_launcher_icons:\n  android: true\n  ios: true\n  image_path: \"logo.png\"\n  web:\n    generate: true\n    image_path: \"logo.png\"\n'
              with open('pubspec.yaml', 'w') as f: f.write(txt)
          "
          
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
              perl -pi -e 's/android:label="[^"]*"/android:label="Mind Spark"/g' android/app/src/main/AndroidManifest.xml
          fi
          
          if [ -f ios/Runner/Info.plist ]; then
              python3 -c "
              import re
              with open('ios/Runner/Info.plist', 'r') as f: txt = f.read()
              txt = re.sub(r'<key>CFBundleDisplayName</key>\s*<string>[^<]*</string>', '<key>CFBundleDisplayName</key>\n\t<string>Mind Spark</string>', txt)
              txt = re.sub(r'<key>CFBundleName</key>\s*<string>[^<]*</string>', '<key>CFBundleName</key>\n\t<string>Mind Spark</string>', txt)
              with open('ios/Runner/Info.plist', 'w') as f: f.write(txt)
              "
          fi
          
          if [ -f android/build.gradle ]; then 
            echo -e "\nsubprojects { afterEvaluate { p -> if (p.hasProperty('android') && p.android.namespace == null) { p.android.namespace = p.group } } }" >> android/build.gradle
          fi

      - name: Fetch Dynamic Dependencies (Self-Healing)
        run: |
          flutter pub get || {
            echo "⚠️ [Self-Healing] Dependency cache reset..."
            flutter pub cache clean --force
            rm -rf .dart_tool/ pubspec.lock
            flutter pub get
          }

      - name: Execute Workspace Self-Healing Suite
        run: |
          set -e
          echo "🤖 Starting Automated Virtual Workspace Diagnostics..."
          
          # Fix 1: Ensure Web target folders exist to avoid asset copy errors
          if [ ! -d web ]; then
            flutter create . --platforms=web
          fi
          
          # Fix 2: Inject mandatory iOS Microphone settings if missing
          if [ -f ios/Runner/Info.plist ] && ! grep -q "NSMicrophoneUsageDescription" ios/Runner/Info.plist; then
            perl -pi -e 's/<\/dict>/\t<key>NSMicrophoneUsageDescription<\/key>\n\t<string>Voice access required for Spark Assistant<\/string>\n\t<key>NSCameraUsageDescription<\/key>\n\t<string>AR camera access required to paint hard light hologram<\/string>\n<\/dict>/g' ios/Runner/Info.plist
          fi

          # Fix 3: Injects missing dev_dependencies hooks cleanly via Python
          python3 -c "
          import os
          if os.path.exists('pubspec.yaml'):
              with open('pubspec.yaml', 'r') as f: txt = f.read()
              if 'flutter_launcher_icons:' not in txt:
                  txt += '\ndev_dependencies:\n  flutter_launcher_icons: ^0.14.2\n'
                  with open('pubspec.yaml', 'w') as f: f.write(txt)
          "
          
          # Fix 4: Force Android Manifest to bypass Impeller engine targets
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            perl -pi -e 's/<\/application>/\t<meta-data android:name="io.flutter.embedding.android.RenderingEngine" android:value="skia" \/>\n\t<\/application>/g' android/app/src/main/AndroidManifest.xml
          fi
          
          # Fix 5: Cross-platform Perl sanitization for Android target SDK levels
          if [ -f android/app/build.gradle ]; then
            perl -pi -e 's/compileSdkVersion.*/compileSdkVersion 34/g; s/compileSdk .*/compileSdk = 34/g;' android/app/build.gradle
            perl -pi -e 's/targetSdkVersion.*/targetSdkVersion 34/g; s/targetSdk .*/targetSdk = 34/g;' android/app/build.gradle
          fi
          
          # Fix 6: Enforce valid mobile compliant GLSL ES shader formats
          mkdir -p shaders
          if [ ! -f shaders/hologram_glow.frag ] || grep -q "460 core" shaders/hologram_glow.frag; then
            printf '#version 320 es\nprecision mediump float;\nout vec4 c;\nvoid main(){c=vec4(0,0.5,1,1);}' > shaders/hologram_glow.frag
          fi
          
          flutter pub get
      - name: Compile App Launcher Graphics
        continue-on-error: true
        run: dart run flutter_launcher_icons

      - name: Compile Distribution Architecture Binaries
        env:
          MTN_KEY: \${{ secrets.MTN_API_KEY }}
          HEYGEN_KEY: \${{ secrets.HEYGEN_KEY }}
          TRIPO_KEY: \${{ secrets.TRIPO_API_KEY }}
          PEXEL_KEY: \${{ secrets.PEXELS_API_KEY }}
          ELEVENLABS_KEY: \${{ secrets.ELEVEN_LAB_API_KEY }}
          GEMINI_KEY: \${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY: \${{ secrets.OPENAI_KEY }}
          GROQ_KEY: \${{ secrets.GROQ_API_KEY }}
          VERTEX_KEY: \${{ secrets.VERTEX_API_KEY }}
          SUPABASE_URL: \${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: \${{ secrets.SUPABASE_ANON_KEY }}
          SHA_3: \({{ secrets.SHA_3 }}           SHA_3_256:\){{ secrets.SHA_3_256 }}
          SHA_3_384: \({{ secrets.SHA_3_384 }}           SHA_3_512:\){{ secrets.SHA_3_512 }}
          V_NUM: \${{ github.run_number }}
        run: |
          cat << 'EOF' > generate_env.py
          import os, subprocess
          keys = ['MTN_KEY', 'HEYGEN_KEY', 'TRIPO_KEY', 'PEXEL_KEY', 'ELEVENLABS_KEY', 'GEMINI_KEY', 'OPENAI_KEY', 'GROQ_KEY', 'VERTEX_KEY', 'SUPABASE_URL', 'SUPABASE_ANON_KEY', 'SHA_3', 'SHA_3_256', 'SHA_3_384', 'SHA_3_512']
          cl = lambda k: os.environ.get(k, '').strip().replace('\n', '').replace('\r', '')
          
          with open('.env', 'w') as f:
              for k in keys:
                  f.write(f"{k}={cl(k)}\n")
                  
          fs_list = [f"--dart-define={n}={cl(k)}" for n, k in [
              ('MTN', 'MTN_KEY'), ('HEYGEN', 'HEYGEN_KEY'), ('TRIPO', 'TRIPO_KEY'), 
              ('PEXEL', 'PEXEL_KEY'), ('ELEVENLABS', 'ELEVENLABS_KEY'), ('GEMINI', 'GEMINI_KEY'), 
              ('OPENAI', 'OPENAI_KEY'), ('GROQ', 'GROQ_KEY'), ('VERTEX', 'VERTEX_KEY'), 
              ('SUPABASE_URL', 'SUPABASE_URL'), ('SUPABASE_ANON_KEY', 'SUPABASE_ANON_KEY'), 
              ('SIG_SHA3', 'SHA_3'), ('SIG_SHA3_256', 'SHA_3_256'), ('SIG_SHA3_384', 'SHA_3_384'), 
              ('SIG_SHA3_512', 'SHA_3_512')
          ]]
          b_cmd = [f"--build-name=1.0.{os.environ['V_NUM']}", f"--build-number={os.environ['V_NUM']}"]
          
          if os.path.exists('ios/Podfile'):
              subprocess.run('cd ios && rm -rf Pods Podfile.lock && pod repo update && pod install --repo-update', shell=True)
              
          subprocess.run(['flutter', 'build', 'apk', '--release', '--no-tree-shake-icons', '--obfuscate', '--split-debug-info=ds/apk', '--android-skip-build-dependency-validation'] + fs_list + b_cmd, check=True)
          subprocess.run(['flutter', 'build', 'appbundle', '--release', '--no-tree-shake-icons', '--obfuscate', '--split-debug-info=ds/aab', '--android-skip-build-dependency-validation'] + fs_list + b_cmd, check=True)
          subprocess.run(['flutter', 'build', 'web', '--release'] + fs_list, check=True) 
          subprocess.run(['flutter', 'build', 'ios', '--release', '--no-codesign', '--obfuscate', '--split-debug-info=ds/ios'] + fs_list + b_cmd, check=True)
          EOF
          
          python3 generate_env.py

      - name: Package Output Pipelines
        run: |
          set -e
          find build/app/outputs/flutter-apk/ -name "*.apk" -exec cp {} build/apk/ \; 2>/dev/null || true
          find build/app/outputs/bundle/release/ -name "*.aab" -exec cp {} build/bundle/ \; 2>/dev/null || true
          iad=\$(find build -type d -name "Runner.app" 2>/dev/null | head -n 1)
          if [ -n "\$iad" ]; then
            cd "(dirname "iad")"
            mkdir -p Payload
            cp -r Runner.app Payload/
            zip -r ../../../build/ios/Runner.ipa Payload/
            cd -
          fi

      - name: Store Native Compilation Binaries
        uses: actions/upload-artifact@v4
        with:
          name: app-mobile-builds-\${{ github.run_number }}
          path: |
            build/apk/
            build/bundle/
            build/ios/*.ipa

      - name: Store Production Web Dist
        uses: actions/upload-artifact@v4
        with:
          name: app-web-build-\${{ github.run_number }}
          path: build/web/

      - name: Pull Architecture Volume Metrics
        run: |
          set -e
          brew install cloc
          echo "### 📊 Workspace Code Metrics Analysis" > code-metrics.md
          echo "Production snapshot compiled automatically via virtual compilation pipelines." >> code-metrics.md
          echo "" >> code-metrics.md
          printf '```text\n' >> code-metrics.md
          cloc . --fullpath --not-match-d="(build|.dart_tool|.gradle|Pods|node_modules)" >> code-metrics.md
          printf '```\n' >> code-metrics.md

      - name: Broadcast Release Dashboards Natively
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            build/apk/*.apk
            build/bundle/*.aab
            build/ios/*.ipa
            code-metrics.md
          tag: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          body: "Production deployment finalized cleanly via virtual workspace pipelines. Tracking commit: ${{ github.sha }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

  # ==========================================
  # TRACK 2: NVIDIA GPU Cloud Container Build (Linux Matrix)
  # ==========================================
  cloud-container:
    runs-on: ubuntu-latest
    needs: b
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push NVIDIA Cloud Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/yakuza11142/mindspark1/nvidia-cloud:latest
            ghcr.io/yakuza11142/mindspark1/nvidia-cloud:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
