name: Mind Spark 

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Make Gradle Executable
        # This prevents "Permission Denied" errors in GitHub
        run: chmod +x gradlew

      - name: Setup Gradle (No Cache)
        # Using the official Gradle action but disabling cache to avoid 400 errors
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Build Debug APK
        # Clean first to make sure everything is fresh
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Generate Security Hashes
        if: success()
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            echo "Hashing: $APK_PATH"
            sha256sum "$APK_PATH" > hashes.txt
            sha512sum "$APK_PATH" >> hashes.txt
            openssl dgst -sha3-256 "$APK_PATH" >> hashes.txt
          else
            echo "APK not found in standard path." > hashes.txt
          fi

      - name: Upload Elite Project Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Elite-Project-Ready
          path: |
            app/build/outputs/apk/debug/*.apk
            hashes.txt
