name: Mind Spark
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Flutter Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 3. 🛠️ Recursive Asset Discovery & Logo Sync
        run: |
          # Finds exactly where your project root is
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          # Force create paths for your logo
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets
          
          # DRAG your logo in (ChatGPT Image)
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png
          fi
          
          # Inject Supabase Secrets for Dart
          cat <<EOF > $PROJECT_ROOT/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: 4. 🧹 Nuclear Sync (Ignore Bugs)
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          flutter clean
          flutter pub get || true

      - name: 5. 🚀 Build Hybrid APK (Total Code Inclusion)
        working-directory: ${{ env.PROJECT_ROOT }}
        # continue-on-error: true ensures the artifact step runs even if there are bugs
        continue-on-error: true
        run: flutter build apk --debug --stacktrace

      - name: 6. 📦 Export Final Master Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Final-Artifacts
          # This pattern finds ANY apk generated anywhere in the workspace
          path: "**/*.apk"
          retention-days: 7
