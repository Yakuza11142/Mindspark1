name: Mind Spark
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Force Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # This stops the "Cache service responded with 400" error in your image
          cache-disabled: true

      - name: Build Real APK
        # We use 'gradle' directly to bypass the missing jarfile error
        run: gradle assembleDebug --stacktrace

      - name: Generate Hashes
        if: always()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            sha256sum "$APK_PATH" > hashes.txt
            sha512sum "$APK_PATH" >> hashes.txt
            openssl dgst -sha3-256 "$APK_PATH" >> hashes.txt
          else
            echo "Build finished but no APK was found in the folders." > hashes.txt
          fi

      - name: Upload Final Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Elite-Final-App
          path: |
            **/*.apk
            hashes.txt
