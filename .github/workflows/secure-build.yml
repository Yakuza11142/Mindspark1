name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Build Stack (Java 17 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Initialize Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 🛠️ Auto-Heal Project & Logo
        run: |
          # Finds the module containing the actual app code
          APP_GRADLE=$(grep -l "com.android.application" $(find . -name "build.gradle") | head -n 1)
          if [ -z "$APP_GRADLE" ]; then APP_ROOT="."; else APP_ROOT=$(dirname "$APP_GRADLE"); fi
          echo "APP_ROOT=$APP_ROOT" >> $GITHUB_ENV
          
          # Force create the folders even if they don't exist
          mkdir -p $APP_ROOT/src/main/res/drawable $APP_ROOT/src/main/assets

          # Find your logo regardless of name and force it into the build
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $APP_ROOT/src/main/res/drawable/chatgpt.png
          else
            # Transparent 1x1 fallback to keep the build alive
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > $APP_ROOT/src/main/res/drawable/chatgpt.png
          fi

      - name: 5. 🛠️ Nuclear Gradle Fix
        run: |
          # Forces a fresh Gradle wrapper so 'jarfile' errors disappear
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 6. 🔐 Stealth Injection & Obfuscation
        run: |
          ASSETS_PATH="${{ env.APP_ROOT }}/src/main/assets"
          cat <<EOF > $ASSETS_PATH/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF
          
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator $ASSETS_PATH --output $ASSETS_PATH --compact true --self-defending true

      - name: 7. 🚀 Build Optimized APK
        run: |
          # Using clean and parallel to ensure all your code is included fresh
          ./gradlew clean assembleDebug --no-daemon --parallel --stacktrace

      - name: 8. ⚡ Final Prep (Zipalign)
        id: final_prep
        run: |
          # Find the APK no matter where Gradle put it
          RAW_APK=$(find . -name "*.apk" -not -path "*/build-cache/*" | head -n 1)
          if [ -f "$RAW_APK" ]; then
            sudo apt-get update && sudo apt-get install -y zipalign
            zipalign -v 4 "$RAW_APK" MindSpark_v1.0.apk
          else
            echo "❌ APK not found." && exit 1
          fi

      - name: 9. 📦 Deployment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Final-Package
          path: |
            *.apk
          retention-days: 7
