name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Adds a button to manually run this

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tools
        run: |
          mkdir -p dist
          # Force install obfuscator and continue even if there are npm warnings
          npm install -g javascript-obfuscator --quiet || true

      - name: Secure & Obfuscate
        run: |
          # 1. Identify where the code is (root or src)
          TARGET_DIR="."
          if [ -d "./src" ]; then TARGET_DIR="./src"; fi
          
          # 2. Run obfuscator. '|| true' ensures the workflow continues if it just throws a warning
          javascript-obfuscator $TARGET_DIR --output ./dist --compact true --string-array true --exclude ./dist || echo "Obfuscator found no files, moving to next step."

      - name: Integrity Hashing (SHA-256, 512, SHA-3)
        run: |
          # Use find to avoid "file not found" errors if dist is empty
          find dist -name "*.js" -exec sha256sum {} + > signatures.txt || true
          find dist -name "*.js" -exec sha512sum {} + >> signatures.txt || true
          find dist -name "*.js" -exec openssl dgst -sha3-512 {} + >> signatures.txt || true
          
          # Create a dummy file if signatures is empty to prevent upload failure
          [ -s signatures.txt ] || echo "No files to sign" > signatures.txt

      - name: Upload Secured App
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-hardened
          path: |
            dist/
            signatures.txt
