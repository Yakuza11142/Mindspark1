name: Mind Spark 
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 'clean' clears old errors, 'assembleDebug' builds the APK
      - name: Build APK
        run: ./gradlew clean assembleDebug

      - name: Generate Hashes
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          sha256sum "$APK_PATH" > hashes.txt
          sha512sum "$APK_PATH" >> hashes.txt
          openssl dgst -sha3-256 "$APK_PATH" >> hashes.txt

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Elite-APK
          path: |
            **/*.apk
            hashes.txt
