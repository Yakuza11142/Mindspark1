name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Logo Filename
        run: |
          # This finds your long ChatGPT filename and renames it to something Android likes
          mkdir -p app/src/main/res/drawable
          find . -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \;

      - name: Build APK
        run: |
          # Find gradlew and run the build
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_PATH"
          $GRADLEW_PATH assembleRelease

      - name: Security Hashes (SHA-256, 512, 3)
        run: |
          # Find the final APK and create the integrity signatures
          APK_PATH=$(find . -name "*release-unsigned.apk" | head -n 1)
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*release-unsigned.apk
            signatures.txt
