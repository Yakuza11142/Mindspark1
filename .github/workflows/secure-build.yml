name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 🛠️ Repair Structure
        run: |
          # If build.gradle is in the root, move it to app/ to make it a subproject
          if [ -f "build.gradle" ]; then
            mkdir -p app
            mv build.gradle app/
            mv src app/ 2>/dev/null || true
          fi
          
          # Force create settings.gradle if missing
          if [ ! -f "settings.gradle" ]; then
            echo "include ':app'" > settings.gradle
          fi

      - name: 4. 🛠️ Reconstruct Gradle
        run: |
          rm -f gradlew
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 5. 🚀 Build Secure APK
        run: |
          # This command looks into the :app subproject for the build task
          ./gradlew :app:assembleRelease --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: 6. 📦 Upload App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*.apk
