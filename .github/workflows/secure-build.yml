name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Build Environment (Java 17 & Node)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 🛠️ Fix Project Structure (Logo Fix)
        run: |
          # Matches your build.gradle: creating folders in the 'app' module
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets
          find . -maxdepth 2 -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \; || true

      - name: 4. 🛠️ Reconstruct & Repair Gradle
        run: |
          # Fresh wrapper to ensure the .jar file exists
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 5. 🔐 Inject Supabase Public Keys
        run: |
          # Injecting keys into the app assets folder
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > app/src/main/assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> app/src/main/assets/.env

      - name: 6. 🛡️ Anti-Reverse Engineering (Obfuscation)
        run: |
          npm install -g javascript-obfuscator --quiet
          # Obfuscate only the app assets
          javascript-obfuscator ./app/src/main/assets --output ./app/src/main/assets --compact true || true

      - name: 7. 🚀 Build Secure APK
        run: |
          # Build the :app module defined in your settings.gradle
          ./gradlew :app:assembleDebug --no-daemon

      - name: 8. 🔒 Generate SHA-256, 512, and SHA-3 Signatures
        run: |
          APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            sha256sum "$APK_FILE" > signatures.txt
            sha512sum "$APK_FILE" >> signatures.txt
            openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt
          else
            echo "Build failed: No APK generated." && exit 1
          fi

      - name: 9. 📦 Upload Final Elite Package
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final-Package
          path: |
            app/build/outputs/apk/debug/*.apk
            signatures.txt
