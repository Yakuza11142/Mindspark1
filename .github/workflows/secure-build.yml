name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Java 17 using the 'temurin' distribution (Standard for GHA)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # Most stable distribution for GitHub

      # 2. Verify path to confirm directory is found
      - name: Verify Java Path
        run: |
          echo "JAVA_HOME is $JAVA_HOME"
          java -version

      - name: Build APK with Explicit JAVA_HOME
        run: |
          # Forces Gradle to use the Java 17 directory established above
          export JAVA_HOME=$JAVA_HOME
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Secure Signatures
        run: |
          APK_PATH=$(find . -name "*release*.apk" | head -n 1)
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Secure
          path: |
            **/*release*.apk
            signatures.txt
