name: Mind Spark
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # THIS STEP FIXES THE ERROR: It installs a fresh Gradle "Chef" 
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Now we run the build using the installed Gradle, not the wrapper
      - name: Build Real APK
        run: gradle assembleDebug

      - name: Generate Hashes & Upload
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          sha256sum "$APK_PATH" > hashes.txt
          sha512sum "$APK_PATH" >> hashes.txt
          openssl dgst -sha3-256 "$APK_PATH" >> hashes.txt
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: complete-app
          path: |
            **/*.apk
            hashes.txt
