name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Build Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 🛠️ Repair Gradle System (Fixes Empty Files)
        run: |
          # Deletes broken/empty files from phone uploads and builds fresh ones
          rm -f gradlew
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 4. 🔐 Inject Supabase Keys (.env)
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # Creates the secure .env inside the app assets
          mkdir -p app/src/main/assets
          echo "SUPABASE_URL=$URL" > app/src/main/assets/.env
          echo "SUPABASE_ANON_KEY=$ANON_KEY" >> app/src/main/assets/.env

      - name: 5. 🎨 Fix Logo Filename
        run: |
          # Finds your long ChatGPT filename and renames it to chatgpt.png for Android
          mkdir -p app/src/main/res/drawable
          find . -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \; || true

      - name: 6. 🛡️ Anti-Reverse Engineering (Obfuscation)
        run: |
          # Scrambles your scripts so hackers can't read your logic
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator . --output ./app/src/main/assets --compact true --control-flow-flattening true --string-array true --exclude ./app ./node_modules || true

      - name: 7. 🚀 Build Secure APK
        run: |
          export JAVA_HOME=$JAVA_HOME
          # Builds the APK using the R8 security we put in your build.gradle
          ./gradlew :app:assembleRelease --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: 8. 🔒 Generate SHA-256, 512, and SHA-3 Signatures
        run: |
          # Finds the final APK and creates the "integrity cables" (hashes)
          APK_FILE=$(find . -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            sha256sum "$APK_FILE" > signatures.txt
            sha512sum "$APK_FILE" >> signatures.txt
            openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt
          else
            echo "Build failed: No APK generated." && exit 1
          fi

      - name: 9. 📦 Upload Final Elite Package
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final-Package
          path: |
            **/*.apk
            signatures.txt
