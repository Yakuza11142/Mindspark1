name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix Logo and Prepare Assets
        run: |
          # Create folders in case they are missing
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/assets

          # AUTOMATIC FIX: Finds your specific ChatGPT image and renames it correctly
          find . -name "ChatGPT Image Mar 15*" -exec cp {} app/src/main/res/drawable/chatgpt.png \;

          # Obfuscate scripts into the APK container
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator . --output ./app/src/main/assets --compact true --string-array true --exclude ./app ./node_modules ./dist || true

      - name: Execute Android Build
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_PATH"
          # Builds the APK using the security settings in your build.gradle
          $GRADLEW_PATH assembleRelease

      - name: Triple-Layer Integrity Signatures
        run: |
          APK_PATH=$(find . -name "*release*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            sha256sum "$APK_PATH" > signatures.txt
            sha512sum "$APK_PATH" >> signatures.txt
            openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt
          else
            echo "Build failed to generate an APK." && exit 1
          fi

      - name: Upload Final Elite Build
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Secure
          path: |
            **/*release*.apk
            signatures.txt
