name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4

      - name: 2. Initialize Flutter Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 3. 🛠️ Recursive Asset & Project Discovery
        run: |
          # Finds the project heart (pubspec.yaml) no matter where it is
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          # Force create paths for your logo and code secrets
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets || true
          
          # Drag your logo into the build from anywhere in the repo
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png || true
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png || true
          fi
          
          # Inject Supabase Secrets (Ensure these are in your GitHub Settings)
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > $PROJECT_ROOT/assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> $PROJECT_ROOT/assets/.env

      - name: 4. 🧹 NUCLEAR SYNC & REPAIR
        working-directory: ${{ env.PROJECT_ROOT }}
        # This clears old junk and repairs broken package links
        run: |
          flutter clean || true
          flutter pub cache repair || true
          flutter pub get || true

      - name: 5. 🚀 Build Hybrid APK (All Code Included)
        working-directory: ${{ env.PROJECT_ROOT }}
        continue-on-error: true # Guarantees we move to export even with code bugs
        run: flutter build apk --debug --stacktrace

      - name: 6. 📦 FORCE EXPORT (Grab Anything Found)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Full-Package
          # This pattern searches EVERY folder to find the hidden APK
          path: "**/*.apk"
          retention-days: 7
