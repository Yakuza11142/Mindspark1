name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Build Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. 🛠️ Repair Gradle System
        run: |
          rm -f gradlew
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 4. 🔐 Inject Supabase Keys
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p app/src/main/assets
          echo "SUPABASE_URL=$URL" > app/src/main/assets/.env
          echo "SUPABASE_ANON_KEY=$ANON_KEY" >> app/src/main/assets/.env

      - name: 5. 🎨 Fix Logo Filename
        run: |
          mkdir -p app/src/main/res/drawable
          find . -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \; || true

      - name: 6. 🛡️ Anti-Reverse Engineering (Obfuscation)
        run: |
          npm install -g javascript-obfuscator --quiet
          # This step worked in your screenshot!
          javascript-obfuscator . --output ./app/src/main/assets --compact true --string-array true --exclude ./app ./node_modules || true

      - name: 7. 🚀 Build Secure APK
        run: |
          # Forces the build to find the 'app' module we talked about
          ./gradlew :app:assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon

      - name: 8. 🔒 Generate Signatures (SHA-256, 512, 3)
        run: |
          APK_FILE=$(find . -name "*.apk" | head -n 1)
          sha256sum "$APK_FILE" > signatures.txt
          sha512sum "$APK_FILE" >> signatures.txt
          openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt

      - name: 9. 📦 Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*.apk
            signatures.txt
