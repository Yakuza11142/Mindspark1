name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Build Stack (Java 17 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Initialize Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 🛠️ Auto-Discovery & Project Healing
        run: |
          # 1. Find the main app module (where src/main lives)
          APP_ROOT=$(find . -name "src" -type d -exec dirname {} \; | grep -v "node_modules" | head -n 1)
          if [ -z "$APP_ROOT" ]; then APP_ROOT="."; fi
          echo "APP_ROOT=$APP_ROOT" >> $GITHUB_ENV
          
          # 2. Force create necessary directories
          mkdir -p $APP_ROOT/src/main/res/drawable $APP_ROOT/src/main/res/drawable-xxhdpi $APP_ROOT/src/main/assets
          
          # 3. Find and link the logo (Auto-detects any image with "ChatGPT" in the name)
          LOGO_PATH=$(find . -maxdepth 4 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $APP_ROOT/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $APP_ROOT/src/main/res/drawable-xxhdpi/chatgpt.png
            echo "✅ Assets: Logo found at $LOGO_PATH and linked."
          else
            echo "⚠️ Warning: Logo not found. Creating safety placeholder."
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > $APP_ROOT/src/main/res/drawable/chatgpt.png
          fi

      - name: 5. 🛠️ Repair Gradle Wrapper & Versioning
        run: |
          # Automatically fix broken or missing Gradle wrappers
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          
          # Auto-sync build version with GitHub run number
          VERSION_FILE=$(find . -name "build.gradle" | head -n 1)
          if [ -f "$VERSION_FILE" ]; then
            sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" $VERSION_FILE || true
            sed -i "s/versionName .*/versionName \"1.2.${{ github.run_number }}\"/" $VERSION_FILE || true
          fi

      - name: 6. 🔐 Stealth Secrets & JS Obfuscation
        run: |
          # Use the discovered app root for asset injection
          ASSETS_DIR="${{ env.APP_ROOT }}/src/main/assets"
          mkdir -p $ASSETS_DIR
          
          cat <<EOF > $ASSETS_DIR/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_DATE=$(date +'%Y-%m-%d')
          EOF
          
          # Install and run industrial-grade obfuscator
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator $ASSETS_DIR --output $ASSETS_DIR --compact true --self-defending true --string-array-encoding 'rc4' --unicode-escape-sequence true

      - name: 7. 🚀 Optimized Master Build
        run: |
          # Clean and build using the repaired gradlew
          ./gradlew clean assembleDebug --no-daemon --parallel --stacktrace -Pandroid.enableR8.fullMode=true

      - name: 8. ⚡ Professional Optimization (Zipalign)
        id: post_process
        run: |
          # Find the generated APK regardless of its default name
          RAW_APK=$(find . -name "*-debug.apk" -print -quit)
          FINAL_NAME="MindSpark_v1.2.${{ github.run_number }}_Master.apk"
          
          if [ -f "$RAW_APK" ]; then
            sudo apt-get update && sudo apt-get install -y zipalign
            zipalign -v 4 "$RAW_APK" "$FINAL_NAME"
            echo "apk_path=$FINAL_NAME" >> $GITHUB_OUTPUT
          else
            echo "❌ Build Error: APK not generated." && exit 1
          fi

      - name: 9. 📦 Final Artifact Deployment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Production-v${{ github.run_number }}
          path: |
            *.apk
            integrity-report.txt
          retention-days: 14
          compression-level: 9
