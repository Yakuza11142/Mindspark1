name: Ultra-Secure Build Mind Spark
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build-and-harden:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit 

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Apply Obfuscation
        run: |
          npm install -g javascript-obfuscator
          javascript-obfuscator ./src --output ./dist \
            --compact true \
            --control-flow-flattening true \
            --dead-code-injection true \
            --string-array true \
            --string-array-encoding 'rc4'

      - name: Generate Cryptographic Signatures
        run: |
          sha256sum dist/main.js > signatures.txt
          sha512sum dist/main.js >> signatures.txt
          openssl dgst -sha3-512 dist/main.js >> signatures.txt

      - name: Upload Verified Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-hardened
          path: |
            dist/
            signatures.txt
