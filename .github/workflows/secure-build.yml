name: Mind Spark
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject & Obfuscate Scripts
        run: |
          mkdir -p app/src/main/assets
          npm install -g javascript-obfuscator --quiet
          # Protects all scripts before they go into the APK
          javascript-obfuscator . --output ./app/src/main/assets --compact true --string-array true --exclude ./app ./node_modules ./dist || true

      - name: Execute Build
        run: |
          # Finds gradlew even if it's in a subfolder
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          chmod +x "$GRADLEW_PATH"
          $GRADLEW_PATH assembleRelease

      - name: Secure Signatures
        run: |
          APK_PATH=$(find . -name "*release-unsigned.apk" -o -name "*release.apk" | head -n 1)
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload Secured App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Build
          path: |
            **/*release*.apk
            signatures.txt
