name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Auto-Repair Gradle (Fixes Empty Files)
        run: |
          # 1. If gradlew is empty, download the official official script
          if [ ! -s gradlew ]; then
            echo "Repairing empty gradlew file..."
            curl -sL https://githubusercontent.com -o gradlew
          fi
          chmod +x gradlew
          
          # 2. Ensure the wrapper properties exist so it knows which version to use
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi

      - name: 🎨 Fix Logo Filename
        run: |
          # Finds your long ChatGPT filename and renames it so Android doesn't crash
          mkdir -p app/src/main/res/drawable
          find . -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \; || true

      - name: 🚀 Build Secure APK
        run: |
          # Finds where gradlew is hiding and runs the build
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLE_PATH")
          ./gradlew assembleDebug --no-daemon

      - name: 🔒 Generate SHA-256, 512, and SHA-3
        run: |
          # Locates the finished APK
          APK_FILE=$(find . -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            sha256sum "$APK_FILE" > signatures.txt
            sha512sum "$APK_FILE" >> signatures.txt
            openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt
          else
            echo "APK not found, build may have failed." && exit 1
          fi

      - name: 📦 Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*.apk
            signatures.txt
