name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Environment (Java & Flutter)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: 3. Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 4. 🛠️ Recursive Asset & Logo Recovery
        run: |
          # Finds your project root by locating pubspec.yaml
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          # Force create standard folders for mixed code
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets
          
          # Hunt for your logo and force-inject it into BOTH native and Flutter assets
          LOGO_FILE=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_FILE" ]; then
            cp "$LOGO_FILE" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_FILE" $PROJECT_ROOT/assets/logo.png
            echo "✅ Assets: Logo successfully dragged from $LOGO_FILE"
          fi
          
          # Inject Supabase Keys for the hybrid environment
          cat <<EOF > $PROJECT_ROOT/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: 5. 📦 Sync All Dependencies
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          # Fetches all Dart packages and triggers native Android sync
          flutter pub get

      - name: 6. 🚀 Build Multi-Language APK
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          # 'flutter build apk' automatically compiles both Dart and native Android code (Java/Kotlin)
          # We use --debug to bypass signing requirements for immediate testing
          flutter build apk --debug --stacktrace

      - name: 7. 📦 Export Final Hybrid Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Hybrid-Build-v${{ github.run_number }}
          path: "**/*.apk" # Scans all folders to ensure no component is left behind
          retention-days: 14
