name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Build Stack (Java 17 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Initialize Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 🔍 Deep-Scan & Auto-Repair Project
        run: |
          # 1. Locate all build.gradle files and find the primary app module
          # We look for the one that contains 'com.android.application'
          APP_GRADLE=$(grep -l "com.android.application" $(find . -name "build.gradle") | head -n 1)
          if [ -z "$APP_GRADLE" ]; then
            echo "❌ ERROR: Could not find an Android application module."
            exit 1
          fi
          APP_ROOT=$(dirname "$APP_GRADLE")
          echo "APP_ROOT=$APP_ROOT" >> $GITHUB_ENV
          echo "✅ Found App Module at: $APP_ROOT"

          # 2. Repair Project Structure
          mkdir -p $APP_ROOT/src/main/res/drawable $APP_ROOT/src/main/res/drawable-xxhdpi $APP_ROOT/src/main/assets

          # 3. Find and Force-Inject Logo
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $APP_ROOT/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $APP_ROOT/src/main/res/drawable-xxhdpi/chatgpt.png
            echo "✅ Assets: Logo found at $LOGO_PATH"
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > $APP_ROOT/src/main/res/drawable/chatgpt.png
          fi

      - name: 5. 🛠️ Force-Repair Gradle Wrapper
        run: |
          # Rebuild the Gradle wrapper from scratch to fix "Missing Jar" or "Missing Plugin" errors
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          
          # Force sync build.gradle with the current run number
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" ${{ env.APP_ROOT }}/build.gradle || true
          sed -i "s/versionName .*/versionName \"1.5.${{ github.run_number }}\"/" ${{ env.APP_ROOT }}/build.gradle || true

      - name: 6. 🔐 Stealth Injection & Obfuscation
        run: |
          ASSETS_PATH="${{ env.APP_ROOT }}/src/main/assets"
          cat <<EOF > $ASSETS_PATH/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_STATUS=FINAL_PRODUCTION
          EOF
          
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator $ASSETS_PATH --output $ASSETS_PATH --compact true --self-defending true --string-array-encoding 'rc4'

      - name: 7. 🚀 High-Intensity Optimized Build
        run: |
          # Running a total clean and assemble with parallel processing
          ./gradlew clean assembleDebug --no-daemon --parallel --stacktrace -Pandroid.enableR8.fullMode=true

      - name: 8. ⚡ Professional Optimization
        id: final_prep
        run: |
          # Find any APK generated in the build folders
          RAW_APK=$(find . -name "*.apk" -not -path "*/build-cache/*" | head -n 1)
          FINAL_NAME="MindSpark_v1.5_Final_Build.apk"
          
          if [ -f "$RAW_APK" ]; then
            sudo apt-get update && sudo apt-get install -y zipalign
            zipalign -v 4 "$RAW_APK" "$FINAL_NAME"
            echo "apk_out=$FINAL_NAME" >> $GITHUB_OUTPUT
          else
            echo "❌ BUILD FAILED: APK was not created."
            exit 1
          fi

      - name: 9. 📦 Final Master Deployment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Ultimate-Package
          path: |
            *.apk
          retention-days: 14
          compression-level: 9
