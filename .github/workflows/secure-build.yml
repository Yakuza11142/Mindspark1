name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Drags every single file in your history

      - name: 2. Initialize Flutter Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 3. 🛠️ Recursive Logo & Asset Injection
        run: |
          # Finds the project root by looking for pubspec.yaml
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          
          # Force create paths to ensure the logo has a home
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable
          mkdir -p $PROJECT_ROOT/assets
          
          # Find your logo regardless of name and DRAG it into the APK
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png
            echo "✅ Logo successfully dragged into build from $LOGO_PATH"
          fi
          
          # Inject Supabase Keys into assets
          cat <<EOF > $PROJECT_ROOT/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: 4. 📦 Sync All Code & Packages
        run: |
          # This command ensures all your Dart code and 'other' code is ready
          flutter pub get

      - name: 5. 🚀 Build Hybrid APK (All Code Included)
        run: |
          # Compiles EVERYTHING (Dart + Native + Assets) into one binary
          flutter build apk --debug --stacktrace

      - name: 6. 📦 Export Final Master Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Ultimate-Package
          path: "**/*.apk" # Scans every folder to make sure the APK is caught
          retention-days: 7
