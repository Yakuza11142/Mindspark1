name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Secure Release APK
        run: |
          chmod +x gradlew
          # assembleRelease triggers the R8/ProGuard obfuscation you enabled above
          ./gradlew assembleRelease

      - name: Triple-Layer Integrity Hashing
        run: |
          # Finds the generated release APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk")
          echo "Hashing APK at: $APK_PATH"
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload Secure Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Secure-Package
          path: |
            app/build/outputs/apk/release/*.apk
            signatures.txt
