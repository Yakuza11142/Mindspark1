name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4

      - name: 2. Initialize Flutter & Security Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 3. 🛠️ Project Discovery & Asset Injection
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets
          
          # Find and Drag Logo
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png
          fi
          
          # Inject Secrets
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > $PROJECT_ROOT/assets/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> $PROJECT_ROOT/assets/.env

      - name: 4. ☢️ NUCLEAR SYNC
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          flutter clean
          flutter pub get

      - name: 5. 🛡️ Industrial Scrambling (Obfuscation)
        run: |
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator ${{ env.PROJECT_ROOT }}/assets --output ${{ env.PROJECT_ROOT }}/assets \
            --compact true --self-defending true --string-array-encoding 'rc4'

      - name: 6. 🚀 Build Hardened APK
        working-directory: ${{ env.PROJECT_ROOT }}
        run: flutter build apk --debug --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: 7. 🔒 SHA-256, 512 & SHA-3 Signatures
        id: sign
        run: |
          # Locate APK and force it to root
          APK_PATH=$(find . -name "*.apk" -not -path "*/build-cache/*" | head -n 1)
          if [ -z "$APK_PATH" ]; then echo "❌ APK NOT FOUND" && exit 1; fi
          
          cp "$APK_PATH" MindSpark_Master_Final.apk
          
          {
            echo "--- MASTER INTEGRITY MANIFEST ---"
            echo "SHA-256: $(sha256sum MindSpark_Master_Final.apk | awk '{print $1}')"
            echo "SHA-512: $(sha512sum MindSpark_Master_Final.apk | awk '{print $1}')"
            echo "SHA-3-512: $(openssl dgst -sha3-512 MindSpark_Master_Final.apk | awk '{print $2}')"
          } > signatures.txt
          echo "✅ Signatures generated for artifacts."

      - name: 8. 📦 Export Final Master Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Final-Build
          path: |
            MindSpark_Master_Final.apk
            signatures.txt
          if-no-files-found: error
          retention-days: 7
