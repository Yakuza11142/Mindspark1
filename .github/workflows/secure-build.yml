name: Mind Spark 
permissions: contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prep Assets & Logo
        run: |
          # Create folders if missing so the build doesn't crash
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/drawable
          
          # Install obfuscator and run it; '|| true' ensures it won't stop the build if a script is missing
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator . --output ./app/src/main/assets --compact true --string-array true --exclude ./app ./node_modules ./dist || true

      - name: Execute Gradle Build
        run: |
          # Find the gradlew file wherever it is located
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then echo "gradlew not found!" && exit 1; fi
          chmod +x "$GRADLEW_PATH"
          
          # Build a release APK; adding --no-daemon can help with CI stability
          $GRADLEW_PATH assembleRelease --no-daemon || $GRADLEW_PATH assembleDebug

      - name: Triple-Layer Integrity Signatures
        run: |
          # Find any APK generated (Release or Debug)
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then echo "APK not found!" && exit 1; fi
          
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload Secured App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*.apk
            signatures.txt
