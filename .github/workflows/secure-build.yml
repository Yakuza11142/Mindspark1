name: Mind Spark
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # Removed cache to prevent the yellow warning in your image

      - name: Setup Gradle
        # Using a version that doesn't rely on the broken cache service
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: Build APK
        # This will bundle your code and logo
        run: gradle assembleDebug

      - name: Generate Hashes
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "debug" | head -n 1)
          sha256sum "$APK_PATH" > hashes.txt
          sha512sum "$APK_PATH" >> hashes.txt
          openssl dgst -sha3-256 "$APK_PATH" >> hashes.txt

      - name: Upload APK & Hashes
        uses: actions/upload-artifact@v4
        with:
          name: Elite-App-Package
          path: |
            **/*.apk
            hashes.txt
