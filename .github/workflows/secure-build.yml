name: Mind Spark
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Prepare
        run: |
          npm ci
          mkdir -p dist
          npm install -g javascript-obfuscator

      - name: Obfuscate Code
        run: |
          # If your files aren't in 'src', change 'src' below to '.'
          javascript-obfuscator ./src --output ./dist --compact true --string-array true || echo "Obfuscation skipped or failed"

      - name: Generate Signatures
        run: |
          # This command creates hashes for every .js file found in dist
          find dist -name "*.js" -exec sha256sum {} + > signatures.txt
          find dist -name "*.js" -exec sha512sum {} + >> signatures.txt
          find dist -name "*.js" -exec openssl dgst -sha3-512 {} + >> signatures.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mind-spark-hardened
          path: |
            dist/
            signatures.txt
