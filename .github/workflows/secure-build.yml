name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Build Stack (Java 17 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Initialize Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 🛠️ Intelligent Asset Recovery & Res-Hardening
        run: |
          mkdir -p app/src/main/res/drawable-xxhdpi app/src/main/assets
          LOGO_FILE=$(find . -maxdepth 3 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          
          if [ -n "$LOGO_FILE" ]; then
            cp "$LOGO_FILE" app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_FILE" app/src/main/res/drawable-xxhdpi/chatgpt.png
            echo "✅ Assets: Logo successfully linked."
          else
            echo "⚠️ Warning: Creating placeholder asset."
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > app/src/main/res/drawable/chatgpt.png
          fi

      - name: 5. 🛠️ Dynamic Versioning & Metadata
        id: versioning
        run: |
          VERSION_NAME="1.2.${{ github.run_number }}"
          sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" app/build.gradle || true
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle || true
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: 6. 🔐 Secure Environment Injection
        run: |
          cat <<EOF > app/src/main/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_TIME=$(date +'%Y-%m-%d_%H:%M')
          MODE=PRODUCTION
          EOF

      - name: 7. 🛡️ Industrial JavaScript Obfuscation
        run: |
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator ./app/src/main/assets --output ./app/src/main/assets \
            --compact true \
            --control-flow-flattening true \
            --dead-code-injection true \
            --debug-protection true \
            --disable-console-output true \
            --identifier-names-generator 'mangled' \
            --numbers-to-expressions true \
            --rename-globals true \
            --self-defending true \
            --split-strings true \
            --string-array-encoding 'rc4' \
            --transform-object-keys true \
            --unicode-escape-sequence true

      - name: 8. 🚀 Build Hardened APK (High-Optimization)
        run: |
          chmod +x gradlew
          # Force cleaning and parallel execution for speed and stability
          ./gradlew clean :app:assembleDebug --no-daemon --parallel --build-cache \
            -Pandroid.enableR8.fullMode=true \
            -Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"

      - name: 9. ⚡ Zipalign & Binary Hardening
        id: optimize
        run: |
          APK_RAW=$(find app/build/outputs/apk/debug -name "*.apk" -print -quit)
          FINAL_NAME="MindSpark_${{ steps.versioning.outputs.version_name }}_Final.apk"
          
          sudo apt-get update && sudo apt-get install -y zipalign
          zipalign -v 4 "$APK_RAW" "$FINAL_NAME"
          
          # Remove internal debug metadata for extra security
          strip --strip-debug "$FINAL_NAME" || true
          
          echo "apk_final=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: 10. 🔒 Integrity Report & Checksum
        if: success()
        run: |
          {
            echo "--- MASTER PRODUCTION REPORT ---"
            echo "App Name: Mind Spark"
            echo "Version: ${{ steps.versioning.outputs.version_name }}"
            echo "SHA-256: $(sha256sum "${{ steps.optimize.outputs.apk_final }}" | awk '{print $1}')"
            echo "Build Signature: ${{ github.sha }}"
          } > production-manifest.txt

      - name: 11. 🆘 Error Log Analysis
        if: failure()
        run: |
          ./gradlew :app:assembleDebug --stacktrace --info > build_failure_log.txt || true

      - name: 12. 📦 Deployment & Archival
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Master-Build-v${{ github.run_number }}
          path: |
            *.apk
            production-manifest.txt
            build_failure_log.txt
          retention-days: 90
          compression-level: 9
