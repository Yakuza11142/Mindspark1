name: Mind Spark
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Build Stack (Java 17 & Node 20)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Initialize Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 4. 🛠️ Fix Project Structure & Asset Recovery
        run: |
          # Create EVERY folder manually to ensure 'cp' never fails
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/drawable-xxhdpi
          mkdir -p app/src/main/assets
          
          # Find logo with case-insensitive search
          LOGO_FILE=$(find . -maxdepth 3 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          
          if [ -n "$LOGO_FILE" ]; then
            cp "$LOGO_FILE" app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_FILE" app/src/main/res/drawable-xxhdpi/chatgpt.png
            echo "✅ Assets: Logo successfully linked from $LOGO_FILE"
          else
            echo "⚠️ Warning: Logo not found. Generating a silent placeholder."
            # Base64 for a 1x1 transparent PNG
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > app/src/main/res/drawable/chatgpt.png
          fi

      - name: 5. 🛠️ Version Sync
        id: versioning
        run: |
          VERSION_NAME="1.2.${{ github.run_number }}"
          # Only attempt sed if the file exists to prevent errors
          if [ -f "app/build.gradle" ]; then
            sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" app/build.gradle
            sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle
          fi
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: 6. 🔐 Secure Environment Injection
        run: |
          cat <<EOF > app/src/main/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_TIME=$(date +'%Y-%m-%d_%H:%M')
          MODE=PRODUCTION
          EOF

      - name: 7. 🛡️ JavaScript Obfuscation
        run: |
          npm install -g javascript-obfuscator --quiet
          javascript-obfuscator ./app/src/main/assets --output ./app/src/main/assets \
            --compact true \
            --self-defending true \
            --string-array-encoding 'rc4' \
            --unicode-escape-sequence true

      - name: 8. 🚀 Build Optimized APK
        run: |
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --no-daemon --parallel --build-cache \
            -Pandroid.enableR8.fullMode=true

      - name: 9. ⚡ Zipalign & Final Prep
        id: optimize
        run: |
          APK_RAW=$(find app/build/outputs/apk/debug -name "*.apk" -print -quit)
          FINAL_NAME="MindSpark_${{ steps.versioning.outputs.version_name }}_Final.apk"
          
          sudo apt-get update && sudo apt-get install -y zipalign
          zipalign -v 4 "$APK_RAW" "$FINAL_NAME"
          echo "apk_final=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: 10. 📦 Deployment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Build-${{ github.run_number }}
          path: |
            *.apk
            app/build/outputs/logs/
          retention-days: 7
