name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Better for versioning tools

      - name: 2. Setup Environment (Java 17 & Node)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Setup Node & Global Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Speeds up obfuscator install

      - name: 4. 🛠️ Fix Project Structure & Assets
        run: |
          mkdir -p app/src/main/res/drawable app/src/main/assets
          # Improved find to handle spaces and ensure the file exists
          find . -maxdepth 2 -name "ChatGPT Image*" -print0 | xargs -0 -I {} cp {} app/src/main/res/drawable/chatgpt.png || echo "Logo not found, skipping..."

      - name: 5. 🛠️ Validate Gradle Wrapper
        run: |
          # Use 'wrapper' task only if missing; avoids unnecessary overhead
          if [ ! -f "gradlew" ]; then gradle wrapper --gradle-version 8.5; fi
          chmod +x gradlew

      - name: 6. 🔐 Secure Secrets Injection
        run: |
          # Use a dedicated directory to ensure .env isn't accidentally overwritten
          cat <<EOF > app/src/main/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF

      - name: 7. 🛡️ Hardened Obfuscation
        run: |
          npm install -g javascript-obfuscator --quiet
          # Added string-array encoding and dead-code injection for higher security
          javascript-obfuscator ./app/src/main/assets --output ./app/src/main/assets \
            --compact true \
            --self-defending true \
            --string-array true \
            --string-array-encoding 'base64' \
            --dead-code-injection true

      - name: 8. 🚀 Build Optimized APK
        run: |
          # Added --parallel and --build-cache for speed
          ./gradlew :app:assembleDebug --no-daemon --parallel --build-cache

      - name: 9. 🔒 Multi-Layer Integrity Signatures
        id: sign
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then echo "APK not found"; exit 1; fi
          
          {
            echo "--- APK MANIFEST ---"
            echo "Filename: $(basename $APK_PATH)"
            echo "SHA-256: $(sha256sum $APK_PATH | awk '{print $1}')"
            echo "SHA-512: $(sha512sum $APK_PATH | awk '{print $1}')"
            echo "SHA-3: $(openssl dgst -sha3-512 $APK_PATH | awk '{print $2}')"
          } > integrity-report.txt
          
          # Set path as output for next step
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: 10. 📦 Upload Elite Package
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Build-${{ github.run_number }}
          path: |
            ${{ steps.sign.outputs.apk_path }}
            integrity-report.txt
          retention-days: 7 # Clean up storage automatically
