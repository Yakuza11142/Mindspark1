name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Layer 2 Obfuscation
        run: |
          npm install -g javascript-obfuscator --quiet
          # Protects the JS logic before it gets bundled into the APK assets
          mkdir -p app/src/main/assets
          javascript-obfuscator ./src --output ./app/src/main/assets --compact true --string-array true --exclude ./app/build

      - name: Build Secure APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Triple-Layer Integrity Hashing
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk")
          sha256sum "$APK_PATH" > signatures.txt
          sha512sum "$APK_PATH" >> signatures.txt
          openssl dgst -sha3-512 "$APK_PATH" >> signatures.txt

      - name: Upload Elite Package
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Secure
          path: |
            app/build/outputs/apk/release/*.apk
            signatures.txt
