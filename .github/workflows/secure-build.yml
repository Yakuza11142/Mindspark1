name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential: Grabs the full project history and all files

      - name: 2. Initialize Flutter Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 3. 🛠️ Recursive Asset Discovery & Logo Sync
        run: |
          # Automatically finds where pubspec.yaml is (your project heart)
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets
          
          # DRAG your logo into the build
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png
          fi
          
          # Inject Supabase Secrets
          cat <<EOF > $PROJECT_ROOT/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: 4. 🧹 Nuclear Package Sync
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          # 1. Clear corrupted caches to ensure a fresh sync
          flutter clean
          # 2. Repair the cache if any packages were missing or broken
          flutter pub cache repair || true 
          # 3. Force-sync ALL Dart and hybrid packages
          flutter pub get

      - name: 5. 🚀 Build Hybrid APK (Total Code Inclusion)
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          # This command compiles ALL Dart files and native sub-modules
          flutter build apk --debug --stacktrace

      - name: 6. 📦 Export Master Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Final-v${{ github.run_number }}
          path: "**/*.apk"
          retention-days: 7
