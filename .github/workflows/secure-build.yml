name: Mind Spark 
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Everything
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Hybrid Stack
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: false # Forced fresh start to prevent sync bugs

      - name: 3. 🛠️ Project Discovery & Asset Injection
        run: |
          # Finds the project heart (pubspec.yaml)
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_ROOT" ]; then PROJECT_ROOT="."; fi
          echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV
          
          # Force create paths for logo and secrets
          mkdir -p $PROJECT_ROOT/android/app/src/main/res/drawable $PROJECT_ROOT/assets || true
          
          # Drag your logo into both Native and Flutter layers
          LOGO_PATH=$(find . -maxdepth 5 -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $PROJECT_ROOT/android/app/src/main/res/drawable/chatgpt.png || true
            cp "$LOGO_PATH" $PROJECT_ROOT/assets/logo.png || true
            echo "✅ Assets: Logo successfully dragged into build."
          fi
          
          # Inject Supabase Secrets (Ensure these are in GitHub Settings)
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" > $PROJECT_ROOT/.env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> $PROJECT_ROOT/.env

      - name: 4. ☢️ NUCLEAR SYNC (The Fix)
        working-directory: ${{ env.PROJECT_ROOT }}
        run: |
          # Cleans the environment and repairs broken dependency links
          rm -rf .dart_tool/
          rm -rf pubspec.lock
          flutter clean || true
          flutter pub cache repair || true
          flutter pub get || true

      - name: 5. 🛡️ Industrial Obfuscation & Scrambling
        run: |
          npm install -g javascript-obfuscator --quiet
          # Scrambles the .env and asset files to hide your keys
          javascript-obfuscator ${{ env.PROJECT_ROOT }}/assets --output ${{ env.PROJECT_ROOT }}/assets \
            --compact true --self-defending true --string-array-encoding 'rc4' --unicode-escape-sequence true

      - name: 6. 🚀 Build Multi-Language APK
        working-directory: ${{ env.PROJECT_ROOT }}
        # --obfuscate scrambles Dart code; --debug for fast delivery
        run: |
          flutter build apk --debug --obfuscate --split-debug-info=build/app/outputs/symbols --stacktrace

      - name: 7. 🔒 Signatures (SHA-256, 512 & SHA-3)
        run: |
          # Nuclear Find: Locate APK anywhere and move to root
          APK_PATH=$(find . -name "*.apk" -not -path "*/build-cache/*" | head -n 1)
          if [ -z "$APK_PATH" ]; then echo "❌ Build Error: APK not found" && exit 1; fi
          
          cp "$APK_PATH" MindSpark_Master_Final.apk
          
          {
            echo "SHA-256: $(sha256sum MindSpark_Master_Final.apk | awk '{print $1}')"
            echo "SHA-512: $(sha512sum MindSpark_Master_Final.apk | awk '{print $1}')"
            echo "SHA-3: $(openssl dgst -sha3-512 MindSpark_Master_Final.apk | awk '{print $2}')"
          } > signatures.txt

      - name: 8. 📦 Export Final Master Package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-v${{ github.run_number }}-Build
          path: |
            MindSpark_Master_Final.apk
            signatures.txt
          if-no-files-found: error
          retention-days: 7
