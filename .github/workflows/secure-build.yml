name: Mind Spark 
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 🛠️ Fix Directory Structure
        run: |
          # This fixes the "directory does not exist" error from your screenshot
          if [ ! -d "app" ]; then
            echo "Creating missing app directory..."
            mkdir -p app
            # Move your build files into the new app folder if they are in the root
            mv build.gradle app/ 2>/dev/null || true
            mv src app/ 2>/dev/null || true
          fi

      - name: 4. 🛠️ Reconstruct & Repair Gradle
        run: |
          rm -f gradlew
          rm -rf gradle/wrapper/gradle-wrapper.jar
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 5. 🚀 Build Secure APK
        run: |
          export JAVA_HOME=$JAVA_HOME
          # The fix in step 3 ensures ':app' now has a directory
          ./gradlew assembleRelease --no-daemon

      - name: 6. 🔒 Generate Signatures
        run: |
          APK_FILE=$(find . -name "*release*.apk" | head -n 1)
          sha256sum "$APK_FILE" > signatures.txt
          sha512sum "$APK_FILE" >> signatures.txt
          openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt

      - name: 7. 📦 Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*release*.apk
            signatures.txt
