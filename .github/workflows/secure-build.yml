name: Mind Spark
permissions:
  contents: read  # Strictly limits what the token can do

on:
  push:
    branches: [ main ]

jobs:
  build-and-harden:
    runs-on: ubuntu-latest
    steps:
      # 1. Block unauthorized network calls (Prevents data exfiltration)
      - name: Harden Runner
        uses: step-security/harden-runner@cb605e52c26070c328afc4562f0b4ada7618a84e # v2.10.2
        with:
          egress-policy: audit  # Change to 'block' after testing to fully lock down

      # 2. Checkout code pinned to an immutable commit hash
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@3932cf9a74c8913988011c304d9a78e7f12e16f7 # v4.1.0
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      # 3. Maximum Obfuscation (The deterrent)
      - name: Apply Military-Grade Obfuscation
        run: |
          npm install -g javascript-obfuscator
          javascript-obfuscator ./src --output ./dist \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 1 \
            --dead-code-injection true \
            --dead-code-injection-threshold 1 \
            --string-array true \
            --string-array-encoding 'rc4' \
            --string-array-threshold 1 \
            --unicode-escape-sequence true \
            --split-strings true

      # 4. Triple Integrity Hashing (Tamper Detection)
      - name: Generate Cryptographic Signatures
        run: |
          sha256sum dist/main.js > signatures.txt
          sha512sum dist/main.js >> signatures.txt
          openssl dgst -sha3-512 dist/main.js >> signatures.txt
          cat signatures.txt

      - name: Upload Verified Artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f01b8034732ee28332d97 # v4.4.3
        with:
          name: mind-spark-hardened
          path: |
            dist/
            signatures.txt
