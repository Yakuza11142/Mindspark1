name: Mind Spark
permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Initialize Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. 🛡️ Force-Inject Logo & Assets
        run: |
          # Find the REAL app module (it's the one with build.gradle)
          APP_DIR=$(find . -name "build.gradle" -exec grep -l "com.android.application" {} + | head -n 1 | xargs dirname)
          echo "APP_DIR=$APP_DIR" >> $GITHUB_ENV
          
          # Create missing resource paths inside the app module
          mkdir -p $APP_DIR/src/main/res/drawable $APP_DIR/src/main/assets || true
          
          # Find your logo anywhere in the repo and copy it to the correct path
          LOGO_PATH=$(find . -iname "*ChatGPT Image*" -not -path "*/.*" -print -quit)
          if [ -n "$LOGO_PATH" ]; then
            cp "$LOGO_PATH" $APP_DIR/src/main/res/drawable/chatgpt.png
            echo "✅ Logo copied to $APP_DIR/src/main/res/drawable/chatgpt.png"
          else
            # Placeholder to prevent build errors if the logo is missing
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > $APP_DIR/src/main/res/drawable/chatgpt.png
          fi

      - name: 4. 🔐 Secure Secret Injection
        run: |
          # Use the discovered app module path
          cat <<EOF > ${{ env.APP_DIR }}/src/main/assets/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          EOF

      - name: 5. 🛠️ Nuclear Gradle Repair
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 6. 🚀 High-Integrity Build
        run: |
          # Running from root ensures Gradle finds all sub-modules and code
          ./gradlew clean assembleDebug --no-daemon --parallel --stacktrace

      - name: 7. 📦 Export APK & Verify Content
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MindSpark-Full-Build
          path: "**/*.apk"
          retention-days: 7
