name: Mind Spark
permissions:
  contents: read

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Force Rebuild Gradle System
        run: |
          # 1. DELETE the corrupted/empty files from the runner
          rm -f gradlew
          rm -rf gradle/wrapper/gradle-wrapper.jar
          
          # 2. GENERATE a fresh, official Gradle engine (Version 8.5)
          # This command creates a perfect, non-corrupted JAR and script
          gradle wrapper --gradle-version 8.5
          
          # 3. SET permissions
          chmod +x gradlew

      - name: 🎨 Fix Logo Name
        run: |
          mkdir -p app/src/main/res/drawable
          # Finds your long ChatGPT image name and renames it correctly
          find . -name "ChatGPT Image*" -exec cp {} app/src/main/res/drawable/chatgpt.png \; || true

      - name: 🚀 Build Secure APK
        run: |
          # Finds the new gradlew and builds the app
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          cd $(dirname "$GRADLE_PATH")
          ./gradlew assembleDebug --no-daemon

      - name: 🔒 Triple-Layer Integrity Hashing
        run: |
          APK_FILE=$(find . -name "*.apk" | head -n 1)
          if [ -n "$APK_FILE" ]; then
            sha256sum "$APK_FILE" > signatures.txt
            sha512sum "$APK_FILE" >> signatures.txt
            openssl dgst -sha3-512 "$APK_FILE" >> signatures.txt
          else
            echo "Build failed: No APK was generated." && exit 1
          fi

      - name: 📦 Upload Final App
        uses: actions/upload-artifact@v4
        with:
          name: Mind-Spark-Elite-Final
          path: |
            **/*.apk
            signatures.txt
