name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false} # Disabled caching to force a clean environment rebuild

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF

      - name: Aggressive Virtual Workspace Purge
        run: |
          flutter clean || true
          rm -rf .dart_tool build
          flutter pub get

      - name: Compile Release Web Bundle
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env --no-tree-shake-icons --no-wasm-dry-run

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4}]

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false} # Forces compilation clarity on the virtual environment

      # TARGET REPAIR SHIELD: Fully case-corrected, handles multiple layouts, skips safely if clean
      - name: Repair Corrupted Manifest XML Properties
        run: |
          MFILE="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MFILE" ]; then
            sed -i 's/\<uses-permission\s\+name=/\<uses-permission android:name=/g' "$MFILE"
            sed -i 's/\<uses-feature\s\+name=/\<uses-feature android:name=/g' "$MFILE"
            sed -i 's/\<meta-data\s\+name=/\<meta-data android:name=/g' "$MFILE"
            sed -i 's/\<activity\s\+name=/\<activity android:name=/g' "$MFILE"
            sed -i 's/\<action\s\+name=/\<action android:name=/g' "$MFILE"
            sed -i 's/\<category\s\+name=/\<category android:name=/g' "$MFILE"
            sed -i 's/android:android:/android:/g' "$MFILE"
          fi

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          cp secrets.env android/local.properties || true

      - name: Aggressive Virtual Workspace Purge
        run: |
          flutter clean || true
          rm -rf .dart_tool build android/.gradle android/app/build
          flutter pub get

      # FAT APK TARGETING: Removed `--split-debug-info` and sub-architecture flags to generate one full fallback asset
      - name: Compile Fat Release APK Installer
        run: |
          flutter build apk --release \
            --dart-define-from-file=secrets.env \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
