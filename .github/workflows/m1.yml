name: Flutter Build Pipeline
on: workflow_dispatch

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
      JAVA_OPTS: "-Xmx4096m"

    strategy:
      matrix:
        target: [web, apk, appbundle]
      fail-fast: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Required Assets
        run: |
          touch .env logo.png
          echo "APP_ENV=release" > .env

      - name: Clean All Build Artifacts
        run: |
          flutter clean
          rm -rf build/
          cd android && ./gradlew clean --no-daemon || true
          cd ..

      - name: Get Flutter Dependencies
        run: flutter pub get
        timeout-minutes: 30

      - name: Build Web
        if: matrix.target == 'web'
        run: |
          echo "🌐 Building Web..."
          flutter build web --release
          if [ -d "build/web" ]; then
            echo "✅ Web build complete"
          else
            echo "❌ Web build failed"
            exit 1
          fi
        timeout-minutes: 60

      - name: Build APK
        if: matrix.target == 'apk'
        run: |
          echo "📱 Building APK..."
          flutter build apk --release
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK build complete"
          else
            echo "❌ APK build failed"
            exit 1
          fi
        timeout-minutes: 90

      - name: Build AAB
        if: matrix.target == 'appbundle'
        run: |
          echo "📦 Building AAB..."
          flutter build appbundle --release
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "✅ AAB build complete"
          else
            echo "❌ AAB build failed"
            exit 1
          fi
        timeout-minutes: 90

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mindspark-${{ matrix.target }}
          path: |
            build/web/
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build Status Report
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════"
          echo "  BUILD REPORT - ${{ matrix.target }}"
          echo "════════════════════════════════════"
          case "${{ matrix.target }}" in
            web)
              if [ -d "build/web" ]; then
                echo "✅ Web: SUCCESS ($(du -sh build/web | cut -f1))"
              else
                echo "❌ Web: FAILED"
              fi
              ;;
            apk)
              if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
                echo "✅ APK: SUCCESS ($(ls -lh build/app/outputs/flutter-apk/app-release.apk | awk '{print $5}'))"
              else
                echo "❌ APK: FAILED"
              fi
              ;;
            appbundle)
              if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
                echo "✅ AAB: SUCCESS ($(ls -lh build/app/outputs/bundle/release/app-release.aab | awk '{print $5}'))"
              else
                echo "❌ AAB: FAILED"
              fi
              ;;
          esac
          echo "════════════════════════════════════"
