name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: sudo chmod -R 777 . || true
    - uses: actions/setup-java@v4
      with: {distribution: temurin, java-version: "17"}
    - uses: subosito/flutter-action@v2
      with: {channel: stable, cache: false}
    - name: Eraser Keys Data Setup
      env:
        KEYS_DATA: "SUPABASE_URL SUPABASE_ANON_KEY GEMINI_API_KEY OPENAI_KEY GROQ_API_KEY VERTEX_API_KEY HEYGEN_KEY RUNWAYML_API_SECRET TRIPO_API_KEY PEXELS_API_KEY MTN_API_KEY ELEVEN_LAB_API_KEY"
        SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
        SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
        OPENAI_KEY: "${{ secrets.OPENAI_KEY }}"
        GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
        VERTEX_API_KEY: "${{ secrets.VERTEX_API_KEY }}"
        HEYGEN_KEY: "${{ secrets.HEYGEN_KEY }}"
        RUNWAYML_API_SECRET: "${{ secrets.RUNWAYML_API_SECRET }}"
        TRIPO_API_KEY: "${{ secrets.TRIPO_API_KEY }}"
        PEXELS_API_KEY: "${{ secrets.PEXELS_API_KEY }}"
        MTN_API_KEY: "${{ secrets.MTN_API_KEY }}"
        ELEVEN_LAB_API_KEY: "${{ secrets.ELEVEN_LAB_API_KEY }}"
      run: |
        echo "{" > secrets.json
        first=true
        for k in $KEYS_DATA; do
          val=$(eval echo \$$k | tr -d '\r' | tr -d '\n' | tr -d '"')
          if [ "$first" = true ]; then first=false; else echo "," >> secrets.json; fi
          echo "\"$k\": \"$val\"" >> secrets.json
        done
        echo "}" >> secrets.json
        mkdir -p android && echo "storePassword=" > android/local.properties
    - name: Eraser Core Code Prep
      run: |
        find . -name "settings.gradle" -type f -exec sed -i "s/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g" {} + || true
        python3 -c '
import os
p = "android/app/src/main/AndroidManifest.xml"
if os.path.exists(p):
    with open(p, "r", encoding="utf-8") as f: c = f.read()
    if "android.permission.INTERNET" not in c:
        p_str = "\n    <uses-permission android:name=\"android.permission.INTERNET\"/>\n    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>\n    <uses-permission android:name=\"android.permission.CAMERA\"/>"
        c = c.replace("<manifest", f"<manifest xmlns:tools=\"http://android.com\"")
        c = c.replace("<application", f"{p_str}\n    <application android:usesCleartextTraffic=\"true\" tools:targetApi=\"m\" android:largeHeap=\"true\"")
        with open(p, "w", encoding="utf-8") as f: f.write(c)
        print("Manifest permission elements updated successfully!")
        '
        flutter clean || true
        flutter pub get || true
    - name: Eraser Web Compilation Build
      run: |
        flutter build web --release --base-href "/" --dart-define-from-file=secrets.json
    - uses: actions/upload-pages-artifact@v3
      with: {path: build/web}
    - name: Eraser Android APK Compilation Build
      run: |
        flutter build apk --release --dart-define-from-file=secrets.json --android-skip-build-dependency-validation
    - uses: actions/upload-artifact@v4
      with: {name: apk, path: build/app/outputs/flutter-apk/app-release.apk}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/deploy-pages@v4
