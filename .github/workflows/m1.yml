name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix: {target: [apk, appbundle]}
      fail-fast: false
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Inject Configuration Environment Keys
        run: |
          mkdir -p assets
          touch .env assets/icon_launcher.png
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
      - name: Nuclear Subsystem Reconstruction & Full Permission Array Injection
        run: |
          rm -rf android/ || true
          flutter create . --platforms=android
          if [ -f android/app/build.gradle ]; then
            sed -i 's/com.example.mindspark/com.example.mindspark1/g' android/app/build.gradle
          fi
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i '/<uses-permission/d' "$MANIFEST_PATH"
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"\/>\n    <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.CAMERA"\/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"\/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"\/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"\/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID"\/>\n    <uses-feature android:name="android.hardware.camera.ar" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"\/>' "$MANIFEST_PATH"
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' "$MANIFEST_PATH"
          fi
          sed -i 's/android:icon="@mipmap\/launcher_icon"/android:icon="@android:drawable\/btn_star"/g' android/app/src/main/AndroidManifest.xml || true
          sed -i 's/android:roundIcon="@mipmap\/launcher_icon_round"/android:roundIcon="@android:drawable\/btn_star"/g' android/app/src/main/AndroidManifest.xml || true
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            keytool -genkey -v -keystore android/app/upload-keystore.jks -alias fallbackAlias -keyalg RSA -keysize 2048 -validity 10000 -storepass fallbackPassword -keypass fallbackPassword -dname "CN=Mindspark, OU=Dev, O=Core, L=Workspace, S=Global, C=US"
            echo -e "storePassword=fallbackPassword\nkeyPassword=fallbackPassword\nkeyAlias=fallbackAlias\nstoreFile=upload-keystore.jks" > android/key.properties
          else
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
            echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          fi
      - name: Compile Native Binaries with Dependency Hot-Fixes
        run: |
          flutter clean
          flutter pub get
          ARCORE_GRADLE_PATH="/home/runner/.pub-cache/hosted/pub.dev/arcore_flutter_plus-1.0.2/android/build.gradle"
          if [ -f "$ARCORE_GRADLE_PATH" ]; then
          cat << 'EOF' > "$ARCORE_GRADLE_PATH"
          group 'com.muzammil.arcore.flutter.plus'
          version '1.0-SNAPSHOT'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          rootProject.allprojects { repositories { google(); mavenCentral() } }
          apply plugin: 'com.android.library'
          android {
              namespace "com.muzammil.arcore.flutter.plus"
              compileSdk 34
              defaultConfig { minSdk 24 }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.ar:core:1.40.0'
              implementation 'com.google.ar.sceneform:core:1.17.1'
              implementation 'com.google.ar.sceneform:assets:1.17.1'
              implementation ('com.google.ar.sceneform.ux:sceneform-ux:1.17.1') { exclude group: 'com.android.support' }
              implementation 'androidx.core:core-ktx:1.12.0'
          }
          EOF
          fi
          find /home/runner/.pub-cache/hosted/pub.dev/ -name "build.gradle" -type f | while read -r file; do
              if grep -q "configurations\.all\s*{" "$file"; then
                  echo "Upgrading configuration container syntax inside: $file"
                  sed -i 's/configurations\.all\s*{/configurations.configureEach {/g' "$file"
              fi
          done
          if [ -f android/build.gradle ]; then
              sed -i 's/com.android.application" version ".*"/com.android.application" version "8.2.2"/g' android/build.gradle
          fi
          flutter precache --android
          flutter build ${{ matrix.target }} --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.env
      - uses: actions/upload-artifact@v4
        with:
          name: holomatics-native-${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Inject Configuration Keys (Web)
        run: |
          mkdir -p assets
          touch .env assets/icon_launcher.png
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
      - name: Build and Patch Flutter Web App
        run: |
          flutter clean
          flutter pub get
          echo "🌐 Generating Web Compilation Engine Layers..."
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env
          if [ -d "build/web" ]; then
            cp build/web/index.html build/web/404.html
            echo "✅ Web build operation verified"
          else
            echo "❌ Web compilation engine crash event recorded"
            exit 1
          fi
      - name: Packaging Pages Assets
        uses: actions/upload-pages-artifact@v5
        with: {path: build/web}
  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.deployment.outputs.page_url }}"}
    steps:
      - name: Deploy Compiled Matrix to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
