name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env: {GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m", JAVA_OPTS: "-Xmx4096m"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Setup and Clean
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi assets
          touch android/app/src/main/res/mipmap-mdpi/launcher_icon.png
          touch "assets/Screenshot_20260708_215841_Chrome....jpg"
          # Dynamically create the missing .env file required by pubspec.yaml assets
          touch .env
          flutter clean && flutter pub get
      - name: Build Web
        run: |
          # Compiles the high-performance WebAssembly release target
          flutter build web --release --wasm
          # Automatically rewrites the base href link path for host routing structure mapping
          sed -i 's|<base href="/">|<base href="/'"${{ github.event.repository.name }}"'/|g' build/web/index.html
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
      - uses: actions/deploy-pages@v4
      - name: Build Android
        run: |
          # Compiles split architecture APK structures and full delivery bundle matrices
          flutter build apk --release --android-skip-build-dependency-validation --split-per-abi
          flutter build appbundle --release --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with: 
          name: holomatics-native-builds
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
