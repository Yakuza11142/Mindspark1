name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  pipeline:
    name: Core Build Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Keys
        run: |
          mkdir -p assets && touch .env assets/icon_launcher.png
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
      - name: Compile Web
        run: |
          flutter clean && flutter pub get
          sed -i 's|<head>|<head><base href="/|' web/index.html || true
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env
          cp build/web/index.html build/web/404.html || true
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
      - name: Setup Android Ecosystem
        run: |
          rm -rf android/ || true
          flutter create . --platforms=android --android-language java
          rm -f android/*.kts android/app/*.kts || true
          
          # HARDENED build.gradle: Direct engine repository linking to solve the 37 packaging loops
          cat << 'EOF' > android/build.gradle
          buildscript {
              ext.kotlin_version = '2.0.0'
              repositories { 
                  google()
                  mavenCentral()
                  maven { url 'https://googleapis.com' }
              }
              dependencies { classpath 'com.android.tools.build:gradle:8.6.0'; classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version" }
          }
          allprojects { 
              repositories { 
                  google()
                  mavenCentral()
                  maven { url 'https://googleapis.com' }
              } 
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              afterEvaluate { p -> if (p.hasProperty('android')) { p.android { compileSdk 34 } } }
          }
          tasks.register("clean", Delete) { delete rootProject.buildDir }
          EOF
          
          cat << 'EOF' > android/app/build.gradle
          plugins { id "com.android.application"; id "dev.flutter.flutter-gradle-plugin" }
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) { keystoreProperties.load(new FileInputStream(keystorePropertiesFile)) }
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) { localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) } }
          def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
          def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'
          android {
              namespace "com.example.mindspark1"
              compileSdk 34
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              defaultConfig { applicationId "com.example.mindspark1"; minSdk 24; targetSdk 34; versionCode flutterVersionCode.toInteger(); versionName flutterVersionName; multiDexEnabled true }
              signingConfigs { release { keyAlias keystoreProperties['keyAlias']; keyPassword keystoreProperties['keyPassword']; storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null; storePassword keystoreProperties['storePassword'] } }
              buildTypes { release { signingConfig signingConfigs.release; minifyEnabled false; shrinkResources false } }
          }
          dependencies { 
              implementation "androidx.annotation:annotation:1.7.0"
              implementation "androidx.multidex:multidex:2.0.1"
          }
          flutter { source '../..' }
          EOF
          
          # HARDENED settings.gradle: Explicitly forces the plugin management cache to resolve download links
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties(); def file = new File(settingsDir, "local.properties")
                  if (file.exists()) { file.withReader("UTF-8") { reader -> properties.load(reader) } }
                  return properties.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories { 
                  google()
                  mavenCentral()
                  gradlePluginPortal()
                  maven { url 'https://googleapis.com' }
              }
          }
          plugins { id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false; id "com.android.application" version "8.6.0" apply false; id "org.jetbrains.kotlin.android" version "2.0.0" apply false }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { 
                  google()
                  mavenCentral()
                  maven { url 'https://googleapis.com' }
              } 
          }
          rootProject.name = "mindspark1"
          include ':app'
          EOF
          
          M="android/app/src/main/AndroidManifest.xml"
          if [ -f "$M" ]; then
            sed -i '/<uses-permission/d' "$M"
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"\/>\n    <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.CAMERA"\/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"\/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"\/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"\/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID"\/>\n    <uses-feature android:name="android.hardware.camera.ar" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"\/>' "$M"
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' "$M"
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          echo -e "sdk.dir=$ANDROID_HOME\nflutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Compile APK
        run: |
          flutter pub get && flutter precache --android
          flutter build apk --release --split-per-abi --no-shrink --android-skip-build-dependency-validation --dart-define-from-file=secrets.env --pub --build-number=1
      - uses: actions/upload-artifact@v4
        with: {name: "native-apk", path: "build/app/outputs/flutter-apk/*.apk"}

  deploy_web:
    name: Deploy Live Page
    needs: pipeline
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.deployment.outputs.page_url }}"}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
