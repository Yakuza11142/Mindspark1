name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: sudo chmod -R 777 . || true
    - uses: actions/setup-java@v4
      with: {distribution: temurin, java-version: 17}
    - uses: subosito/flutter-action@v2
      with: {channel: stable, cache: false}
    - name: Configure Production Secrets
      env:
        KEYS_DATA: "SUPABASE_URL SUPABASE_ANON_KEY GEMINI_API_KEY OPENAI_KEY GROQ_API_KEY VERTEX_API_KEY HEYGEN_KEY RUNWAYML_API_SECRET TRIPO_API_KEY PEXELS_API_KEY MTN_API_KEY ELEVEN_LAB_API_KEY"
        SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
        SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
        GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
        OPENAI_KEY: "${{ secrets.OPENAI_KEY }}"
        GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
        VERTEX_API_KEY: "${{ secrets.VERTEX_API_KEY }}"
        HEYGEN_KEY: "${{ secrets.HEYGEN_KEY }}"
        RUNWAYML_API_SECRET: "${{ secrets.RUNWAYML_API_SECRET }}"
        TRIPO_API_KEY: "${{ secrets.TRIPO_API_KEY }}"
        PEXELS_API_KEY: "${{ secrets.PEXELS_API_KEY }}"
        MTN_API_KEY: "${{ secrets.MTN_API_KEY }}"
        ELEVEN_LAB_API_KEY: "${{ secrets.ELEVEN_LAB_API_KEY }}"
      run: |
        echo "{" > secrets.json
        first=true
        for k in $KEYS_DATA; do
          val=$(eval echo \$$k | tr -d '\r' | tr -d '\n' | tr -d '"')
          if [ "$first" = true ]; then first=false; else echo "," >> secrets.json; fi
          echo "\"$k\": \"$val\"" >> secrets.json
        done
        echo "}" >> secrets.json
        mkdir -p android && echo "storePassword=" > android/local.properties
    - name: Reset Repositories and Force Single-Line Manifest
      run: |
        find . -name "settings.gradle" -type f -exec sed -i "s/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g" {} + || true
        mkdir -p android/app/src/main
        
        # Writes a perfectly flat manifest with zero hidden formatting or alignment spaces
        echo '<manifest xmlns:android="http://android.com" package="com.example.mindspark1"><uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/><uses-permission android:name="android.permission.WAKE_LOCK"/><uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/><uses-permission android:name="android.permission.VIBRATE"/><uses-permission android:name="android.permission.CAMERA"/><application android:label="Mindspark" android:name="androidx.multidex.MultiDexApplication" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:largeHeap="true"><activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:windowSoftInputMode="adjustResize"><meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity><meta-data android:name="flutterEmbedding" android:value="2"/></application></manifest>' > android/app/src/main/AndroidManifest.xml
        
        flutter clean || true
        flutter pub get || true
    - name: Compile Flutter Web Release
      run: |
        mkdir -p web
        echo '<!DOCTYPE html><html><head><base href="$FLUTTER_BASE_HREF"><script src="flutter_bootstrap.js" async></script></head><body></body></html>' > web/index.html
        flutter build web --release --base-href "/" --dart-define-from-file=secrets.json
    - uses: actions/upload-pages-artifact@v3
      with: {path: build/web}
    - name: Compile Production Android APK
      run: |
        flutter build apk --release --dart-define-from-file=secrets.json --android-skip-build-dependency-validation
    - uses: actions/upload-artifact@v4
      with: {name: apk, path: build/app/outputs/flutter-apk/app-release.apk}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/deploy-pages@v4