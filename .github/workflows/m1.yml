name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          flutter clean && flutter pub get
          sed -i 's|<head>|<head><base href="/|' web/index.html || true
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env
          cp build/web/index.html build/web/404.html || true
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
        continue-on-error: true
  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.deployment.outputs.page_url }}"}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: |
          mkdir -p assets && touch .env
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          
          # Clean build state and setup scaffolding
          rm -rf android/ || true
          flutter create . --platforms=android --android-language kotlin --project-name=mindspark1
          flutter pub get
          
          # Run icon asset compilation pass
          flutter pub run flutter_launcher_icons
          
          # Inject configurations cleanly on straight lines without using backslash escapes
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/defaultConfig {/a \        multiDexEnabled = true' android/app/build.gradle.kts
            sed -i '/defaultConfig {/a \        minSdk = 24' android/app/build.gradle.kts
            sed -i '/defaultConfig {/a \        targetSdk = 35' android/app/build.gradle.kts
            sed -i 's/android:icon="@mipmap\/ic_launcher"/android:icon="@mipmap\/launcher_icon"/g' android/app/src/main/AndroidManifest.xml
          fi
          
          # Synchronize subproject versions to match SDK demands smoothly
          if [ -f android/build.gradle.kts ]; then
            cat << 'EOF' >> android/build.gradle.kts

            subprojects {
                afterEvaluate {
                    if (plugins.hasPlugin("com.android.application") || plugins.hasPlugin("com.android.library")) {
                        extensions.configure<com.android.build.gradle.BaseExtension> {
                            compileSdkVersion(35)
                            defaultConfig {
                                minSdk = 24
                                targetSdk = 35
                            }
                        }
                    }
                }
            }
          EOF
          fi

          # Append stable appcompat requirements matching core expectations
          cat << 'EOF' >> android/app/build.gradle.kts

          dependencies {
              implementation("androidx.annotation:annotation:1.7.1")
              implementation("androidx.appcompat:appcompat:1.7.0")
          }
          EOF
          
          flutter build apk --release --dart-define-from-file=secrets.env
          
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
