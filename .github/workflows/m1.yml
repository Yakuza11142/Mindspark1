name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF

      - name: Clean Cache and Fetch Dependencies
        run: |
          flutter clean || true
          rm -rf .dart_tool build
          flutter pub get

      # BOOTSTRAP SHIELD: Safely updates index.html to bind your compilation keys to the web engine lifecycle
      - name: Patch HTML Web Initialization Engines
        run: |
          python3 -c '
          import os
          hpath = "web/index.html"
          if os.path.exists(hpath):
              with open(hpath, "r", encoding="utf-8") as f:
                  content = f.read()

              bootstrap_patch = """
                <script>
                  window.addEventListener("flutter-first-frame", function() {
                    console.log("Mind Spark Engine successfully mounted.");
                  });
                  window.addEventListener("error", function(e) {
                    if (e.message.includes("flutter") || e.message.includes("dart")) {
                      console.error("Runtime configuration catch:", e.message);
                    }
                  });
                </script>
                <script src="flutter_bootstrap.js" async></script>
              """
              
              if "<script src=\"flutter_bootstrap.js\" async></script>" in content:
                  content = content.replace("<script src=\"flutter_bootstrap.js\" async></script>", bootstrap_patch)
              
              with open(hpath, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Web initialization scripts successfully stabilized.")
          '

      - name: Compile Release Web Bundle
        run: flutter build web --release --base-href "/" --dart-define-from-file=secrets.env

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4}]

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      # XML SHIELD: Directly overwrites your AndroidManifest.xml with structured properties.
      # This guarantees that the virtual compiler sees perfectly formatted XML and never drops out on manifest merger exceptions.
      - name: Inject Safe Production Android Manifest XML
        run: |
          mkdir -p android/app/src/main
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              
              <application
                  android:label="Mindspark"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          cp secrets.env android/local.properties || true

      - name: Clean Cache and Fetch Dependencies
        run: |
          flutter clean || true
          rm -rf .dart_tool build android/.gradle android/app/build
          flutter pub get

      - name: Compile Fat Release APK Installer
        run: flutter build apk --release --dart-define-from-file=secrets.env

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
