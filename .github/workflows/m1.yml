name: m1-debug-pipeline
on:
  workflow_dispatch: # Forces manual execution only. No automatic loops.

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter Build Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: 'flutter-${{ runner.os }}-${{ hashFiles("**/pubspec.lock") }}'
          cache-path: '${{ runner.tool_cache }}/flutter/:channel:${{ runner.arch }}'

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v
          dart --version

      - name: Prep Project Paths
        run: |
          mkdir -p ds/apk ds/aab ds/web build
          echo "Project directories created successfully"

      - name: Resolve Project Dependencies
        run: |
          flutter clean
          flutter pub get
          flutter pub upgrade --major-versions
        continue-on-error: false

      - name: Generate Code (if needed)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            flutter pub run build_runner build --delete-conflicting-outputs
          fi
        continue-on-error: true

      - name: Execute Web Target Compilation
        run: |
          flutter build web --release --verbose
          echo "✅ Web build completed successfully"

      - name: Verify Web Build Output
        run: |
          if [ -d "build/web" ]; then
            ls -lah build/web/
            echo "✅ Web build artifacts verified"
          else
            echo "❌ Web build directory not found"
            exit 1
          fi

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-build
          path: build/web/
          if-no-files-found: warn

      - name: Execute APK Target Compilation
        run: |
          flutter build apk --release --no-tree-shake-icons --verbose
          echo "✅ APK build completed successfully"

      - name: Verify APK Build Output
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            ls -lah build/app/outputs/flutter-apk/app-release.apk
            echo "✅ APK build artifacts verified"
          else
            echo "❌ APK file not found"
            exit 1
          fi

      - name: Consolidate APK Output
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk
          ls -lah ds/apk/

      - name: Upload APK Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-build
          path: ds/apk/
          if-no-files-found: warn

      - name: Execute AAB Target Compilation
        run: |
          flutter build appbundle --release --verbose
          echo "✅ AAB build completed successfully"

      - name: Verify AAB Build Output
        run: |
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            ls -lah build/app/outputs/bundle/release/app-release.aab
            echo "✅ AAB build artifacts verified"
          else
            echo "❌ AAB file not found"
            exit 1
          fi

      - name: Consolidate AAB Output
        run: |
          mkdir -p ds/aab
          cp build/app/outputs/bundle/release/app-release.aab ds/aab/mind_spark.aab
          ls -lah ds/aab/

      - name: Upload AAB Build Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aab-build
          path: ds/aab/
          if-no-files-found: warn

      - name: Final Build Summary
        if: always()
        run: |
          echo "==================================="
          echo "   BUILD SUMMARY"
          echo "==================================="
          echo ""
          echo "📱 Web Build:"
          [ -d "build/web" ] && echo "  ✅ SUCCESS - $(find build/web -type f | wc -l) files" || echo "  ❌ FAILED"
          echo ""
          echo "📦 APK Build:"
          [ -f "ds/apk/mind_spark.apk" ] && echo "  ✅ SUCCESS - $(ls -lh ds/apk/mind_spark.apk | awk '{print $5}')" || echo "  ❌ FAILED"
          echo ""
          echo "📋 AAB Build:"
          [ -f "ds/aab/mind_spark.aab" ] && echo "  ✅ SUCCESS - $(ls -lh ds/aab/mind_spark.aab | awk '{print $5}')" || echo "  ❌ FAILED"
          echo ""
          echo "==================================="
