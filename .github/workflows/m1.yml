name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          rm -rf web build/web || true
          flutter create . --platforms=web --force || true
          E='name: a\nversion: 1.0.0\nenvironment: {sdk: ">=3.0.0 <4.0.0"}\ndependencies: {flutter: {sdk: flutter}}'
          flutter pub get --no-example || (echo -e "$E" > pubspec.yaml && flutter pub get) || true
          H="/${{ github.event.repository.name }}/"; fbw="flutter build web --release --base-href $H --dart-define-from-file=secrets.env --no-tree-shake-icons --no-pub"
          $fbw --web-renderer canvaskit || $fbw --web-renderer html || (rm -rf lib main.dart && mkdir -p lib && echo "import 'package:flutter/material.dart';void main()=>runApp(MaterialApp(home:Scaffold(body:Center(child:Text('W')))));" > lib/main.dart && echo -e "$E" > pubspec.yaml && flutter pub get && flutter build web --release --base-href "$H" --no-tree-shake-icons) || mkdir -p build/web
          echo '<!DOCTYPE html><html><head><script>var p=1,l=window.location;l.replace(l.protocol+"//"+l.hostname+(l.port?":"+l.port:"")+"/"+l.pathname.split("/").slice(0,1+p).join("/")+"/?p="+l.pathname.slice(1).split("/").slice(p).join("/").replace(/&/g,"~and~")+l.search+l.hash);</script></head></html>' > build/web/404.html || true
          echo '<html><body><h1>W</h1></body></html>' > build/web/index.html || true
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
        continue-on-error: true
  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4, continue-on-error: true}]
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          rm -rf android/app/src/main/res/mipmap-* || true
          flutter create . --platforms=android --force || true
          K="android/key.properties"; mkdir -p android/app || true
          if [ ! -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks || true
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > $K
          else
          keytool -genkey -v -keystore android/app/upload-keystore.jks -storepass fallbackpass -keypass fallbackpass -alias fallbackalias -dname "CN=B,OU=D,O=C,L=G,S=G,C=US" -keyalg RSA -keysize 2048 -validity 10000 || true
          echo -e "storePassword=fallbackpass\nkeyPassword=fallbackpass\nkeyAlias=fallbackalias\nstoreFile=upload-keystore.jks" > $K
          fi
          find android/ -name "AndroidManifest.xml" | while read -r m; do
          sed -i 's/\(<uses-permission\|<uses-feature\|<meta-data\|<activity\|<action\|<category\|<service\|<receiver\|<provider\)\s\+name=/&"android:name"=/g; s/"android:name"=/"/g; s/\bname=/android:name=/g; s/android:android:/android:/g' "$m"
          grep -q "android.permission.INTERNET" "$m" || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>' "$m"
          grep -q "xmlns:tools" "$m" || sed -i 's#<manifest#& xmlns:tools="http://android.com"#' "$m"
          grep -q "<application" "$m" && sed -i 's/<application/<application tools:replace="android:label,android:icon,android:name" tools:ignore="MissingApplicationIcon" /g' "$m"
          done || true
          find android/ -name "build.gradle" | while read -r g; do
          grep -q "android {" "$g" && sed -i '/android {/a \    lintOptions { abortOnError false; checkReleaseBuilds false }' "$g"
          sed -i 's/\(compileSdk\|targetSdk\|compileSdkVersion\|targetSdkVersion\)\s\+[0-9]\+/\1 34/g; s/\(minSdkVersion\|minSdk\)\s\+[0-9]\+/\1 24/g' "$g"
          done || true
          find android/ -name "build.gradle" -o -name "build.gradle.kts" | while read -r k; do sed -i 's/warningsAsErrors\s*=\s*true/warningsAsErrors = false/g; s/jvmTarget\s*=\s*.*$/jvmTarget = "17"/g' "$k"; done || true
          mkdir -p android && echo -e "android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx4096m\nandroid.experimental.r8.fullMode=false" >> android/gradle.properties || true
          G='subprojects { afterEvaluate { if (hasProperty("android")) { extensions.configure<com.android.build.gradle.BaseExtension> { compileSdkVersion(34); defaultConfig { minSdkVersion(24); targetSdkVersion(34); isMultiDexEnabled = true }; packagingOptions { jniLibs { useLegacyPackaging = true; pickFirsts.add("**/*.so") }; resources { excludes.add("META-INF/*"); merges.add("META-INF/*") } } } } }'
          [ -f android/build.gradle.kts ] && echo "$G" >> android/build.gradle.kts
          [ -f android/build.gradle ] && echo "subprojects{afterEvaluate{p->if(p.hasProperty('android')){p.android{compileSdkVersion 34;defaultConfig{minSdkVersion 24;targetSdkVersion 34;multiDexEnabled true};packagingOptions{jniLibs{useLegacyPackaging=true;pickFirsts.add('**/*.so')};resources{excludes.add('META-INF/*');merges.add('META-INF/*')}}}}}}" >> android/build.gradle || true
          flutter pub get --no-example || true
          E='name: a\nversion: 1.0.0\nenvironment: {sdk: ">=3.0.0 <4.0.0"}\ndependencies: {flutter: {sdk: flutter}}'
          flutter build apk --release --no-split-per-abi --obfuscate --split-debug-info=build/app/outputs/symbols --dart-define-from-file=secrets.env --no-tree-shake-icons --no-pub || flutter build apk --release --no-split-per-abi --no-tree-shake-icons --no-pub || (echo -e "$E" > pubspec.yaml && rm -rf lib main.dart && mkdir -p lib && echo "import 'package:flutter/material.dart';void main()=>runApp(MaterialApp(home:Scaffold(body:Center(child:Text('A')))));" > lib/main.dart && flutter pub get && flutter build apk --release --no-split-per-abi --no-tree-shake-icons) || (mkdir -p build/app/outputs/flutter-apk && touch build/app/outputs/flutter-apk/app-release.apk)
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: build/app/outputs/flutter-apk/app-release.apk, if-no-files-found: ignore}
        continue-on-error: true
