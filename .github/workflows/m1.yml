name: m1-debug-pipeline
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
      JAVA_OPTS: "-Xmx4096m"
      ANDROID_GRADLE_PLUGIN_VERSION: "8.1.0"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          cache-dependency-path: android/gradle/wrapper/gradle-wrapper.properties

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ hashFiles('**/pubspec.lock') }}
          cache-path: ${{ runner.tool_cache }}/flutter

      - name: Verify Tools
        run: |
          echo "=== Flutter Info ==="
          flutter --version
          flutter doctor -v
          echo "=== Java Info ==="
          java -version
          echo "=== Gradle Info ==="
          cd android && ./gradlew --version || gradle --version

      - name: Clean Project
        run: |
          flutter clean
          cd android && ./gradlew clean --stacktrace || true
          rm -rf build/

      - name: Get Dependencies
        run: |
          flutter pub get
          flutter pub upgrade --major-versions
        timeout-minutes: 30

      - name: Create Directories
        run: |
          mkdir -p ds/apk ds/aab ds/web
          mkdir -p build/web build/app/outputs

      - name: Build Web
        run: |
          echo "Starting web build..."
          flutter build web --release --verbose 2>&1 | tee web_build.log
          echo "Web build completed"
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            echo "✅ Web build successful"
          else
            echo "❌ Web build failed"
            cat web_build.log
            exit 1
          fi
        timeout-minutes: 60
        continue-on-error: false

      - name: Upload Web Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 30

      - name: Build APK
        run: |
          echo "Starting APK build..."
          cd android
          ./gradlew assembleRelease --stacktrace -Pcom.android.tools.r8.dontminify --no-daemon 2>&1 | tee apk_build.log
          cd ..
          echo "APK build completed"
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK build successful"
          else
            echo "❌ APK build failed"
            cat android/apk_build.log
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy APK
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk
          ls -lah ds/apk/

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ds/apk/
          retention-days: 30

      - name: Build AAB
        run: |
          echo "Starting AAB build..."
          cd android
          ./gradlew bundleRelease --stacktrace -Pcom.android.tools.r8.dontminify --no-daemon 2>&1 | tee aab_build.log
          cd ..
          echo "AAB build completed"
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "✅ AAB build successful"
          else
            echo "❌ AAB build failed"
            cat android/aab_build.log
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy AAB
        run: |
          mkdir -p ds/aab
          cp build/app/outputs/bundle/release/app-release.aab ds/aab/mind_spark.aab
          ls -lah ds/aab/

      - name: Upload AAB Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: ds/aab/
          retention-days: 30

      - name: Final Report
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════╗"
          echo "║     BUILD COMPLETION REPORT        ║"
          echo "╚════════════════════════════════════╝"
          echo ""
          
          echo "📱 WEB BUILD:"
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            FILE_COUNT=$(find build/web -type f | wc -l)
            SIZE=$(du -sh build/web | cut -f1)
            echo "   ✅ SUCCESS"
            echo "   📊 Files: $FILE_COUNT"
            echo "   📦 Size: $SIZE"
          else
            echo "   ❌ FAILED - No files found"
          fi
          
          echo ""
          echo "📦 APK BUILD:"
          if [ -f "ds/apk/mind_spark.apk" ]; then
            SIZE=$(ls -lh ds/apk/mind_spark.apk | awk '{print $5}')
            echo "   ✅ SUCCESS"
            echo "   📦 Size: $SIZE"
          else
            echo "   ❌ FAILED - APK not found"
          fi
          
          echo ""
          echo "📋 AAB BUILD:"
          if [ -f "ds/aab/mind_spark.aab" ]; then
            SIZE=$(ls -lh ds/aab/mind_spark.aab | awk '{print $5}')
            echo "   ✅ SUCCESS"
            echo "   📦 Size: $SIZE"
          else
            echo "   ❌ FAILED - AAB not found"
          fi
          
          echo ""
          echo "════════════════════════════════════"
          
          # Exit with success only if all 3 builds exist
          if [ -d "build/web" ] && [ -f "ds/apk/mind_spark.apk" ] && [ -f "ds/aab/mind_spark.aab" ]; then
            echo "🎉 ALL BUILDS SUCCESSFUL!"
            exit 0
          else
            echo "⚠️  Some builds failed"
            exit 1
          fi
