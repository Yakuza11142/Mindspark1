name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF

      - name: Aggressive Virtual Workspace Purge
        run: |
          flutter clean || true
          rm -rf .dart_tool build
          flutter pub get

      - name: Compile Release Web Bundle
        run: flutter build web --release --base-href "/" --dart-define-from-file=secrets.env --no-tree-shake-icons --no-wasm-dry-run

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4}]

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      # TARGET REPAIR SHIELD: Uses Python to accurately restore the missing 'android:' prefixes regardless of spaces or quotes.
      - name: Repair Corrupted Manifest XML Properties
        run: |
          python3 -c '
          import os, re

          mfile = "android/app/src/main/AndroidManifest.xml"
          if os.path.exists(mfile):
              print("Found AndroidManifest.xml. Repairing properties...")
              with open(mfile, "r", encoding="utf-8") as f:
                  content = f.read()

              # 1. Strip out any accidental prefix doublings first
              content = re.sub(r"android:android:", "android:", content)

              # List of standard attributes that should be under the android namespace
              attributes = ["name", "glEsVersion", "value", "resource", "hardwareAccelerated", "theme", "windowSoftInputMode", "launchMode", "configChanges", "exported"]

              for attr in attributes:
                  # This replaces things like ` name=` or `\nname=` with ` android:name=` while preserving the rest of the tag
                  pattern = rf"(\s)({attr})(\s*=)"
                  content = re.sub(pattern, r"\1android:\2\3", content)

              # Clean up any "android:android:" generated during the previous step
              content = re.sub(r"android:android:", "android:", content)

              with open(mfile, "w", encoding="utf-8") as f:
                  f.write(content)
              print("AndroidManifest.xml successfully repaired.")
          else:
              print("Warning: AndroidManifest.xml not found!")
          '

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          cp secrets.env android/local.properties || true

      - name: Aggressive Virtual Workspace Purge
        run: |
          flutter clean || true
          rm -rf .dart_tool build android/.gradle android/app/build
          flutter pub get

      - name: Compile Fat Release APK Installer
        run: |
          flutter build apk --release \
            --dart-define-from-file=secrets.env \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk
