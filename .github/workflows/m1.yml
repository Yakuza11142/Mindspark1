name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  compile-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          cp secrets.env android/local.properties || true

      # REPAIR INLINE: Downloads packages, patches ArCore, and fixes your repo manifest file without deleting anything!
      - name: Intercept and Self-Repair System Configurations
        run: |
          flutter clean || true
          flutter pub get
          
          # 1. Patch the outdated configurations.all block in the arcore package cache
          python3 -c '
          import os
          target_path = os.path.expanduser("~/.pub-cache/hosted/pub.dev/arcore_flutter_plus-1.0.2/android/build.gradle")
          if os.path.exists(target_path):
              print("Targeting arcore_flutter_plus build script inside system cache...")
              with open(target_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              fixed_lines = []
              for line in lines:
                  if "configurations.all" in line:
                      line = line.replace("configurations.all", "// configurations.all (Disabled for Gradle 8+ Compliance)")
                  fixed_lines.append(line)
                  
              with open(target_path, "w", encoding="utf-8") as f:
                  f.writelines(fixed_lines)
              print("Arcore Gradle syntax successfully updated in system cache.")
          else:
              print("Warning: Arcore build target path not detected.")
          '

          # 2. PYTHON REGEX REPAIR ENGINE: Reads your exact broken file and rewrites only the missing prefixes!
          python3 -c '
          import os, re
          mfile = "android/app/src/main/AndroidManifest.xml"
          if os.path.exists(mfile):
              print("Reading your repository AndroidManifest.xml file...")
              with open(mfile, "r", encoding="utf-8") as f:
                  content = f.read()
              
              # Step A: Clean out any double prefixes like android:android:
              content = re.sub(r"android:android:", "android:", content)
              
              # Step B: Find naked attributes and attach the required android: prefix
              attributes = ["name", "glEsVersion", "value", "resource", "exported", "theme", "label"]
              for attr in attributes:
                  # Fix attributes missing the android: prefix
                  pattern = rf"(?<!:)\b({attr})(\s*=\s*)"
                  content = re.sub(pattern, r"android:\1\2", content)
              
              # Step C: Final cleanup pass
              content = re.sub(r"android:android:", "android:", content)
              
              with open(mfile, "w", encoding="utf-8") as f:
                  f.write(content)
              print("Your repository AndroidManifest.xml file has been successfully repaired inline!")
          else:
              print("Error: Target main manifest file path missing in project scope.")
          '

      - name: Compile Release Web Bundle
        run: flutter build web --release --base-href "/" --dart-define-from-file=secrets.env

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

      - name: Compile Fat Release APK Installer
        run: |
          flutter build apk --release \
            --dart-define-from-file=secrets.env \
            --android-skip-build-dependency-validation

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  deploy-web:
    needs: compile-and-deploy
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4}]
