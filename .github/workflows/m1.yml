name: m1-debug-pipeline
on:
  workflow_dispatch: # Forces manual execution only. No automatic loops.

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Build Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Prep Project Paths
        run: |
          mkdir -p ds/apk build/web
          [ ! -d web ] && flutter create --platforms=web . || true
          [ ! -d android ] && flutter create --platforms=android . || true

      - name: Resolve Project Dependencies
        run: flutter pub get

      - name: Execute Web Target Compilation
        run: flutter build web --release

      - name: Execute APK Target Compilation
        run: flutter build apk --release --no-tree-shake-icons --no-split-per-abi

      - name: Consolidate Compiled Output Assets
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk || true

      - name: Preserve Build Artifact Backup
        uses: actions/upload-artifact@v4
        with:
          name: compiled-mobile-and-web-apps
          path: ds/
