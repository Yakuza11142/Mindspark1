name: m1-debug-pipeline
on:
  workflow_dispatch: # Forces manual execution only. No automatic loops.

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter Build Engine
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prep Project Paths
        run: |
          mkdir -p ds/apk ds/aab ds/web
          [ ! -d web ] && flutter create --platforms=web . || true
          [ ! -d android ] && flutter create --platforms=android . || true

      - name: Resolve Project Dependencies
        run: flutter pub get

      - name: Execute Web Target Compilation
        run: flutter build web --release

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

      - name: Execute APK Target Compilation
        run: flutter build apk --release --no-tree-shake-icons

      - name: Consolidate APK Output
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk || true

      - name: Upload APK Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ds/apk/

      - name: Execute AAB Target Compilation
        run: flutter build appbundle --release

      - name: Consolidate AAB Output
        run: |
          mkdir -p ds/aab
          cp build/app/outputs/bundle/release/app-release.aab ds/aab/mind_spark.aab || true

      - name: Upload AAB Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: ds/aab/
