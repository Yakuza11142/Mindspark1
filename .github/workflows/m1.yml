name: m1-debug-pipeline
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
      JAVA_OPTS: "-Xmx4096m"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Missing Assets
        run: |
          # Create .env file
          touch .env
          echo "# Environment configuration" > .env
          echo "BUILD_MODE=release" >> .env
          
          # Create logo.png (1x1 transparent PNG)
          python3 << 'EOF'
          import struct
          import zlib
          
          # Create a minimal 1x1 transparent PNG
          png_data = bytes.fromhex(
              '89504e470d0a1a0a'  # PNG signature
              '0000000d'  # IHDR chunk size
              '49484452'  # IHDR
              '00000001000000010802000000'  # 1x1, 8-bit RGBA
              '9057c400'  # CRC
              '0000000c'  # IDAT chunk size
              '49444154'  # IDAT
              '08d3638000000200010001'  # compressed data
              '9b6c4a00'  # CRC
              '0000000049454e44ae426082'  # IEND
          )
          
          with open('logo.png', 'wb') as f:
              f.write(png_data)
          EOF
          
          ls -la .env logo.png

      - name: Fix Gradle Wrapper
        run: |
          cd android
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Downloading Gradle wrapper..."
            mkdir -p gradle/wrapper
            # Download gradle-wrapper.jar for Gradle 8.1.0
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              https://services.gradle.org/distributions/gradle-8.1-wrapper.jar 2>/dev/null || \
            wget -O gradle/wrapper/gradle-wrapper.jar \
              https://services.gradle.org/distributions/gradle-8.1-wrapper.jar
          fi
          chmod +x gradlew
          ls -la gradle/wrapper/
          cd ..

      - name: Clean Project
        run: |
          flutter clean
          rm -rf build/

      - name: Get Dependencies
        run: |
          flutter pub get
        timeout-minutes: 30

      - name: Create Output Directories
        run: mkdir -p ds/apk ds/aab ds/web

      - name: Build Web
        run: |
          echo "Starting web build..."
          flutter build web --release 2>&1 | tail -50
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            echo "✅ Web build successful"
          else
            echo "❌ Web build failed"
            exit 1
          fi
        timeout-minutes: 60
        continue-on-error: false

      - name: Upload Web Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 30

      - name: Build APK
        run: |
          echo "Starting APK build..."
          cd android
          ./gradlew assembleRelease --no-daemon -Pandroid.useAndroidX=true 2>&1 | tail -100
          cd ..
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK build successful"
          else
            echo "❌ APK build failed"
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy APK
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk
          ls -lh ds/apk/

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ds/apk/
          retention-days: 30

      - name: Build AAB
        run: |
          echo "Starting AAB build..."
          cd android
          ./gradlew bundleRelease --no-daemon -Pandroid.useAndroidX=true 2>&1 | tail -100
          cd ..
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "✅ AAB build successful"
          else
            echo "❌ AAB build failed"
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy AAB
        run: |
          mkdir -p ds/aab
          cp build/app/outputs/bundle/release/app-release.aab ds/aab/mind_spark.aab
          ls -lh ds/aab/

      - name: Upload AAB Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: ds/aab/
          retention-days: 30

      - name: Final Report
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════╗"
          echo "║     BUILD COMPLETION REPORT        ║"
          echo "╚════════════════════════════════════╝"
          echo ""
          
          echo "📱 WEB BUILD:"
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            SIZE=$(du -sh build/web | cut -f1)
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "📦 APK BUILD:"
          if [ -f "ds/apk/mind_spark.apk" ]; then
            SIZE=$(ls -lh ds/apk/mind_spark.apk | awk '{print $5}')
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "📋 AAB BUILD:"
          if [ -f "ds/aab/mind_spark.aab" ]; then
            SIZE=$(ls -lh ds/aab/mind_spark.aab | awk '{print $5}')
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "════════════════════════════════════"
          
          if [ -d "build/web" ] && [ -f "ds/apk/mind_spark.apk" ] && [ -f "ds/aab/mind_spark.aab" ]; then
            echo "🎉 ALL BUILDS SUCCESSFUL!"
            exit 0
          else
            echo "⚠️  Some builds failed"
            exit 1
          fi
