name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  build_web:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Keys
        run: |
          mkdir -p assets && touch .env assets/icon_launcher.png
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
      - name: Compile Web
        run: |
          flutter clean
          flutter pub get
          sed -i 's|<head>|<head><base href="/|' web/index.html || true
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env
          if [ -d "build/web" ]; then cp build/web/index.html build/web/404.html; else exit 1; fi
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

  build_apk:
    name: Build Mobile APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Keys
        run: |
          mkdir -p assets && touch .env assets/icon_launcher.png
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
      - name: Setup Clear Project Layout
        run: |
          # 📲 CLEAN INITIALIZATION: Let Flutter build the exact modern native structures it needs
          rm -rf android/ || true
          flutter create . --platforms=android --android-language java
          
          # Inject production signing keys and environment variables cleanly into local.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          
          # Force adjust AndroidManifest permissions safely without breaking the source trees
          M="android/app/src/main/AndroidManifest.xml"
          if [ -f "$M" ]; then
            sed -i '/<uses-permission/d' "$M"
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"\/>\n    <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"\/>\n    <uses-permission android:name="android.permission.CAMERA"\/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"\/>\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"\/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" \/>\n    <uses-permission android:name="android.permission.WAKE_LOCK"\/>\n    <uses-permission android:name="com.google.android.gms.permission.AD_ID"\/>\n    <uses-feature android:name="android.hardware.camera.ar" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera" android:required="true"\/>\n    <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"\/>' "$M"
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' "$M"
          fi
          
          # Dynamically force multidex inside your build configuration to protect against the 64k method limit
          sed -i 's/minSdkVersion.*/minSdkVersion 24\n        multiDexEnabled true/g' android/app/build.gradle
          
          # Inject the production signing configurations securely into the default release channel template
          sed -i 's/buildTypes {/signingConfigs { release { keyAlias keystoreProperties["keyAlias"] \n keyPassword keystoreProperties["keyPassword"] \n storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null \n storePassword keystoreProperties["storePassword"] } }\n    buildTypes {/g' android/app/build.gradle
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/g' android/app/build.gradle
          
          # Map environment pointers safely
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Compile APK via Flutter Native Assembly
        run: |
          flutter pub get
          flutter precache --android
          flutter build apk --release --split-per-abi --no-shrink --android-skip-build-dependency-validation --dart-define-from-file=secrets.env --pub --build-number=1

      - uses: actions/upload-artifact@v4
        with:
          name: "native-apk"
          path: build/app/outputs/flutter-apk/*.apk

  deploy_pages:
    name: Publish Web App
    needs: build_web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.deployment.outputs.page_url }}"}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
