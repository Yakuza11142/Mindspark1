name: m1-debug-pipeline
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m"
      JAVA_OPTS: "-Xmx4096m"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create Missing Environment Variables
        run: |
          touch .env
          echo "# Environment configuration" > .env
          echo "BUILD_MODE=release" >> .env
          ls -la .env

      - name: Verify Tools
        run: |
          flutter --version
          java -version

      - name: Clean Project
        run: |
          flutter clean
          rm -rf build/

      - name: Get Dependencies
        run: |
          flutter pub get
        timeout-minutes: 30

      # 🛠️ AUTOMATION ENGINE STEP: Finds your asset file, resizes it, and renames it to launcher_icon
      - name: Auto Resize and Rename Launcher Icons
        run: |
          echo "Locating asset graphic, resizing, and matching Android requirements..."
          dart run flutter_launcher_icons
        timeout-minutes: 5

      - name: Create Output Directories
        run: mkdir -p ds/apk ds/aab ds/web

      - name: Build Web
        run: |
          echo "Starting web build..."
          flutter build web --release 2>&1 | tail -50
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            echo "✅ Web build successful"
          else
            echo "❌ Web build failed"
            exit 1
          fi
        timeout-minutes: 60
        continue-on-error: false

      - name: Upload Web Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 30

      - name: Build APK (Flutter)
        run: |
          echo "Starting APK build..."
          flutter build apk --release 2>&1 | tail -100
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "✅ APK build successful"
          else
            echo "❌ APK build failed"
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy APK
        run: |
          mkdir -p ds/apk
          cp build/app/outputs/flutter-apk/app-release.apk ds/apk/mind_spark.apk
          ls -lh ds/apk/

      - name: Upload APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: ds/apk/
          retention-days: 30

      - name: Build AAB (Flutter)
        run: |
          echo "Starting AAB build..."
          flutter build appbundle --release 2>&1 | tail -100
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            echo "✅ AAB build successful"
          else
            echo "❌ AAB build failed"
            exit 1
          fi
        timeout-minutes: 90
        continue-on-error: false

      - name: Copy AAB
        run: |
          mkdir -p ds/aab
          cp build/app/outputs/bundle/release/app-release.aab ds/aab/mind_spark.aab
          ls -lh ds/aab/

      - name: Upload AAB Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aab-build
          path: ds/aab/
          retention-days: 30

      - name: Final Report
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════╗"
          echo "║     BUILD COMPLETION REPORT        ║"
          echo "╚════════════════════════════════════╝"
          echo ""
          
          echo "📱 WEB BUILD:"
          if [ -d "build/web" ] && [ "$(ls -A build/web)" ]; then
            SIZE=$(du -sh build/web | cut -f1)
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "📦 APK BUILD:"
          if [ -f "ds/apk/mind_spark.apk" ]; then
            SIZE=$(ls -lh ds/apk/mind_spark.apk | awk '{print $5}')
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "📋 AAB BUILD:"
          if [ -f "ds/aab/mind_spark.aab" ]; then
            SIZE=$(ls -lh ds/aab/mind_spark.aab | awk '{print $5}')
            echo "   ✅ SUCCESS - Size: $SIZE"
          else
            echo "   ❌ FAILED"
          fi
          
          echo ""
          echo "════════════════════════════════════"
          
          if [ -d "build/web" ] && [ -f "ds/apk/mind_spark.apk" ] && [ -f "ds/aab/mind_spark.aab" ]; then
            echo "🎉 ALL BUILDS SUCCESSFUL!"
            exit 0
          else
            echo "⚠️  Some builds failed"
            exit 1
          fi
