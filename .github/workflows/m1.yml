name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "17"}
      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}
      - name: Create Safe Configuration Keys
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"
          OPENAI_KEY: "${{ secrets.OPENAI_KEY }}"
          GROQ_API_KEY: "${{ secrets.GROQ_API_KEY }}"
          VERTEX_API_KEY: "${{ secrets.VERTEX_API_KEY }}"
          HEYGEN_KEY: "${{ secrets.HEYGEN_KEY }}"
          RUNWAYML_API_SECRET: "${{ secrets.RUNWAYML_API_SECRET }}"
          TRIPO_API_KEY: "${{ secrets.TRIPO_API_KEY }}"
          PEXELS_API_KEY: "${{ secrets.PEXELS_API_KEY }}"
          MTN_API_KEY: "${{ secrets.MTN_API_KEY }}"
          ELEVEN_LAB_API_KEY: "${{ secrets.ELEVEN_LAB_API_KEY }}"
        run: |
          python3 -c '
import json, os
s = {}
for k in ["SUPABASE_URL", "SUPABASE_ANON_KEY", "GEMINI_API_KEY", "OPENAI_KEY", "GROQ_API_KEY", "VERTEX_API_KEY", "HEYGEN_KEY", "RUNWAYML_API_SECRET", "TRIPO_API_KEY", "PEXELS_API_KEY", "MTN_API_KEY", "ELEVEN_LAB_API_KEY"]:
    s[k] = os.environ.get(k, "").strip()
with open("secrets.json", "w", encoding="utf-8") as f:
    json.dump(s, f)
          '
          mkdir -p android && echo "storePassword=\nkeyPassword=\nkeyAlias=\nstoreFile=" > android/local.properties
      - name: Prep
        run: |
          sudo chmod -R 777 . || true
          find . -name "settings.gradle" -type f -exec sed -i "s/FAIL_ON_PROJECT_REPOS/PREFER_PROJECT/g" {} + || true
          flutter clean || true
          flutter pub get
      - name: Web
        run: |
          flutter build web --release --base-href "./" --dart-define-from-file=secrets.json
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
      - name: Android
        run: |
          flutter build apk --release --dart-define-from-file=secrets.json --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: build/app/outputs/flutter-apk/app-release.apk}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
