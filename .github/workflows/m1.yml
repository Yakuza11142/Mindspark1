name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  # =========================================================================
  # TARGET 1 & 2: NATIVE ANDROID (APK & APPBUNDLE)
  # =========================================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix: {target: [apk, appbundle]}
      fail-fast: false
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Create Workspace Files
        run: |
          mkdir -p assets web lib android/app/src/main/java/io/flutter/plugins
          touch .env assets/icon_launcher.png
          
          # TRICK: Direct injection using Dart raw string format 'r' stops control symbol breaks
          cat << 'EOF' > lib/secrets.dart
          class Secrets {
            static const String supabaseUrl = r"${{ secrets.SUPABASE_URL }}";
            static const String supabaseAnonKey = r"${{ secrets.SUPABASE_ANON_KEY }}";
            static const String geminiApiKey = r"${{ secrets.GEMINI_API_KEY }}";
            static const String openaiKey = r"${{ secrets.OPENAI_KEY }}";
            static const String groqApiKey = r"${{ secrets.GROQ_API_KEY }}";
            static const String vertexApiKey = r"${{ secrets.VERTEX_API_KEY }}";
            static const String heygenKey = r"${{ secrets.HEYGEN_KEY }}";
            static const String runwaymlApiSecret = r"${{ secrets.RUNWAYML_API_SECRET }}";
            static const String tripoApiKey = r"${{ secrets.TRIPO_API_KEY }}";
            static const String pexelsApiKey = r"${{ secrets.PEXELS_API_KEY }}";
            static const String mtnApiKey = r"${{ secrets.MTN_API_KEY }}";
            static const String elevenLabApiKey = r"${{ secrets.ELEVEN_LAB_API_KEY }}";
          }
          EOF

          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'secrets.dart';
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(MaterialApp(
              theme: ThemeData.dark(),
              debugShowCheckedModeBanner: false,
              home: Scaffold(
                body: Center(child: Text('MindSpark Hologram Engine Online')),
              ),
            ));
          }
          EOF

      - name: Clean and Fetch Cache
        run: |
          flutter pub get
          flutter precache --android
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          
      # KEYSTORE STATUS: Restored here to decode your signing files dynamically
      - name: Load Android Signatures
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          
      - name: Build Android App
        run: |
          flutter build ${{ matrix.target }} --release --android-skip-build-dependency-validation

      - name: Save Build Results
        uses: actions/upload-artifact@v4
        with:
          name: holomatics-native-${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk

  # =========================================================================
  # TARGET 3 & 4: WEB COMPILE & LIVE DEPLOYMENT
  # =========================================================================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TRICK: Put Flutter Action first so the terminal always finds the "flutter" command
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Create Web Workspace
        run: |
          mkdir -p assets web lib
          touch .env assets/icon_launcher.png
          
          flutter create . --platforms=web
          
          # TRICK: Same raw string 'r' injection format applied here to prevent Web compilation crashes
          cat << 'EOF' > lib/secrets.dart
          class Secrets {
            static const String supabaseUrl = r"${{ secrets.SUPABASE_URL }}";
            static const String supabaseAnonKey = r"${{ secrets.SUPABASE_ANON_KEY }}";
            static const String geminiApiKey = r"${{ secrets.SUPABASE_ANON_KEY }}";
            static const String openaiKey = r"${{ secrets.OPENAI_KEY }}";
            static const String groqApiKey = r"${{ secrets.GROQ_API_KEY }}";
            static const String vertexApiKey = r"${{ secrets.VERTEX_API_KEY }}";
            static const String heygenKey = r"${{ secrets.HEYGEN_KEY }}";
            static const String runwaymlApiSecret = r"${{ secrets.RUNWAYML_API_SECRET }}";
            static const String tripoApiKey = r"${{ secrets.TRIPO_API_KEY }}";
            static const String pexelsApiKey = r"${{ secrets.PEXELS_API_KEY }}";
            static const String mtnApiKey = r"${{ secrets.MTN_API_KEY }}";
            static const String elevenLabApiKey = r"${{ secrets.ELEVEN_LAB_API_KEY }}";
          }
          EOF

          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'secrets.dart';
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(MaterialApp(
              theme: ThemeData.dark(),
              debugShowCheckedModeBanner: false,
              home: Scaffold(
                body: Center(child: Text('MindSpark Hologram Engine Online')),
              ),
            ));
          }
          EOF

      - name: Build Web App
        run: |
          flutter pub get
          flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart

      - name: Save Web Files
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
