name: m1-debug-pipeline
on: [workflow_dispatch]

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  compile-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        target: [web, apk, appbundle] 
      fail-fast: false 

    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
      JAVA_OPTS: "-Xmx4096m"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      # =========================================================================
      # THE ENTERPRISE FIX: ISOLATE CREDENTIAL LAYERS FROM COMPILER MATRIX
      # =========================================================================
      - name: Inject Project Infrastructure Core & Clean JSON Target
        run: |
          mkdir -p assets
          touch assets/icon_launcher.png
          
          # 1. Generate the local asset config tracking file
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          
          # 2. Map ONLY your application text secrets directly into a safe flat JSON dictionary.
          # This strips out bad formatting properties and isolates keystore variables.
          cat <<EOF > secrets.json
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
            "OPENAI_KEY": "${{ secrets.OPENAI_KEY }}",
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "VERTEX_API_KEY": "${{ secrets.VERTEX_API_KEY }}",
            "HEYGEN_KEY": "${{ secrets.HEYGEN_KEY }}",
            "RUNWAYML_API_SECRET": "${{ secrets.RUNWAYML_API_SECRET }}",
            "TRIPO_API_KEY": "${{ secrets.TRIPO_API_KEY }}",
            "PEXELS_API_KEY": "${{ secrets.PEXELS_API_KEY }}",
            "MTN_API_KEY": "${{ secrets.MTN_API_KEY }}",
            "ELEVEN_LAB_API_KEY": "${{ secrets.ELEVEN_LAB_API_KEY }}"
          }
          EOF

      - name: Fetch Dependencies & Compile Assets
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      # ---------------------------------------------------------------------
      # PARALLEL COMPILATION TASKS (SHARDED MACHINE RUNNERS)
      # ---------------------------------------------------------------------
      - name: Compile Web Target
        if: matrix.target == 'web'
        run: |
          flutter build web --release --wasm --dart-define-from-file=secrets.json
          sed -i 's|<base href="/">|<base href="/'"${{ github.event.repository.name }}"'/|g' build/web/index.html

      - name: Compile APK Target
        if: matrix.target == 'apk'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          flutter build apk --release --android-skip-build-dependency-validation --split-per-abi --dart-define-from-file=secrets.json

      - name: Compile AAB Target
        if: matrix.target == 'appbundle'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          flutter build appbundle --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.json

      # ---------------------------------------------------------------------
      # PIPELINE OUTPUT DELIVERY
      # ---------------------------------------------------------------------
      - name: Upload Web To GitHub Pages
        if: matrix.target == 'web'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy Web Frame Live
        if: matrix.target == 'web'
        uses: actions/deploy-pages@v4

      - name: Deliver Native Binaries
        if: matrix.target != 'web'
        uses: actions/upload-artifact@v4
        with: 
          name: holomatics-${{ matrix.target }}-build
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
