name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  # =========================================================================
  # TARGET 1 & 2: GUARANTEED NATIVE ANDROID ENGINE (APK & AAB MANIFEST)
  # =========================================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix: {target: [apk, appbundle]}
      fail-fast: false
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v4

      - name: Hardened Asset Layout Clean Prep
        run: |
          mkdir -p assets web lib android/app/src/main/java/io/flutter/plugins
          touch .env assets/icon_launcher.png
          
          cat << 'EOF' > lib/secrets.dart
          class Secrets {
            static const String supabaseUrl = String.fromEnvironment('SUPABASE_URL');
            static const String supabaseAnonKey = String.fromEnvironment('SUPABASE_ANON_KEY');
            static const String geminiApiKey = String.fromEnvironment('GEMINI_API_KEY');
            static const String openaiKey = String.fromEnvironment('OPENAI_KEY');
            static const String groqApiKey = String.fromEnvironment('GROQ_API_KEY');
            static const String vertexApiKey = String.fromEnvironment('VERTEX_API_KEY');
            static const String heygenKey = String.fromEnvironment('HEYGEN_KEY');
            static const String runwaymlApiSecret = String.fromEnvironment('RUNWAYML_API_SECRET');
            static const String tripoApiKey = String.fromEnvironment('TRIPO_API_KEY');
            static const String pexelsApiKey = String.fromEnvironment('PEXELS_API_KEY');
            static const String mtnApiKey = String.fromEnvironment('MTN_API_KEY');
            static const String elevenLabApiKey = String.fromEnvironment('ELEVEN_LAB_API_KEY');
          }
          EOF

          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'secrets.dart';
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(MaterialApp(
              theme: ThemeData.dark(),
              debugShowCheckedModeBanner: false,
              home: Scaffold(
                body: Center(
                  child: Text('MindSpark Hologram Engine Online'),
                ),
              ),
            ));
          }
          EOF

      - name: Create Runtime Environment Map
        run: |
          echo '{
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
            "OPENAI_KEY": "${{ secrets.OPENAI_KEY }}",
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "VERTEX_API_KEY": "${{ secrets.VERTEX_API_KEY }}",
            "HEYGEN_KEY": "${{ secrets.HEYGEN_KEY }}",
            "RUNWAYML_API_SECRET": "${{ secrets.RUNWAYML_API_SECRET }}",
            "TRIPO_API_KEY": "${{ secrets.TRIPO_API_KEY }}",
            "PEXELS_API_KEY": "${{ secrets.PEXELS_API_KEY }}",
            "MTN_API_KEY": "${{ secrets.MTN_API_KEY }}",
            "ELEVEN_LAB_API_KEY": "${{ secrets.ELEVEN_LAB_API_KEY }}"
          }' > secrets.json

      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Pull Dependency Artifact Blocks
        run: |
          flutter pub get
          flutter precache --android
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          
      - name: Auto-Heal Signing Keystore Credentials
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          
      - name: Force Compile Android Binary
        run: |
          flutter build ${{ matrix.target }} --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.json

      - name: Deliver Verified Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: holomatics-native-${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk

  # =========================================================================
  # TARGET 3 & 4: GUARANTEED WEB ENGINE COMPILE & AUTOMATED LIVE DEPLOYMENT
  # =========================================================================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hardened Asset Layout Clean Prep (Web)
        run: |
          mkdir -p assets web lib
          touch .env assets/icon_launcher.png
          
          flutter create . --platforms=web
          
          cat << 'EOF' > lib/secrets.dart
          class Secrets {
            static const String supabaseUrl = String.fromEnvironment('SUPABASE_URL');
            static const String supabaseAnonKey = String.fromEnvironment('SUPABASE_ANON_KEY');
            static const String geminiApiKey = String.fromEnvironment('GEMINI_API_KEY');
            static const String openaiKey = String.fromEnvironment('OPENAI_KEY');
            static const String groqApiKey = String.fromEnvironment('GROQ_API_KEY');
            static const String vertexApiKey = String.fromEnvironment('VERTEX_API_KEY');
            static const String heygenKey = String.fromEnvironment('HEYGEN_KEY');
            static const String runwaymlApiSecret = String.fromEnvironment('RUNWAYML_API_SECRET');
            static const String tripoApiKey = String.fromEnvironment('TRIPO_API_KEY');
            static const String pexelsApiKey = String.fromEnvironment('PEXELS_API_KEY');
            static const String mtnApiKey = String.fromEnvironment('MTN_API_KEY');
            static const String elevenLabApiKey = String.fromEnvironment('ELEVEN_LAB_API_KEY');
          }
          EOF

          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'secrets.dart';
          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(MaterialApp(
              theme: ThemeData.dark(),
              debugShowCheckedModeBanner: false,
              home: Scaffold(
                body: Center(
                  child: Text('MindSpark Hologram Engine Online'),
                ),
              ),
            ));
          }
          EOF

      - name: Create Runtime Environment Map (Web)
        run: |
          echo '{
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}",
            "OPENAI_KEY": "${{ secrets.OPENAI_KEY }}",
            "GROQ_API_KEY": "${{ secrets.GROQ_API_KEY }}",
            "VERTEX_API_KEY": "${{ secrets.VERTEX_API_KEY }}",
            "HEYGEN_KEY": "${{ secrets.HEYGEN_KEY }}",
            "RUNWAYML_API_SECRET": "${{ secrets.RUNWAYML_API_SECRET }}",
            "TRIPO_API_KEY": "${{ secrets.TRIPO_API_KEY }}",
            "PEXELS_API_KEY": "${{ secrets.PEXELS_API_KEY }}",
            "MTN_API_KEY": "${{ secrets.MTN_API_KEY }}",
            "ELEVEN_LAB_API_KEY": "${{ secrets.ELEVEN_LAB_API_KEY }}"
          }' > secrets.json

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Force Compile Web Target
        run: |
          flutter pub get
          flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart --dart-define-from-file=secrets.json

      - name: Upload Web Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
