name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

defaults:
  run:
    shell: bash

jobs:
  compile-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java Development Kit
        uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with: {channel: stable, cache: false}

      - name: Configure Production Environment Keys
        run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          cp secrets.env android/local.properties || true

      # THE ISOLATED OVERWRITE ENGINE: Erases only the temporary manifest copy inside the virtual machine 
      # memory workspace and swaps it with an error-free template layout before Gradle compiles.
      - name: Purge Temporary Workspace Manifest and Inject Pristine Template
        run: |
          flutter clean || true
          flutter pub get
          
          # 1. Patch the outdated configurations.all block in the arcore package cache
          python3 -c '
          import os
          target_path = os.path.expanduser("~/.pub-cache/hosted/pub.dev/arcore_flutter_plus-1.0.2/android/build.gradle")
          if os.path.exists(target_path):
              print("Targeting arcore_flutter_plus build script inside system cache...")
              with open(target_path, "r", encoding="utf-8") as f:
                  lines = f.readlines()
              
              fixed_lines = []
              for line in lines:
                  if "configurations.all" in line:
                      line = line.replace("configurations.all", "// configurations.all (Disabled for Gradle 8+ Compliance)")
                  fixed_lines.append(line)
                  
              with open(target_path, "w", encoding="utf-8") as f:
                  f.writelines(fixed_lines)
              print("Arcore Gradle syntax successfully updated in system cache.")
          '

          # 2. RUNTIME OVERWRITE BLOCK: Wipes out the virtual workspace copy of your manifest 
          # and replaces it with a clean production template so your repository files remain safe.
          python3 -c '
          import os
          mfile = "android/app/src/main/AndroidManifest.xml"
          
          pristine_xml = """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://android.com"
              package="com.example.mindspark1">
              
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              
              <application
                  android:label="Mindspark"
                  android:name="androidx.multidex.MultiDexApplication"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true"
                  android:largeHeap="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>"""
          
          if os.path.exists(mfile):
              os.remove(mfile) # Deletes only the temporary runner machine copy
              
          os.makedirs(os.path.dirname(mfile), exist_ok=True)
          with open(mfile, "w", encoding="utf-8") as f:
              f.write(pristine_xml.strip())
          print("Virtual runner workspace locked down with clean compilation layout.")
          '

      - name: Compile Release Web Bundle
        run: flutter build web --release --base-href "/" --dart-define-from-file=secrets.env

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

      - name: Compile Fat Release APK Installer
        run: |
          flutter build apk --release \
            --dart-define-from-file=secrets.env \
            --android-skip-build-dependency-validation

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  deploy-web:
    needs: compile-and-deploy
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4}]
