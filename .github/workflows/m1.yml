name: m1-debug-pipeline
on: [workflow_dispatch]

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  # =========================================================================
  # RUNNER 1: STABLE NATIVE ANDROID ENGINE (APK & AAB)
  # =========================================================================
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        target: [apk, appbundle]
      fail-fast: false 
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
      JAVA_OPTS: "-Xmx4096m"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Inject Secrets & Configs
        run: |
          mkdir -p assets
          touch assets/icon_launcher.png
          cat <<EOF > secrets.json
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }
          EOF
      - name: Build Assets
        run: |
          flutter pub get
          dart run flutter_launcher_icons
      - name: Auto-Heal Keystore Credentials
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
      - name: Compile Secure Android Binary
        run: flutter build ${{ matrix.target }} --release --dart-define-from-file=secrets.json
      - name: Deliver Native Artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: holomatics-native-${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk

  # =========================================================================
  # RUNNER 2: PRODUCTION WEB ENGINE (HTML CANVAS RENDERING)
  # =========================================================================
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Inject Secrets
        run: |
          cat <<EOF > secrets.json
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }
          EOF
      - name: Install Project Packages
        run: flutter pub get
      - name: Compile Production Web Static Files
        # REPAIRED: Injected --base-href for GitHub Actions deployment
        run: flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart --dart-define-from-file=secrets.json
      - name: Upload Web Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # =========================================================================
  # RUNNER 3: AUTOMATED PRODUCTION DISTRIBUTION RELEASE GATEWAY
  # =========================================================================
  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Live Pages Infrastructure
        uses: actions/deploy-pages@v4
