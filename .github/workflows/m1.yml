name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          flutter clean && flutter pub get
          sed -i 's|<head>|<head><base href="/|' web/index.html || true
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define-from-file=secrets.env
          cp build/web/index.html build/web/404.html || true
        continue-on-error: true
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
        continue-on-error: true
  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.deployment.outputs.page_url }}"}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: |
          mkdir -p assets && touch .env
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          rm -rf android/ || true
          flutter create . --platforms=android --android-language kotlin --project-name=mindspark1
          rm -f android/*.kts android/app/*.kts || true
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          echo -e "sdk.dir=$ANDROID_HOME\nflutter.sdk=$FLUTTER_ROOT" > android/local.properties
          cat << 'EOF' > android/gradle.properties
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -XX:+UseParallelGC
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.daemon=false
          android.nonTransitiveRClass=false
          EOF
          cat << 'EOF' > android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-all.zip
          EOF
          cat << 'EOF' > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { 
                  classpath 'com.android.tools.build:gradle:8.7.3'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.0" 
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
              afterEvaluate { p -> if (p.hasProperty('android')) { p.android { compileSdk 35 } } }
          }
          tasks.register("clean", Delete) { delete rootProject.layout.buildDirectory }
          EOF
          cat << 'EOF' > android/app/build.gradle
          plugins { id "com.android.application"; id "dev.flutter.flutter-gradle-plugin" }
          def kp = new Properties()
          def kpf = rootProject.file('key.properties')
          if (kpf.exists()) { kpf.withReader('UTF-8') { reader -> kp.load(reader) } }
          android {
              namespace "com.example.mindspark1"
              compileSdk 35
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              signingConfigs { release { keyAlias kp['keyAlias']; keyPassword kp['keyPassword']; storeFile kp['storeFile'] ? file(kp['storeFile']) : null; storePassword kp['storePassword'] } }
              defaultConfig { applicationId "com.example.mindspark1"; minSdk 24; targetSdk 35; multiDexEnabled true }
              buildTypes { release { signingConfig signingConfigs.release; minifyEnabled false; shrinkResources false } }
          }
          dependencies {
              implementation "androidx.annotation:annotation:1.7.1"
              implementation "androidx.appcompat:androidx.appcompat:1.7.0"
          }
          flutter { source '../..' }
          EOF
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def sP = {
                  def p = new Properties(); def file = new File(settingsDir, "local.properties")
                  if (file.exists()) { file.withReader("UTF-8") { r -> p.load(r) } }
                  return p.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
              }()
              includeBuild("$sP/packages/flutter_tools/gradle")
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins { id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false; id "com.android.application" version "8.7.3" apply false; id "org.jetbrains.kotlin.android" version "2.1.0" apply false }
          rootProject.name = "mindspark1"
          include ':app'
          EOF
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://android.com">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>
              <uses-permission android:name="android.permission.CHANGE_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS"/>
              <uses-permission android:name="android.permission.WAKE_LOCK"/>
              <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>
              <uses-feature android:name="android.hardware.camera.ar" android:required="true"/>
              <uses-feature android:name="android.hardware.camera" android:required="true"/>
              <uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>
              <application android:label="mindspark1" android:name="${applicationName}" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          EOF
          flutter pub get && flutter precache --android && flutter pub run flutter_launcher_icons
          G_FILE="$FLUTTER_ROOT/packages/flutter_tools/lib/src/android/gradle.dart"
          if [ -f "$G_FILE" ]; then
            sed -i 's|import androidx.annotation.NonNull;|import androidx.annotation.NonNull;\nimport android.util.Log;|g' "$G_FILE" || true
            sed -i 's|class GeneratedPluginRegistrant|import android.util.Log;\nclass GeneratedPluginRegistrant|g' "$G_FILE" || true
          fi
          flutter build apk --release --no-shrink --android-skip-build-dependency-validation --dart-define-from-file=secrets.env --pub --build-number=1
      - uses: actions/upload-artifact@v4
        with: {name: release-apk, path: build/app/outputs/flutter-apk/app-release.apk}
