name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env: {GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m", JAVA_OPTS: "-Xmx4096m"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - name: Setup and Clean
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi assets
          touch android/app/src/main/res/mipmap-mdpi/launcher_icon.png
          touch "assets/Screenshot_20260708_215841_Chrome....jpg"
          flutter clean && flutter pub get
      - name: Build Web
        run: flutter build web --release --wasm --web-renderer canvaskit --base-href="/${{ github.event.repository.name }}/"
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
      - uses: actions/deploy-pages@v4
      - name: Build Android
        run: |
          flutter build apk --release --android-skip-build-dependency-validation
          flutter build appbundle --release --android-skip-build-dependency-validation
      - uses: actions/upload-artifact@v4
        with: {name: native-builds, path: 'build/app/outputs/bundle/release/*.aab'}
