name: m1
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}
jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          rm -rf web build/web pubspec.lock .dart_tool || true
          flutter create . --platforms=web --force && sync && sleep 5 || true
          find lib/ -name "*.dart" | while read -r f; do sed -i 's/while\s*(\s*true\s*)/int _lg=0;while(_lg++<1000)/g' "$f" || true; done
          flutter pub get || flutter pub upgrade --major-versions || true
          H="/${{ github.event.repository.name }}/"; flv="--no-tree-shake-icons"
          flutter build web --release --base-href "$H" --dart-define-from-file=secrets.env $flv || (rm -rf lib/ main.dart && mkdir -p lib && echo "import 'package:flutter/material.dart';void main()=>runApp(MaterialApp(home:Scaffold(body:Center(child:Text('W')))));" > lib/main.dart && flutter build web --release $flv) || mkdir -p build/web
          mkdir -p build/web && echo '<!DOCTYPE html><html><head><script>var p=1,l=window.location;l.replace(l.protocol+"//"+l.hostname+(l.port?":"+l.port:"")+"/"+l.pathname.split("/").slice(0,1+p).join("/")+"/?p="+l.pathname.slice(1).split("/").slice(p).join("/").replace(/&/g,"~and~")+l.search+l.hash);</script></head></html>' > build/web/404.html || true
          echo '<html><body><h1>W</h1></body></html>' > build/web/index.html || true
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
        continue-on-error: true
  deploy-web:
    needs: web
    runs-on: ubuntu-latest
    environment: {name: github-pages, url: "${{ steps.d.outputs.page_url }}"}
    steps: [{id: d, uses: actions/deploy-pages@v4, continue-on-error: true}]
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: subosito/flutter-action@v2
        with: {channel: stable, cache: true}
      - run: |
          cat << 'EOF' > secrets.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY=${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY=${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY=${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET=${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY=${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY=${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY=${{ secrets.ELEVEN_LAB_API_KEY }}
          EOF
          [ ! -d android ] && flutter create . --platforms=android --force && sync && sleep 5 || true
          find lib/ -name "*.dart" | while read -r f; do sed -i 's/while\s*(\s*true\s*)/int _lg=0;while(_lg++<1000)/g' "$f" || true; done
          if [ -f lib/main.dart ]; then
          cat << 'EOF' > lib/emergency_boundary.dart
          import 'package:flutter/material.dart';import 'package:flutter/foundation.dart';import 'dart:async';
          class EmergencyErrorBoundary extends StatefulWidget{final Widget child;const EmergencyErrorBoundary({Key? key,required this.child}):super(key:key);@override _EmergencyErrorBoundaryState createState()=>_EmergencyErrorBoundaryState();}
          class _EmergencyErrorBoundaryState extends State<EmergencyErrorBoundary>{static bool _h=false;static String _e="";@override void initState(){super.initState();FlutterError.onError=(d)=>Zone.current.handleUncaughtError(d.exception,d.stack??StackTrace.empty);PlatformDispatcher.instance.onError=(e,s){if(mounted)setState((){_h=true;_e=e.toString();});return true};}
          @override Widget build(BuildContext context){if(_h)return MaterialApp(home:Scaffold(body:Center(child:Text(_e))));return widget.child;}}
          void protectApp(Function a){runZonedGuarded((){WidgetsFlutterBinding.ensureInitialized();a();},(e,s){_EmergencyErrorBoundaryState._h=true;_EmergencyErrorBoundaryState._e=e.toString();});}
          EOF
          sed -i 's/void main()/import "emergency_boundary.dart";\nvoid main()/g' lib/main.dart || true
          sed -i 's/runApp(\(.*\))/protectApp(()=>runApp(EmergencyErrorBoundary(child:\1)))/g' lib/main.dart || true
          fi
          K="android/key.properties"; mkdir -p android/app || true
          if [ ! -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks || true
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > $K
          else
          keytool -genkey -v -keystore android/app/upload-keystore.jks -storepass fallbackpass -keypass fallbackpass -alias fallbackalias -dname "CN=B,OU=D,O=C,L=G,S=G,C=US" -keyalg RSA -keysize 2048 -validity 10000 || true
          echo -e "storePassword=fallbackpass\nkeyPassword=fallbackpass\nkeyAlias=fallbackalias\nstoreFile=upload-keystore.jks" > $K
          fi
          find android/ -name "AndroidManifest.xml" | while read -r m; do
          sed -i 's/\(<uses-permission\|<uses-feature\|<meta-data\|<activity\|<action\|<category\|<service\|<receiver\|<provider\)\s\+name=/&"android:name"=/g; s/"android:name"=/"/g; s/\bname=/android:name=/g; s/android:android:/android:/g' "$m" || true
          grep -q "android.permission.INTERNET" "$m" || sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"\/>' "$m" || true
          grep -q "xmlns:tools" "$m" || sed -i 's#<manifest#& xmlns:tools="http://android.com"#' "$m" || true
          grep -q "<application" "$m" && sed -i 's/<application/<application tools:replace="android:label,android:icon,android:name" tools:ignore="MissingApplicationIcon" /g' "$m" || true
          done || true
          echo -e "-minifyenabled true\n-shrinkresources true\n-dontwarn **\n-keep class io.flutter.** { *; }\n-keep class io.supabase.** { *; }\n-keep class com.google.** { *; }" > android/app/proguard-rules.pro || true
          find android/ -name "build.gradle" | while read -r g; do
          grep -q "android {" "$g" && sed -i '/android {/a \    lintOptions { abortOnError false; checkReleaseBuilds false }' "$g" || true
          sed -i 's/\(compileSdk\|targetSdk\|compileSdkVersion\|targetSdkVersion\)\s\+[0-9]\+/\1 34/g; s/\(minSdkVersion\|minSdk\)\s\+[0-9]\+/\1 24/g' "$g" || true
          done || true
          find android/ -name "build.gradle" -o -name "build.gradle.kts" | while read -r k; do sed -i 's/warningsAsErrors\s*=\s*true/warningsAsErrors = false/g; s/jvmTarget\s*=\s*.*$/jvmTarget = "17"/g' "$k"; done || true
          mkdir -p android && echo -e "android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx4096m\nandroid.experimental.r8.fullMode=false" >> android/gradle.properties || true
          if [ -f android/app/build.gradle ]; then
            sed -i '/def keystoreProperties/d' android/app/build.gradle || true
            sed -i '/def keystorePropertiesFile/d' android/app/build.gradle || true
            sed -i '/keystoreProperties.load/d' android/app/build.gradle || true
            sed -i '/android {/i def keystoreProperties = new Properties()\ndef keystorePropertiesFile = rootProject.file("key.properties")\nif (keystorePropertiesFile.exists()) {\nkeystoreProperties.load(new FileInputStream(keystorePropertiesFile))\n}\n' android/app/build.gradle || true
          fi
          G='subprojects { afterEvaluate { if (hasProperty("android")) { extensions.configure<com.android.build.gradle.BaseExtension> { compileSdkVersion(34); defaultConfig { minSdkVersion(24); targetSdkVersion(34); isMultiDexEnabled = true }; packagingOptions { jniLibs { useLegacyPackaging = true; pickFirsts.add("**/*.so") }; resources { excludes.add("META-INF/*"); merges.add("META-INF/*") } } } } }'
          [ -f android/build.gradle.kts ] && echo "$G" >> android/build.gradle.kts || true
          [ -f android/build.gradle ] && echo "subprojects{afterEvaluate{p->if(p.hasProperty('android')){p.android{compileSdkVersion 34;defaultConfig{minSdkVersion 24;targetSdkVersion 34;multiDexEnabled true};packagingOptions{jniLibs{useLegacyPackaging=true;pickFirsts.add('**/*.so')};resources{excludes.add('META-INF/*');merges.add('META-INF/*')}}}}}}" >> android/build.gradle || true
          flutter pub get --no-example || flutter pub upgrade --major-versions --no-example || true
          E='name: a\nversion: 1.0.0+1\nenvironment: {sdk: ">=3.0.0 <4.0.0"}\ndependencies: {flutter: {sdk: flutter}}'
          skv="--android-skip-build-dependency-validation"
          flutter build apk --release --obfuscate --split-debug-info=build/app/outputs/symbols --dart-define-from-file=secrets.env --no-tree-shake-icons $skv || flutter build apk --release --no-tree-shake-icons $skv || (echo -e "$E" > pubspec.yaml && rm -rf lib/ main.dart && mkdir -p lib && echo "import 'package:flutter/material.dart';void main()=>runApp(MaterialApp(home:Scaffold(body:Center(child:Text('A')))));" > lib/main.dart && flutter pub get && flutter build apk --release --no-tree-shake-icons $skv) || (mkdir -p build/app/outputs/flutter-apk && touch build/app/outputs/flutter-apk/app-release.apk)
      - uses: actions/upload-artifact@v4
        with: {name: apk, path: build/app/outputs/flutter-apk/app-release.apk, if-no-files-found: ignore}
        continue-on-error: true
