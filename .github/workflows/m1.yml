name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  # =========================================================================
  # TARGET 1 & 2: SELF-HEALING NATIVE ANDROID ENGINE (APK & AAB)
  # =========================================================================
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: {target: [apk, appbundle]}
      fail-fast: false 
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
      JAVA_OPTS: "-Xmx4096m"
    steps:
      - uses: actions/checkout@v4
      - name: Init Workspace
        run: |
          touch .env
          mkdir -p assets && touch assets/icon_launcher.png
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          
          cat <<EOF > lib/secrets.dart
          class AppConfig {
            static const String supabaseUrl = "${{ secrets.SUPABASE_URL }}";
            static const String supabaseAnonKey = "${{ secrets.SUPABASE_ANON_KEY }}";
            static const String geminiApiKey = "${{ secrets.GEMINI_API_KEY }}";
            static const String openaiKey = "${{ secrets.OPENAI_KEY }}";
            static const String groqApiKey = "${{ secrets.GROQ_API_KEY }}";
            static const String vertexApiKey = "${{ secrets.VERTEX_API_KEY }}";
            static const String heygenKey = "${{ secrets.HEYGEN_KEY }}";
            static const String runwaymlApiSecret = "${{ secrets.RUNWAYML_API_SECRET }}";
            static const String tripoApiKey = "${{ secrets.TRIPO_API_KEY }}";
            static const String pexelsApiKey = "${{ secrets.PEXELS_API_KEY }}";
            static const String mtnApiKey = "${{ secrets.MTN_API_KEY }}";
            static const String elevenLabApiKey = "${{ secrets.ELEVEN_LAB_API_KEY }}";
          }
          EOF
          
          cat <<EOF > secrets.json
          {"SUPABASE_URL":"${{ secrets.SUPABASE_URL }}","SUPABASE_ANON_KEY":"${{ secrets.SUPABASE_ANON_KEY }}","GEMINI_API_KEY":"${{ secrets.GEMINI_API_KEY }}"}
          EOF

      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Prep Packages
        run: |
          flutter pub get
          dart run flutter_launcher_icons || echo "Lints ignored."
          flutter precache --android
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java

      - name: Setup Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties

      - name: Build Target 1
        id: build_one
        continue-on-error: true
        run: flutter build ${{ matrix.target }} --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.json 2>&1 | tee crash_log.txt

      - name: AI Healing Loop
        if: steps.build_one.outcome == 'failure'
        env: {GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"}
        run: |
          ERR=$(tail -n 40 crash_log.txt | tr -d '\n\r"' | tr '\'' '-')
          SRC=$(cat lib/main.dart | tr -d '\n\r"' | tr '\'' '-')
          REQ="{\"contents\":[{\"parts\":[{\"text\":\"Senior Flutter dev. Fix compile error in lib/main.dart. Return ONLY full corrected source code without any markdown wrappers or comments. Error: $ERR Code: $SRC\"}]}]}"
          RES=$(curl -s -X POST "https://googleapis.com" -H "Content-Type: application/json" -d "$REQ")
          CLEAN=$(echo "$RES" | jq -r '.candidates[0].content.parts[0].text' | sed 's/^```dart//' | sed 's/^```//' | sed 's/```\$//')
          [ ! -z "\$CLEAN" ] && [ "\(CLEAN" != "null" ] && echo "\)CLEAN" > lib/main.dart && echo "✅ AI fixed applied."

      - name: Final Validation Gate
        if: steps.build_one.outcome == 'failure'
        run: flutter build \${{ matrix.target }} --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.json

      - name: Save Binaries
        uses: actions/upload-artifact@v4
        with:
          name: holomatics-native-\${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk

  # =========================================================================
  # TARGET 3: SELF-HEALING PRODUCTION WEB ENGINE
  # =========================================================================
  build-web:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Init Web Workspace
        run: |
          touch .env && mkdir -p assets && touch assets/icon_launcher.png
          cat <<EOF > lib/secrets.dart
          class AppConfig {
            static const String supabaseUrl = "\${{ secrets.SUPABASE_URL }}";
            static const String supabaseAnonKey = "\${{ secrets.SUPABASE_ANON_KEY }}";
            static const String geminiApiKey = "\${{ secrets.GEMINI_API_KEY }}";
            static const String openaiKey = "\${{ secrets.OPENAI_KEY }}";
            static const String groqApiKey = "\${{ secrets.GROQ_API_KEY }}";
            static const String vertexApiKey = "\${{ secrets.VERTEX_API_KEY }}";
            static const String heygenKey = "\${{ secrets.HEYGEN_KEY }}";
            static const String runwaymlApiSecret = "\${{ secrets.RUNWAYML_API_SECRET }}";
            static const String tripoApiKey = "\${{ secrets.TRIPO_API_KEY }}";
            static const String pexelsApiKey = "\${{ secrets.PEXELS_API_KEY }}";
            static const String mtnApiKey = "\${{ secrets.MTN_API_KEY }}";
            static const String elevenLabApiKey = "\${{ secrets.ELEVEN_LAB_API_KEY }}";
          }
          EOF
          cat <<EOF > secrets.json
          {"SUPABASE_URL":"\${{ secrets.SUPABASE_URL }}","SUPABASE_ANON_KEY":"\({{ secrets.SUPABASE_ANON_KEY }}","GEMINI_API_KEY":"\){{ secrets.GEMINI_API_KEY }}"}
          EOF

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
      - run: flutter pub get

      - name: Build Target 3
        id: web_one
        continue-on-error: true
        run: flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart --dart-define-from-file=secrets.json 2>&1 | tee crash_log.txt

      - name: AI Healing Loop
        if: steps.web_one.outcome == 'failure'
        env: {GEMINI_API_KEY: "\${{ secrets.GEMINI_API_KEY }}"}
        run: |
          ERR=\$(tail -n 40 crash_log.txt | tr -d '\n\r"' | tr '\'' '-')
          SRC=\$(cat lib/main.dart | tr -d '\n\r"' | tr '\'' '-')
          REQ="{\"contents\":[{\"parts\":[{\"text\":\"Senior Flutter dev. Fix compile error in lib/main.dart. Return ONLY full corrected source code without any markdown wrappers or comments. Error: ERR Code: SRC\"}]}]}"
          RES=\$(curl -s -X POST "https://googleapis.com\(GEMINI_API_KEY" -H "Content-Type: application/json" -d "\)REQ")
          CLEAN=(echo "RES" | jq -r '.candidates[0].content.parts[0].text' | sed 's/^```dart//' | sed 's/^```//' | sed 's/```$//')
          [ ! -z "$CLEAN" ] && [ "$CLEAN" != "null" ] && echo "$CLEAN" > lib/main.dart && echo "✅ AI fixed applied."

      - name: Final Validation Gate
        if: steps.web_one.outcome == 'failure'
        run: flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart --dart-define-from-file=secrets.json

      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}

  # =========================================================================
  # TARGET 4: AUTOMATED LIVE DISTRIBUTION DEPLOYMENT GATEWAY
  # =========================================================================
  deploy-pages:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v4
