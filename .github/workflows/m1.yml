name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env: {GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m", JAVA_OPTS: "-Xmx4096m"}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      - name: Setup and Clean
        run: |
          # 1. Structure exactly the asset directory declared in your pubspec.yaml
          mkdir -p assets
          
          # 2. Touch the exact screenshot path utilized by the launcher icon generator
          touch "assets/Screenshot_20260708_215841_Chrome....jpg"
          
          # 3. Create the mandatory .env tracking asset
          touch .env
          
          # 4. Pack your repository secrets dashboard securely into a temporary compile target
          echo '${{ toJSON(secrets) }}' > secrets.json
          
          flutter clean && flutter pub get

      - name: Decode Android Release Keystore
        run: |
          # Convert your Base64 secret text string back into a functional binary signing file
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          
          # Map key properties dynamically so Gradle can execute the code certificates
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Generate App Launcher Icons
        run: |
          # Runs the build generator to resize and build your Android/Web platform launch assets
          flutter pub run flutter_launcher_icons:main

      - name: Build Web
        run: |
          # Compiles the optimized WASM release using your secure repository secrets mappings
          flutter build web --release --wasm --dart-define-from-file=secrets.json
          # Automatically rewrites the base href paths for GitHub Pages subfolder hosting
          sed -i 's|<base href="/">|<base href="/'"${{ github.event.repository.name }}"'/|g' build/web/index.html
      - uses: actions/upload-pages-artifact@v3
        with: {path: build/web}
      - uses: actions/deploy-pages@v4
      
      - name: Build Android
        run: |
          # Compiles signed multi-architecture APK assets and target release production bundles securely
          flutter build apk --release --android-skip-build-dependency-validation --split-per-abi --dart-define-from-file=secrets.json
          flutter build appbundle --release --android-skip-build-dependency-validation --dart-define-from-file=secrets.json
      - uses: actions/upload-artifact@v4
        with: 
          name: holomatics-native-builds
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
