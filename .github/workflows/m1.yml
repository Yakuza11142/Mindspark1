name: m1-debug-pipeline
on: [workflow_dispatch]
permissions: {contents: write, actions: write, pages: write, id-token: write}

jobs:
  # =========================================================================
  # TARGET 1 & 2: NATIVE ANDROID (APK & APPBUNDLE)
  # =========================================================================
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix: {target: [apk, appbundle]}
      fail-fast: false
    env:
      GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: {distribution: 'temurin', java-version: '17', cache: 'gradle'}

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      # TRICK: Automatically rewrites and cleans line-breaks inside your real main.dart variables
      - name: Virtual Compiler Code Fixer (Android)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY: ${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY: ${{ secrets.ELEVEN_LAB_API_KEY }}
        run: |
          mkdir -p assets web android/app/src/main/java/io/flutter/plugins
          touch .env assets/icon_launcher.png

          python3 -c '
          import os
          keys = [
              "SUPABASE_URL", "SUPABASE_ANON_KEY", "GEMINI_API_KEY", "OPENAI_KEY",
              "GROQ_API_KEY", "VERTEX_API_KEY", "HEYGEN_KEY", "RUNWAYML_API_SECRET",
              "TRIPO_API_KEY", "PEXELS_API_KEY", "MTN_API_KEY", "ELEVEN_LAB_API_KEY"
          ]
          clean = {k: os.environ.get(k, "").replace("\r", "").replace("\n", "").strip() for k in keys}
          
          # Clean and compile secrets directly
          code = "class Secrets {\n"
          for k, v in clean.items():
              var_name = k.lower().replace("_a", "A").replace("_u", "U").replace("_k", "K").replace("_s", "S")
              code += f"  static const String {var_name} = r\"{v}\";\n"
          code += "}\n"
          
          with open("lib/secrets.dart", "w") as f:
              f.write(code)
          '

      - name: Clean and Fetch Cache
        run: |
          flutter pub get
          flutter precache --android
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          
      - name: Load Android Signatures
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
          echo -e "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}\nkeyAlias=${{ secrets.ANDROID_KEY_ALIAS }}\nstoreFile=upload-keystore.jks" > android/key.properties
          
      - name: Build Android App
        run: |
          flutter build ${{ matrix.target }} --release --android-skip-build-dependency-validation

      - name: Save Build Results
        uses: actions/upload-artifact@v4
        with:
          name: holomatics-native-${{ matrix.target }}
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk

  # =========================================================================
  # TARGET 3 & 4: WEB COMPILE & LIVE DEPLOYMENT
  # =========================================================================
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}

      # TRICK: Automatically rewrites and cleans line-breaks inside your real main.dart variables
      - name: Virtual Compiler Code Fixer (Web)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          HEYGEN_KEY: ${{ secrets.HEYGEN_KEY }}
          RUNWAYML_API_SECRET: ${{ secrets.RUNWAYML_API_SECRET }}
          TRIPO_API_KEY: ${{ secrets.TRIPO_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          MTN_API_KEY: ${{ secrets.MTN_API_KEY }}
          ELEVEN_LAB_API_KEY: ${{ secrets.ELEVEN_LAB_API_KEY }}
        run: |
          mkdir -p assets web
          touch .env assets/icon_launcher.png
          
          flutter create . --platforms=web
          
          python3 -c '
          import os
          keys = [
              "SUPABASE_URL", "SUPABASE_ANON_KEY", "GEMINI_API_KEY", "OPENAI_KEY",
              "GROQ_API_KEY", "VERTEX_API_KEY", "HEYGEN_KEY", "RUNWAYML_API_SECRET",
              "TRIPO_API_KEY", "PEXELS_API_KEY", "MTN_API_KEY", "ELEVEN_LAB_API_KEY"
          ]
          clean = {k: os.environ.get(k, "").replace("\r", "").replace("\n", "").strip() for k in keys}
          
          code = "class Secrets {\n"
          for k, v in clean.items():
              var_name = k.lower().replace("_a", "A").replace("_u", "U").replace("_k", "K").replace("_s", "S")
              code += f"  static const String {var_name} = r\"{v}\";\n"
          code += "}\n"
          
          with open("lib/secrets.dart", "w") as f:
              f.write(code)
          '

      - name: Build Web App
        run: |
          flutter pub get
          flutter build web --release --no-wasm-dry-run --base-href "/mindspark1/" --target=lib/main.dart

      - name: Save Web Files
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
