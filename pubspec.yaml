include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat these warnings as "Fatal Errors" that kill the build
    unused_local_variable: error
    invalid_use_of_visible_for_testing_member: error
    missing_required_param: error
    dead_code: error
dev_dependencies:
  # Allows the app to inspect its own code health
  custom_lint: ^0.6.4 
