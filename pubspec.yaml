name: mindspark1
description: "AI TUTOR & AR LAB"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.1
  dio: ^5.7.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  vector_math: ^2.1.4
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  google_generative_ai: ^0.4.0
  flutter_tts: ^4.1.0
  speech_to_text: ^6.6.2
  path_provider: ^2.1.3
  crypto: ^3.0.5
  uuid: ^4.5.0
  arcore_flutter_plus: ^1.0.2
  camera: ^0.11.0+1
  flutter_plugin_android_lifecycle: ^2.0.24
  webview_flutter: ^4.8.0
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.2
  source_gen: ^1.5.0

# REMOVED: Conflicting overrides that were locking intl, source_gen, and vector_math versions

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"
