name: mindspark1
description: "AI TUTOR & AR LAB - HARDENED COMPRESSED CORE"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  supabase_flutter: ^2.6.0       
  flutter_dotenv: ^6.0.1
  dio: ^5.5.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  vector_math: ^2.1.4
  url_launcher: ^6.3.0            
  shared_preferences: ^2.3.2      
  google_generative_ai: ^0.4.2    
  flutter_tts: ^4.2.5             
  speech_to_text: ^7.4.0
  path_provider: ^2.1.4
  crypto: ^3.0.5
  uuid: ^4.4.0

  # Real-Time Mathematical Data Pipe (Using P2P DataChannels, No Pixel Streaming)
  flutter_webrtc: ^1.2.0

  # Native Core Fallback Drivers
  arcore_flutter_plus: ^1.0.2     
  camera: ^0.11.0                 
  camera_android_camerax: ^0.6.30  # TRICK FIX: Added missing native Android architecture mapping
  flutter_plugin_android_lifecycle: ^2.0.24 
  webview_flutter: ^4.9.0         
  webview_flutter_android: ^4.8.0  # TRICK FIX: Added missing native Android engine mapping
  google_mobile_ads: ^5.2.0       

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.2
  source_gen: ^1.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/                     

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false                      
  image_path: "assets/icon_launcher.png"
  web:
    generate: true
    image_path: "assets/icon_launcher.png"
