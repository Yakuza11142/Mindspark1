name: MIND_SPARK
description: AI TUTOR & AR LAB
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- CORE & DATABASE ---
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  dio: ^5.4.0
  http: ^1.2.0

  # --- INTELLIGENCE & ML ---
  google_generative_ai: ^0.4.0
  dart_openai: ^5.1.0
  groq_sdk: ^0.0.3
  google_mlkit_language_id: ^0.10.0
  google_ml_kit_face_detection: ^0.11.0
  tflite_flutter: ^0.10.0
  llm_dart: ^0.10.0

  # --- AR & SENSES ---
  arcore_flutter_plus: ^1.0.2
  vector_math: ^2.1.0
  model_viewer_plus: ^1.4.0
  image_picker: ^1.0.7
  mobile_scanner: ^5.1.0
  speech_to_text: ^6.6.0
  audioplayers: ^6.0.0
  video_player: ^2.8.2
  cached_video_player: ^2.0.4

  # --- SECURITY & CRYPTO ---
  flutter_secure_storage: ^9.0.0
  flutter_jailbreak_detection: ^1.1.1
  safe_device: ^1.1.4
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  pqcrypto: ^1.1.0
  encrypt: ^5.0.3
  biometric_storage: ^5.0.1

  # --- UI & UTILS ---
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  dash_chat_2: ^0.0.20
  intl: ^0.19.0
  url_launcher: ^6.2.5
  simple_gradient_text: ^3.0.0
  flutter_markdown: ^0.7.1
  qr_flutter: ^4.1.0
  ticket_widget_plus: ^1.0.1
  ticket_clippers: ^1.1.0
  share_plus: ^9.0.0
  vibration: ^1.8.4
  screen_brightness: ^0.2.2
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: "^0.13.1"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
