name: mind_spark_1
description: "AI TUTOR & AR LAB"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  dio: ^5.5.0
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  vector_math: ^2.1.4
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.3
  google_generative_ai: ^0.2.0
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2
  path_provider: ^2.1.3
  crypto: ^3.0.3
  uuid: ^4.4.0
  arcore_flutter_plus: ^1.0.2
  camera: ^0.11.0+1
  flutter_plugin_android_lifecycle: ^2.0.21
  webview_flutter: ^4.7.0
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  source_gen: ^4.2.3

dependency_overrides:
  source_gen: ^4.2.3
  intl: 0.19.0
  vector_math: 2.1.4
  meta: 1.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/app_icon.png"
