dependencies:
  dependencies:
  qr_flutter: ^4.1.0          # Generates the QR
  ticket_widget_plus: ^1.0.1  # Gives the "punched-out" receipt look
  crypto: ^3.0.3              # Used for hashing/legitimacy verification
