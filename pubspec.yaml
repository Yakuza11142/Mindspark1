name: MIND SPARK
description: AI TUTOR & AR LAB
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 1. INTELLIGENCE (Gemini + OpenAI)
  google_generative_ai: ^0.4.0
  dart_openai: ^5.1.0

  # 2. MONEY (Ads + IAP)
  google_mobile_ads: ^5.0.0
  in_app_purchase: ^3.1.13

  # 3. SENSES (Visuals + Audio)
  dio: ^5.4.0
  http: ^1.2.0
  audioplayers: ^5.2.1
  video_player: ^2.8.2
  cached_video_player: ^2.0.4
  image_picker: ^1.0.7
  model_viewer_plus: ^1.4.0  # AR/3D Engine

  # 4. UTILITIES
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  path_provider: ^2.1.2
  pdf: ^3.10.0
  flutter_email_sender: ^6.0.1
  intl: ^0.19.0
  dash_chat_2: ^0.0.20
  url_launcher: ^6.2.5
  simple_gradient_text: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
