name: Mind Spark Fixed CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Force GitHub to automatically grab the absolute newest stable engine

      - name: Resolve Dependencies
        run: |
          flutter clean
          flutter pub cache clean --force
          flutter pub get
        working-directory: "."

      - name: Generate Schemas
        run: dart run build_runner build --delete-conflicting-outputs --allow-dirty
        working-directory: "."

      - name: Build Android
        run: flutter build apk --debug
        working-directory: "."
