name: mind_spark
description: "AI TUTOR & AR LAB - MAXIMUM COMPILATION RUN MATRIX"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter: { sdk: flutter }
  
  # 🌐 CORE INTEGRATION & GRAPH DEPENDENCY ROOTS
  provider: ^6.1.2
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  dio: ^5.4.3+1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  vector_math: ^2.1.4

  # 🤖 COMPLETE AI ENGINE SUB-SYSTEM DEPENDENCY MATRIX
  google_generative_ai: ^0.4.4
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2
  path_provider: ^2.1.3
  crypto: ^3.0.3                  # Resolves underlying missing crypto dependencies for Supabase/AI tokens
  uuid: ^4.4.0                    # Resolves background unique identifier logic dependencies

  # 🕶️ COMPLETE AR LAB & HARDWARE PLATFORM HOOK DEPENDENCY MATRIX
  arcore_flutter_plus: ^1.1.0
  camera: ^0.11.0+1
  camera_platform_interface: ^2.7.0 # Explicitly resolves underlying hardware interface layer gaps
  flutter_plugin_android_lifecycle: ^2.0.21 # Binds background state loops for ARCore on Android devices
  arkit_plugin: ^1.0.6            # Injects Apple iOS equivalent AR functionality to mirror your AR Lab
  webview_flutter: ^4.8.0
  webview_flutter_android: ^3.16.0 # Explicitly locks the underlying Android WebView engine dependencies
  webview_flutter_wkwebview: ^3.13.0 # Explicitly locks the underlying Apple iOS WebView engine dependencies

  # 📊 COMPLETE MONETIZATION & UTILITY CORE SUB-SYSTEMS
  google_mobile_ads: ^5.1.0
  url_launcher: ^6.3.0            # Resolves background web deep-linking dependencies for ad click routes
  shared_preferences: ^2.2.3       # Resolves local local cache dependencies for ads and user logins

dev_dependencies:
  flutter_test: { sdk: flutter }
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  
  # 🔧 COMPLETE BACKEND CODE GENERATOR SUB-SYSTEM DEPENDENCY MATRIX
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0         # Explicit dependency required to support code serialization loops
  build_verify: ^3.1.0
  source_gen: ^1.5.0              # Resolves background code creation logic dependencies for build_runner

flutter:
  uses-material-design: true
  
  # 📁 STRICT ASSET MAPPING ARRAYS:
  assets:
    - assets/images/
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts: 
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

# 🎨 EXPLICIT PLATFORM ICON COMPILATION MAPS:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  macos: true
  web:
    generate: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_icon.png"
