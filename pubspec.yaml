name: mind_spark
description: "AI TUTOR & AR LAB - PRODUCTION COMPATIBLE"
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter: { sdk: flutter }
  
  # 🌐 CORE INTEGRATION NETWORK AND STATE ENGINE DEPS
  provider: ^6.1.2
  supabase_flutter: ^2.2.1        # Aligned to clear modern Dart SDK crashes
  flutter_dotenv: ^5.1.0
  dio: ^5.4.3+1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  flutter_animate: ^4.5.0
  vector_math: ^2.1.4

  # 🤖 COMPATIBLE AI TUTOR SUITE ENGINES
  google_generative_ai: ^0.2.0    # Fixed downgrade to map stable 3.22 parsing rules
  flutter_tts: ^4.0.2
  speech_to_text: ^6.6.2
  path_provider: ^2.1.3
  crypto: ^3.0.3
  uuid: ^4.4.0

  # 🕶️ NATIVE MOBILE AR LAB HARDWARE CHANNELS
  arcore_flutter_plus: ^1.0.2
  camera: ^0.11.0+1
  camera_platform_interface: ^2.7.0
  flutter_plugin_android_lifecycle: ^2.0.21
  arkit_plugin: ^1.0.6
  webview_flutter: ^4.7.0            # Version synced with ads engine layout boundaries
  webview_flutter_android: ^3.15.0
  webview_flutter_wkwebview: ^3.11.0

  # 📊 MONETIZATION ECOSYSTEM & UTILITIES
  google_mobile_ads: ^4.0.0         # Crucial version block mapping to prevent webview crashes
  url_launcher: ^6.2.5
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test: { sdk: flutter }
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  build_verify: ^3.1.0
  source_gen: ^1.5.0

flutter:
  uses-material-design: true
  
  # 📁 GLOBAL ASSET PATH DIRECTORY MAPPINGS
  assets:
    - assets/images/
    - assets/fonts/
    - .env                           # Maps your separate loose root configuration parameters

  fonts:
    - family: Inter
      fonts: 
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700

# 🎨 EXPLICIT ASSET MAPPING CHANNELS LINKED TO YOUR MASTER LOGO FILE
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  macos: true
  windows: true                    # Unlocks laptop desktop platform icon formatting checks
  web:
    generate: true
  image_path: "image_e1762c49 (1).png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "image_e1762c49 (1).png"
