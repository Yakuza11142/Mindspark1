# MINDSPARK ELITE LOAD BALANCER
http {
    upstream mindspark_cluster {
        server backend1.mindspark.app weight=3;
        server backend2.mindspark.app;
        server backend3.mindspark.app;
    }

    server {
        listen 80;
        server_name api.mindspark.app;

        location / {
            proxy_pass http://mindspark_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Block DDoS attacks (Rate Limiting)
            limit_req zone=one burst=50 nodelay; 
        }
    }
}