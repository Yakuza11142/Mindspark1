pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties(); def file = new File(settingsDir, "local.properties")
        if (file.exists()) { file.withReader("UTF-8") { reader -> properties.load(reader) } }
        return properties.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories { 
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins { 
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false; 
    id "com.android.application" version "8.6.0" apply false; 
    id "org.jetbrains.kotlin.android" version "2.0.0" apply false 
}
dependencyResolutionManagement { 
    // FIXED: Swapped to PREFER_PROJECT to allow dev.flutter.flutter-gradle-plugin to inject its internal maven pathways safely
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories { 
        google()
        mavenCentral()
    } 
}
rootProject.name = "mindspark1"
include ':app'
