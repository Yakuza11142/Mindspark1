plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// 🛠️ BYPASS TRICK: This stops the cloud runner from crashing on the AGP 9 error!
apply plugin: 'dev.flutter.flutter-gradle-plugin'

android {
    namespace 'com.mindspark.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.mindspark.elite"
        minSdk 23 // Kept at 23 to support all your AI and Supabase plugins safely
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug // Uses debug key so you can install it on your mobile device instantly
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.multidex:multidex:2.0.1'
}
