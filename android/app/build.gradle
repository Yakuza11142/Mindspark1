plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.example.mindspark"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.mindspark"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

// ROBUST GRADLE INTERCEPTOR (Fixes un-namespaced elements dynamically)
project.ext.manifestTransformer = { File manifestFile ->
    if (manifestFile.exists() && manifestFile.name == "AndroidManifest.xml") {
        String contents = manifestFile.getText('UTF-8')
        if (contents.contains("<uses-permission") || contents.contains("<uses-feature") || contents.contains("<action")) {
            // Apply standard text replacement rules across un-namespaced attributes
            contents = contents.replaceAll(/(?<!android:)name=/, 'android:name=')
            contents = contents.replaceAll(/(?<!android:)required=/, 'android:required=')
            contents = contents.replaceAll(/(?<!android:)scheme=/, 'android:scheme=')
            contents = contents.replaceAll(/(?<!android:)host=/, 'android:host=')
            contents = contents.replaceAll(/(?<!android:)value=/, 'android:value=')
            contents = contents.replaceAll(/(?<!android:)exported=/, 'android:exported=')
            contents = contents.replaceAll(/(?<!android:)launchMode=/, 'android:launchMode=')
            manifestFile.setText(contents, 'UTF-8')
        }
    }
}

// Hook directly into the compilation lifecycle phases
android.applicationVariants.all { variant ->
    variant.outputs.all { output ->
        output.processManifestProvider.get().doLast { task ->
            File outputDir = task.manifestOutputDirectory.get().asFile
            if (outputDir.exists()) {
                outputDir.eachFileRecurse { file ->
                    project.ext.manifestTransformer(file)
                }
            }
        }
    }
}

flutter {
    source '../..'
}
