plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    // Explicitly targets the clean, unified app package identity
    namespace "com.example.mindspark.clean"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.mindspark.clean"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    // Absolute Manifest Overwrite Hook
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.processManifestProvider.get().doLast { task ->
                var outputDir = task.manifestOutputDirectory.get().asFile
                outputDir.walkTopDown().forEach { file ->
                    if (file.name == 'AndroidManifest.xml') {
                        var masterManifest = rootProject.file('app/src/main/AndroidManifest.xml')
                        if (masterManifest.exists()) {
                            file.text = masterManifest.text
                        }
                    }
                }
            }
        }
    }
}

flutter {
    source '../..'
}
