import javax.xml.parsers.DocumentBuilderFactory
import javax.xml.transform.TransformerFactory
import javax.xml.transform.dom.DOMSource
import javax.xml.transform.stream.StreamResult
import org.w3c.dom.Document
import org.w3c.dom.Element
import org.w3c.dom.NodeList

plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "com.example.mindspark"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.mindspark"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

// ROBUST JAVA DOM PARSER - Structural validation fixer
ext.fixManifestNamespaces = { File manifestFile ->
    if (!manifestFile.exists() || manifestFile.name != "AndroidManifest.xml") return

    try {
        var factory = DocumentBuilderFactory.newInstance()
        var builder = factory.newDocumentBuilder()
        Document doc = builder.parse(manifestFile)
        
        // Critical targets that often drop missing prefixes inside third-party modules
        String[] targets = ["uses-permission", "uses-feature", "action", "category", "meta-data", "activity", "intent", "data"]
        boolean amended = false

        for (String tagName : targets) {
            NodeList list = doc.getElementsByTagName(tagName)
            for (int i = 0; i < list.getLength(); i++) {
                Element el = (Element) list.item(i)
                
                // If a standard key is found without its prefix namespace, correct it structurally
                String[] attrs = ["name", "required", "scheme", "host", "value", "exported", "launchMode"]
                for (String attr : attrs) {
                    if (el.hasAttribute(attr) && !el.hasAttributeNS("http://android.com", attr)) {
                        String value = el.getAttribute(attr)
                        el.removeAttribute(attr)
                        el.setAttribute("android:" + attr, value)
                        amended = true
                    }
                }
            }
        }

        if (amended) {
            var transformer = TransformerFactory.newInstance().newTransformer()
            var source = new DOMSource(doc)
            var result = new StreamResult(manifestFile)
            transformer.transform(source, result)
        }
    } catch (Exception e) {
        // Safe logger block to guarantee compilation never halts on a parsing conflict
        println "⚠️ [Unfailable Hook Notice] Skipping structural analysis on intermediate file node: " + e.getMessage()
    }
}

// Intercept manifest generation right before final compilation assembly
android.applicationVariants.all { variant ->
    variant.outputs.all { output ->
        output.processManifestProvider.get().doLast { task ->
            File outputDir = task.manifestOutputDirectory.get().asFile
            if (outputDir.exists()) {
                outputDir.eachFileRecurse { file ->
                    fixManifestNamespaces(file)
                }
            }
        }
    }
}

flutter {
    source '../..'
}
