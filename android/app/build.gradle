plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // 1. Upgraded to API 36 to satisfy the app_links plugin requirements
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        // 2. Updated to your exact application package ID
        applicationId "com.example.mindspark"
        
        // 3. Forced to API 24 because native ARCore C++ binaries require Android 7.0+
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName

        // 4. Restricts compilation strictly to 64-bit ARM physical devices (ARCore hardware requirement)
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    buildTypes {
        release {
            // Tells the compiler to use your ProGuard file rules during obfuscation
            signingConfig signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
