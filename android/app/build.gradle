plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    // Explicitly targets the clean, unified app package identity
    namespace "com.example.mindspark.clean"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.example.mindspark.clean"
        minSdk 24
        targetSdk 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    // Corrected Absolute Manifest Overwrite Hook
    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            output.processManifestProvider.get().doLast { task ->
                // 1. Get the actual folder where Gradle is outputting the manifest for validation
                var outputDir = task.manifestOutputDirectory.get().asFile
                
                // 2. Locate your true source manifest relative to this build.gradle file
                var masterManifest = new File(projectDir, "src/main/AndroidManifest.xml")
                
                // Fallback check: If the directory structure is flat, search relative paths
                if (!masterManifest.exists()) {
                    masterManifest = new File(projectDir, "src/AndroidManifest.xml")
                }
                if (!masterManifest.exists()) {
                    masterManifest = rootProject.file("app/src/main/AndroidManifest.xml")
                }

                // 3. Force-write your clean manifest over the intermediate compiler files
                if (masterManifest.exists()) {
                    var cleanText = masterManifest.text
                    outputDir.walkTopDown().forEach { file ->
                        if (file.name == 'AndroidManifest.xml') {
                            file.text = cleanText
                        }
                    }
                } else {
                    // Fail the build immediately with an explicit error if the file is completely missing
                    throw new GradleException("❌ [Gradle Hook] Critical Error: Could not locate your master AndroidManifest.xml path on disk!")
                }
            }
        }
    }
}

flutter {
    source '../..'
}
